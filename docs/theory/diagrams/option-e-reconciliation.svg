="spacing" textLength="211.9392" x="999.7499" y="925.0953">redex_id, local_index, kind, weight)</text></g><g class="message" data-entity-1="part7" data-entity-2="part7" id="msg21"><line style="stroke:#000000;stroke-width:1;" x1="992.7499" x2="1034.7499" y1="1011.0223" y2="1011.0223"/><line style="stroke:#000000;stroke-width:1;" x1="1034.7499" x2="1034.7499" y1="1011.0223" y2="1024.0223"/><line style="stroke:#000000;stroke-width:1;" x1="993.7499" x2="1034.7499" y1="1024.0223" y2="1024.0223"/><polygon fill="#000000" points="1003.7499,1020.0223,993.7499,1024.0223,1003.7499,1028.0223,999.7499,1024.0223" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="74.8931" x="1045.6003" y="969.8013">walk events:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="126.5811" x="1019.7562" y="987.5073">consumed += w until</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="166.5937" x="999.7499" y="1005.2133">would exceed initial &#8594; OOP</text></g><g class="message" data-entity-1="part7" data-entity-2="part8" id="msg22"><polygon fill="#000000" points="1218.5611,1069.4344,1228.5611,1073.4344,1218.5611,1077.4344,1222.5611,1073.4344" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="992.7499" x2="1224.5611" y1="1073.4344" y2="1073.4344"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="179.6472" x="1021.832" y="1049.9194">store CanonicalReconciliation</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="213.8112" x="1004.7499" y="1067.6254">{committed, oop, consumed_units}</text></g><g class="message" data-entity-1="part8" data-entity-2="part9" id="msg23"><polygon fill="#2E7D32" points="1515.3794,1108.1404,1525.3794,1112.1404,1515.3794,1116.1404,1519.3794,1112.1404" style="stroke:#2E7D32;stroke-width:1;"/><line style="stroke:#2E7D32;stroke-width:1;stroke-dasharray:2,2;" x1="1230.5611" x2="1521.3794" y1="1112.1404" y2="1112.1404"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="272.8183" x="1242.5611" y="1106.3314">canonical (committed, oop, consumed_units)</text></g><path d="M1148,1125.1404 L1148,1152.1404 L1904,1152.1404 L1904,1135.1404 L1894,1125.1404 L1148,1125.1404" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1894,1125.1404 L1894,1135.1404 L1904,1135.1404 L1894,1125.1404" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="735.9203" x="1154" y="1144.0374">&#9472;&#9472; Phase 3: Schedule-INDEPENDENT &#8212; total_cost is CONSENSUS; digest/count/last_oop are DIAGNOSTIC (TM-CA-151) &#9472;&#9472;</text><g class="message" data-entity-1="part9" data-entity-2="part9" id="msg24"><line style="stroke:#000000;stroke-width:1;" x1="1527.3794" x2="1569.3794" y1="1234.6705" y2="1234.6705"/><line style="stroke:#000000;stroke-width:1;" x1="1569.3794" x2="1569.3794" y1="1234.6705" y2="1247.6705"/><line style="stroke:#000000;stroke-width:1;" x1="1528.3794" x2="1569.3794" y1="1247.6705" y2="1247.6705"/><polygon fill="#000000" points="1538.3794,1243.6705,1528.3794,1247.6705,1538.3794,1251.6705,1534.3794,1247.6705" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="274.7033" x="1602.6749" y="1175.7434">deploy.cost = consumed_units  (CONSENSUS)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="346.1253" x="1566.964" y="1193.4494">cost_trace_digest = hash(committed ++ oop)  (diagnostic)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="411.2943" x="1534.3794" y="1211.1555">cost_trace_event_count = |committed| + (oop is Some)  (diagnostic)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="279.4483" x="1600.3025" y="1228.8615">last_oop_event = oop  (diagnostic, TM-CA-151)</text></g><path d="M171,1260.6705 L171,1500.6705 L1596,1500.6705 L1596,1270.6705 L1586,1260.6705 L171,1260.6705" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1586,1260.6705 L1586,1270.6705 L1596,1270.6705 L1586,1260.6705" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="193.0762" x="611.4738" y="1279.5675">The canonical reconciliation is a</text><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="88.3611" x="807.93" y="1279.5675">pure function</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="12.337" x="899.6711" y="1279.5675">of</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="349.3883" x="611.4738" y="1297.2735">(initial_budget, multiset of attempts). Any two play/replay</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="402.9873" x="611.4738" y="1314.9795">executions over the same deploy and budget produce an identical</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="334.6333" x="611.4738" y="1332.6855">consensus value (total_cost) &#8212; and identical diagnostic</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="381.0303" x="611.4738" y="1350.3916">digest/count/last_oop &#8212; regardless of which CAS race winners</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="376.6103" x="611.4738" y="1368.0976">occurred at runtime. Per TM-CA-151 only total_cost (+ status +</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="379.5223" x="611.4738" y="1385.8036">post-state hash) is consensus; the digest/count are diagnostic.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="3.38" x="611.4738" y="1403.5096">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="25.285" x="611.4738" y="1421.2156">See:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="373.4513" x="611.4738" y="1438.9216">- Rocq: rb_reconcile_consumed_invariant_under_permutation</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="452.1924" x="611.4738" y="1456.6277">- TLA+: RuntimeBudgetReplay.ConsumedAndVerdictScheduleIndependent</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="287.2093" x="611.4738" y="1474.3337">- Loom: loom_runtime_budget_reconciliation::*</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="535.5354" x="611.4738" y="1492.0397">- Rust: cost_accounting_spec::concurrent_runtime_budget_reservations_are_linearizable</text><?plantuml-src ZLRRRXit47tVhvZ6Bv8jAR2TkkucCQ2R2mEE95XgNgfWGND74g4LkI6vbjscGDg7Va0H1CZl-Kiwf7PN5rzImx0iSgvdpipm1pl31KAQC263mCo5J9bc2sWnFfzgbScuhHAbOJaJ5ZVkX_WnGydn7Hh3fjXCn5G2HsbHRqWDcBQ2YvH9Es1nBEGKJZUTgDlY-2G86BVaw4K7qqJTZMMR9Gdg5y0ChFw5lVFJzd7hD4ZNLk755SOPHpsM8sRcSEZbHuSaUzvjjuwVavslPEV_HxQtakqzBikinKLgeqHDn_9TPl7spNlaPrxdKarXh_Eg_Qgx4pXNqcGBZ2EhvYZDM3QjMWX-SV9gbJDXRrtIxTFkIVldRLsDfCr5WfMg5xugliDUwwXptcdjk69IIS5P4erbeIgO5KeMuVPJz-rDez4uEyiXvpDytFb0AqvLnxYeLCMbGYba1WuW5cmgbI5nqCXYrDKydK9ahzNgTCzRGP1NjNv6zGh1f6mfDy_cZvprYhD0AekWRkXyT5Zp5_TVFjCl36RC8931IyNdzOb68ZUHZKmaaDV9GCLGTd6MO3t656LClAtc1eA0s4E-g6uXf9cP5LhtV_y5bMijS089cQxcSdcTGcWtXr3K50xUmf8K29kfTg292Ko4DJNegzHzSP5F4hMi1aMTwx_jjK-EJezEF-I0D5Tk-vdbQe4Krlo9iBxkX3N_NbXVdt0wVyHfxmcdttQSzhxdzDiJJdkFE