 class="entity" data-qualified-name="LEFT . FLAT FeeExtract .F-C . F-D..GMN7" data-source-line="37" id="ent0008"><path d="M528.72,515.6361 L528.72,596.4602 A0,0 0 0 0 528.72,596.4602 L771.2792,596.4602 A0,0 0 0 0 771.2792,596.4602 L771.2792,525.6361 L761.2792,515.6361 L654,515.6361 L650,442.2961 L646,515.6361 L528.72,515.6361 A0,0 0 0 0 528.72,515.6361" fill="#E8F5E9" style="stroke:#666666;stroke-width:1;"/><path d="M761.2792,515.6361 L761.2792,525.6361 L771.2792,525.6361 L761.2792,515.6361" fill="#E8F5E9" style="stroke:#666666;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="221.5592" x="534.72" y="534.5331">CONSERVING TRANSFER, not a mint:</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="174.5542" x="534.72" y="552.2391">&#931;&#10214;c&#10215; debited == F_v credited.</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="221.2342" x="534.72" y="569.9451">Flat &#8212; exactly one token per deploy,</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="191.3732" x="534.72" y="587.6511">independent of cosigner count.</text></g><!--entity DA--><g class="entity" data-qualified-name="RIGHT . Balanced cost split .P8..DA" data-source-line="45" id="ent0011"><rect fill="#FFECB3" height="58.1358" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:1;" width="258.5591" x="115.72" y="526.9761"/><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="149.0014" x="125.72" y="551.942">DefaultApportionment</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="238.5591" x="125.72" y="571.0099">&#8212; split cost &#916; EQUALLY per cosigner</text></g><!--entity P1--><g class="entity" data-qualified-name="RIGHT . Balanced cost split .P8..P1" data-source-line="46" id="ent0012