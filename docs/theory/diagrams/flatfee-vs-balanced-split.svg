&#10215; &#8805; cost + fee).</text></g><!--link FFA to CPOOL--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="34" id="lnk5"><path d="M647.36,159.0061 C647.69,184.3161 648.0954,216.5665 648.4554,244.4165" fill="none" id="FFA-to-CPOOL" style="stroke:#C62828;stroke-width:1;"/><polygon fill="#C62828" points="648.52,249.4161,652.4033,240.3651,648.4554,244.4165,644.404,240.4685,648.52,249.4161" style="stroke:#C62828;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="84.4134" x="656.8763" y="201.465">draw ONE token</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="99.9259" x="649.12" y="216.4469">&#931;&#10214;c&#10215; &#8722;= fee   (carve)</text></g><!--link CPOOL to FV--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="35" id="lnk6"><path d="M649.29,327.1761 C649.47,351.8761 649.6717,378.0662 649.8217,397.6362" fill="none" id="CPOOL-to-FV" style="stroke:#2E7D32;stroke-width:1;"/><polygon fill="#2E7D32" points="649.86,402.6361,653.7909,393.6057,649.8217,397.6362,645.7911,393.667,649.86,402.6361" style="stroke:#2E7D32;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="95.4573" x="650.62" y="369.665">F_v += fee   (credit)</text></g><!--link DA to P1--><g class="link" data-entity-1="ent0011" data-entity-2="ent0012" data-link-type="dependency" data-source-line="50" id="lnk15"><path d="M213.32,585.3661 C198.82,598.4061 181.46,614.1361 166,628.4561 C149.84,643.4361 135.6155,656.8823 121.0855,670.7623" fill="none" id="DA-to-P1" style="stroke:#C62828;stroke-width:1;"/><polygon fill="#C62828" points="117.47,674.2161,126.7409,670.8917,121.0855,670.7623,121.2149,665.107,117.47,674.2161" style=