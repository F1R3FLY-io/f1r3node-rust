a-entity-1="part4" data-entity-2="part2" id="msg11"><polygon fill="#444444" points="253.4714,526.1941,243.4714,530.1941,253.4714,534.1941,249.4714,530.1941" style="stroke:#444444;stroke-width:1;"/><line style="stroke:#444444;stroke-width:1;stroke-dasharray:2,2;" x1="247.4714" x2="907.7517" y1="530.1941" y2="530.1941"/><text fill="#000000" font-family="'sans-serif'" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="13.7281" x="259.4714" y="524.678">11</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="139.3555" x="277.1995" y="524.678">match &#8594; (cont_a, data_a)</text></g><path d="M105,550.1941 L105,641.1941 L369,641.1941 L369,560.1941 L359,550.1941 L105,550.1941" fill="#E8F5E9" style="stroke:#000000;stroke-width:1;"/><path d="M359,550.1941 L359,560.1941 L369,560.1941 L359,550.1941" fill="#E8F5E9" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="243.5057" x="111" y="568.0221">ChargingRSpace::handle_result has applied</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="224.9776" x="111" y="584.3663">the pre-charge / refund / unified-COMM</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="225.0136" x="111" y="600.7104">sequence atomically. The net charge for</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="216.2896" x="111" y="617.0545">this COMM is determined by what was</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="223.8256" x="111" y="633.3986">matched, not by which side triggered it.</text><g class="message" data-entity-1="part2" data-entity-2="part2" id="msg12"><line style="stroke:#444444;stroke-width:1;" x1="242.4714" x2="284.4714" y1="669.2587" y2="669.2587"/><line style="stroke:#444444