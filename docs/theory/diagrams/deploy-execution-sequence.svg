" points="253.4714,960.6999,243.4714,964.6999,253.4714,968.6999,249.4714,964.6999" style="stroke:#444444;stroke-width:1;"/><line style="stroke:#444444;stroke-width:1;stroke-dasharray:2,2;" x1="247.4714" x2="562.7614" y1="964.6999" y2="964.6999"/><text fill="#000000" font-family="'sans-serif'" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="13.7281" x="259.4714" y="959.1839">19</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="192.0014" x="277.1995" y="959.1839">accumulated cost c (deterministic)</text></g><g class="message" data-entity-1="part2" data-entity-2="part1" id="msg20"><polygon fill="#444444" points="73.9024,991.044,63.9024,995.044,73.9024,999.044,69.9024,995.044" style="stroke:#444444;stroke-width:1;"/><line style="stroke:#444444;stroke-width:1;stroke-dasharray:2,2;" x1="67.9024" x2="236.4714" y1="995.044" y2="995.044"/><text fill="#000000" font-family="'sans-serif'" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="13.7281" x="79.9024" y="989.528">20</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="121.7409" x="97.6305" y="989.528">deploy result, cost = c</text></g><path d="M15,1008.044 L15,1230.044 L1322,1230.044 L1322,1018.044 L1312,1008.044 L15,1008.044" fill="#E8F5E9" style="stroke:#000000;stroke-width:1;"/><path d="M1312,1008.044 L1312,1018.044 L1322,1018.044 L1312,1008.044" fill="#E8F5E9" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="295.2501" x="499.5889" y="1025.8721">Cost is determined by the deploy, not by scheduling.</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="307.5622" x="499.5889" y="1042.2162">ChargingRSpace's pre-charge / refund / unified-COMM</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="329.6904" x="499.5889" y="1058.5603">strategy makes the externalized model order-independent</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="309.7702" x="499.5889" y="1074.9044">(empirically verified by cost_should_be_deterministic at</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="313.6702" x="499.5889" y="1091.2485">rholang/tests/accounting/cost_accounting_spec.rs:323).</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="3.12" x="499.5889" y="1107.5927">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="297.1341" x="499.5889" y="1123.9368">The internalized model proposed in &#167;4 upgrades this</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="285.17" x="499.5889" y="1140.2809">to a mechanized theorem (ca_cost_deterministic in</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="298.3941" x="499.5889" y="1156.625">Confluence.v), removes the per-task ChargingRSpace</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="293.2461" x="499.5889" y="1172.9691">overhead, and replaces this per-term tokio::spawn +</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="324.6384" x="499.5889" y="1189.3132">JoinHandle::await pattern with a single FuturesUnordered</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="309.5063" x="499.5889" y="1205.6573">driver (Section 5.4) &#8212; higher fan-out, completion-order</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="288.842" x="499.5889" y="1222.0015">draining, and short-circuit error propagation via `?`.</