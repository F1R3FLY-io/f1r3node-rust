<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="879px" preserveAspectRatio="none" style="width:1030px;height:879px;background:#FFFFFF;" version="1.1" viewBox="0 0 1030 879" width="1030px" zoomAndPan="magnify"><?plantuml $version$?><defs/><g><g class="title" data-source-line="25"><text fill="#000000" font-family="'sans-serif'" font-size="22" font-weight="700" lengthAdjust="spacing" textLength="998.1215" x="15" y="38.5181">One Cosigned, two keys &#8212; deploy_id (wire-sig) is decoupled from the funding pool (pubkey)</text><text fill="#000000" font-family="'sans-serif'" font-size="22" font-weight="700" lengthAdjust="spacing" textLength="322.3426" x="352.8894" y="68.4822">DR-13 &#167;D2.9: identity &#8800; wallet</text></g><!--entity SRC--><g class="entity" data-qualified-name="SRC" data-source-line="27" id="ent0001"><rect fill="#F8C3B8" height="58.1358" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:1;" width="218.7292" x="429.4461" y="92.9282"/><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="159.8794" x="439.4461" y="117.8941">Cosigned { wire_sig, pk }</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="198.7292" x="439.4461" y="136.9621">&#8212; the signed deploy envelope</text></g><!--entity ENV--><g class="entity" data-qualified-name="ENV" data-source-line="29" id="ent0002"><rect fill="#B2DFDB" height="77.2038" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:1;" width="296.8349" x="268.3861" y="242.0582"/><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="96.9356" x="278.3861" y="267.0241">envelope_sig =</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="153.3974" x="278.3861" y="286.0921">Sig::Quote(Blake2b256(</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="276.8349" x="278.3861" y="305.16">DEPLOY_SIGNATURE_DOMAIN &#8214; wire_sig))</text></g><!--entity FUND--><g class="entity" data-qualified-name="FUND" data-source-line="30" id="ent0003"><rect fill="#B2DFDB" height="58.1358" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:1;" width="122.2556" x="679.6761" y="251.5982"/><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="88.3956" x="689.6761" y="276.5641">funding_sig =</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="102.2556" x="689.6761" y="295.6321">Sig::Ground(pk)</text></g><!--entity DID--><g class="entity" data-qualified-name="DID" data-source-line="32" id="ent0004"><rect fill="#BBDEFB" height="77.2038" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:1;" width="210.4833" x="167.5661" y="504.2682"/><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="62.7758" x="177.5661" y="529.2341">deploy_id</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="184.0573" x="177.5661" y="548.3021">on-chain identity &#8212; STABLE,</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="190.4833" x="177.5661" y="567.37">byte-identical pre/post-&#167;D2.9</text></g><!--entity POOL--><g class="entity" data-qualified-name="POOL" data-source-line="33" id="ent0005"><rect fill="#C8E6C9" height="77.2038" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:1;" width="226.5397" x="623.5361" y="504.2682"/><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="180.1266" x="633.5361" y="529.2341">&#931;&#10214;Ground(pk)&#10215;  supply pool</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="206.5397" x="633.5361" y="548.3021">the wallet &#8212; gate proves &#931; &#8805; &#916;,</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="158.9274" x="633.5361" y="567.37">settlement debits &#931; &#8722;= &#916;</text></g><g class="entity" data-qualified-name="GMN11" data-source-line="54" id="ent0012"><path d="M555.1461,642.4682 L555.1461,705.5863 A0,0 0 0 0 555.1461,705.5863 L918.4754,705.5863 A0,0 0 0 0 918.4754,705.5863 L918.4754,652.4682 L908.4754,642.4682 L740.8061,642.4682 L736.8061,581.9182 L732.8061,642.4682 L555.1461,642.4682 A0,0 0 0 0 555.1461,642.4682" fill="#E8F5E9" style="stroke:#666666;stroke-width:1;"/><path d="M908.4754,642.4682 L908.4754,652.4682 L918.4754,652.4682 L908.4754,642.4682" fill="#E8F5E9" style="stroke:#666666;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="248.2443" x="561.1461" y="661.3652">&#931;&#10214;signer&#10215; == &#931;&#10214;Ground(pk)&#10215; == &#931;&#10214;wallet&#10215;</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="309.8293" x="561.1461" y="679.0712">Multi-sig: funding_sig is the left-assoc Sig::And-fold</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="342.3293" x="561.1461" y="696.7772">of Sig::Ground(pk&#7522;) over the signers who actually signed.</text></g><g class="entity" data-qualified-name="GMN14" data-source-line="60" id="ent0015"><path d="M107.6461,642.4682 L107.6461,705.5863 A0,0 0 0 0 107.6461,705.5863 L437.9683,705.5863 A0,0 0 0 0 437.9683,705.5863 L437.9683,652.4682 L427.9683,642.4682 L276.8061,642.4682 L272.8061,581.9182 L268.8061,642.4682 L107.6461,642.4682 A0,0 0 0 0 107.6461,642.4682" fill="#E3F2FD" style="stroke:#666666;stroke-width:1;"/><path d="M427.9683,642.4682 L427.9683,652.4682 L437.9683,652.4682 L427.9683,642.4682" fill="#E3F2FD" style="stroke:#666666;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="303.0562" x="113.6461" y="661.3652">deploy_id still derives from envelope_sig (the wire</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="309.3223" x="113.6461" y="679.0712">signature) &#8212; so it is byte-identical before and after</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="298.1669" x="113.6461" y="696.7772">&#167;D2.9. This IS the decoupling: identity &#8800; funding.</text></g><!--link SRC to ENV--><g class="link" data-entity-1="ent0001" data-entity-2="ent0002" data-link-type="dependency" data-source-line="36" id="lnk6"><path d="M502.7661,151.5482 C492.7561,160.4182 482.3061,170.6182 473.8061,181.0582 C458.7061,199.6182 447.4795,218.2461 437.3795,237.3861" fill="none" id="SRC-to-ENV" style="stroke:#000000;stroke-width:1;"/><polygon fill="#000000" points="435.0461,241.8082,442.784,235.7152,437.3795,237.3861,435.7087,231.9817,435.0461,241.8082" style="stroke:#000000;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="60.2686" x="506.4198" y="193.8171">derive from</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="123.4961" x="474.8061" y="208.799">wire_sig  (the signature)</text></g><!--link SRC to FUND--><g class="link" data-entity-1="ent0001" data-entity-2="ent0003" data-link-type="dependency" data-source-line="37" id="lnk7"><path d="M575.3861,151.3682 C611.8861,179.6682 663.6849,219.8542 700.2049,248.1742" fill="none" id="SRC-to-FUND" style="stroke:#000000;stroke-width:1;"/><polygon fill="#000000" points="704.1561,251.2382,699.4951,242.562,700.2049,248.1742,694.5927,248.8839,704.1561,251.2382" style="stroke:#000000;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="60.2686" x="671.0834" y="193.8171">derive from</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="96.6233" x="652.9061" y="208.799">pk  (the public key)</text></g><!--link ENV to DID--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="40" id="lnk8"><path d="M299.1561,319.5682 C287.6061,327.6582 277.3861,337.4382 269.8061,349.2682 C240.0361,395.7282 248.6289,457.4688 259.3989,498.9288" fill="none" id="ENV-to-DID" style="stroke:#2E7D32;stroke-width:1;"/><polygon fill="#2E7D32" points="260.6561,503.7682,262.2648,494.0516,259.3989,498.9288,254.5217,496.063,260.6561,503.7682" style="stroke:#2E7D32;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="38.9947" x="302.6343" y="409.0271">identity</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="102.6512" x="270.8061" y="424.009">(NOT a funding key)</text></g><!--link FUND to POOL--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="dependency" data-source-line="41" id="lnk9"><path d="M762.1961,310.0582 C769.6161,321.5982 777.0261,335.4582 780.8061,349.2682 C795.4761,402.8482 796.6161,421.0082 780.8061,474.2682 C777.7361,484.6082 775.1836,490.5967 769.4036,499.8567" fill="none" id="FUND-to-POOL" style="stroke:#2E7D32;stroke-width:1;"/><polygon fill="#2E7D32" points="766.7561,504.0982,774.9148,498.5815,769.4036,499.8567,768.1284,494.3454,766.7561,504.0982" style="stroke:#2E7D32;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="76.3175" x="812.9561" y="409.0271">keys the wallet</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="115.7575" x="793.2361" y="424.009">&#931;&#10214;signer&#10215; == &#931;&#10214;wallet&#10215;</text></g><!--link ENV to POOL--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="44" id="lnk10"><path d="M402.0661,319.6082 C388.2561,362.1782 374.5161,430.9382 409.8061,474.2682 C436.6261,507.1882 534.864,524.0405 618.254,532.8905" fill="none" id="ENV-to-POOL" style="stroke:#C62828;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#C62828" points="623.2261,533.4182,614.6985,528.4907,618.254,532.8905,613.8542,536.446,623.2261,533.4182" style="stroke:#C62828;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="134.5389" x="524.4498" y="362.0271">&#10007; pre-&#167;D2.9 funding edge</text><path d="M414.8061,371.2501 L414.8061,469.2501 L767.8061,469.2501 L767.8061,381.2501 L757.8061,371.2501 L414.8061,371.2501" fill="#FFEBEE" style="stroke:#666666;stroke-width:1;"/><path d="M757.8061,371.2501 L757.8061,381.2501 L767.8061,381.2501 L757.8061,371.2501" fill="#FFEBEE" style="stroke:#666666;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="321.3199" x="420.8061" y="390.1471">&#10007; pre-&#167;D2.9 BUG: the funding pool was keyed by the</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="328.1853" x="420.8061" y="407.8531">wire-sig Quote atom (envelope_sig). That channel was</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="315.1318" x="420.8061" y="425.5591">a fresh, genesis-absent pool &#8212; always absent &#8658; the</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="327.7302" x="420.8061" y="443.2652">wallet was NEVER debited. &#167;D2.9 (3a4e03eb) re-points</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="332.8263" x="420.8061" y="460.9712">funding to Sig::Ground(pk) and leaves deploy_id alone.</text></g><g class="legend" data-source-line="65"><rect fill="none" height="147.4754" rx="7.5" ry="7.5" style="stroke:#000000;stroke-width:1;" width="385.0726" x="321.5244" y="719.5863"/><text fill="#000000" font-family="'sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="35.1539" x="330.1644" y="741.5522">color</text><text fill="#000000" font-family="'sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="61.6278" x="372.5983" y="741.5522">meaning</text><rect fill="#F8C3B8" height="19.0679" style="stroke:none;stroke-width:1;" width="42.4338" x="326.5244" y="745.6542"/><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="3.64" x="326.5244" y="760.6201">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="226.2391" x="372.5983" y="760.6201">deployer / signed source envelope</text><rect fill="#B2DFDB" height="19.0679" style="stroke:none;stroke-width:1;" width="42.4338" x="326.5244" y="764.7221"/><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="3.64" x="326.5244" y="779.688">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="275.4209" x="372.5983" y="779.688">key-derivation step (middleware/function)</text><rect fill="#BBDEFB" height="19.0679" style="stroke:none;stroke-width:1;" width="42.4338" x="326.5244" y="783.79"/><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="3.64" x="326.5244" y="798.7559">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="239.707" x="372.5983" y="798.7559">on-chain identity (tuplespace-visible)</text><rect fi