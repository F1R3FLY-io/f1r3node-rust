<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="936px" preserveAspectRatio="none" style="width:1030px;height:936px;background:#FFFFFF;" version="1.1" viewBox="0 0 1030 936" width="1030px" zoomAndPan="magnify"><?plantuml $version$?><defs/><g><g class="title" data-source-line="25"><text fill="#000000" font-family="'sans-serif'" font-size="22" font-weight="700" lengthAdjust="spacing" textLength="998.1215" x="15" y="38.5181">One Cosigned, two keys &#8212; deploy_id (wire-sig) is decoupled from the funding pool (pubkey)</text><text fill="#000000" font-family="'sans-serif'" font-size="22" font-weight="700" lengthAdjust="spacing" textLength="322.3426" x="352.8894" y="68.4822">DR-13 &#167;D2.9: identity &#8800; wallet</text></g><!--entity SRC--><g class="entity" data-qualified-name="SRC" data-source-line="27" id="ent0001"><rect fill="#FFFFFF" height="77.2038" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:1;" width="218.7292" x="429.4461" y="92.9282"/><text fill="#000000" font-family="'sans-serif'" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="68.8378" x="504.3918" y="117.8941">&#171;#F8C3B8&#187;</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="159.8794" x="439.4461" y="136.9621">Cosigned { wire_sig, pk }</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="198.7292" x="439.4461" y="156.03">&#8212; the signed deploy envelope</text></g><!--entity ENV--><g class="entity" data-qualified-name="ENV" data-source-line="29" id="ent0002"><rect fill="#FFFFFF" height="96.2717" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:1;" width="296.8349" x="268.3861" y="261.1382"/><text fill="#000000" font-family="'sans-serif'" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="72.2677" x="380.6696" y="286.1041">&#171;#B2DFDB&#187;</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="96.9356" x="278.3861" y="305.1721">envelope_sig =</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="153.3974" x="278.3861" y="324.24">Sig::Quote(Blake2b256(</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="276.8349" x="278.3861" y="343.3079">DEPLOY_SIGNATURE_DOMAIN &#8214; wire_sig))</text></g><!--entity FUND--><g class="entity" data-qualified-name="FUND" data-source-line="30" id="ent0003"><rect fill="#FFFFFF" height="77.2038" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:1;" width="122.2556" x="679.6761" y="270.6682"/><text fill="#000000" font-family="'sans-serif'" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="72.2677" x="704.67" y="295.6341">&#171;#B2DFDB&#187;</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="88.3956" x="689.6761" y="314.7021">funding_sig =</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="102.2556" x="689.6761" y="333.77">Sig::Ground(pk)</text></g><!--entity DID--><g class="entity" data-qualified-name="DID" data-source-line="32" id="ent0004"><rect fill="#FFFFFF" height="96.2717" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:1;" width="210.4833" x="167.5661" y="542.4082"/><text fill="#000000" font-family="'sans-serif'" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="70.8117" x="237.4018" y="567.3741">&#171;#BBDEFB&#187;</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="62.7758" x="177.5661" y="586.4421">deploy_id</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="184.0573" x="177.5661" y="605.51">on-chain identity &#8212; STABLE,</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="190.4833" x="177.5661" y="624.5779">byte-identical pre/post-&#167;D2.9</text></g><!--entity POOL--><g class="entity" data-qualified-name="POOL" data-source-line="33" id="ent0005"><rect fill="#FFFFFF" height="96.2717" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:1;" width="226.5397" x="623.5361" y="542.4082"/><text fill="#000000" font-family="'sans-serif'" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="69.1738" x="702.219" y="567.3741">&#171;#C8E6C9&#187;</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="180.1266" x="633.5361" y="586.4421">&#931;&#10214;Ground(pk)&#10215;  supply pool</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="206.5397" x="633.5361" y="605.51">the wallet &#8212; gate proves &#931; &#8805; &#916;,</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="158.9274" x="633.5361" y="624.5779">settlement debits &#931; &#8722;= &#916;</text></g><g class="entity" data-qualified-name="GMN11" data-source-line="54" id="ent0012"><path d="M555.1461,699.6782 L555.1461,762.7963 A0,0 0 0 0 555.1461,762.7963 L918.4754,762.7963 A0,0 0 0 0 918.4754,762.7963 L918.4754,709.6782 L908.4754,699.6782 L740.8061,699.6782 L736.8061,638.8882 L732.8061,699.6782 L555.1461,699.6782 A0,0 0 0 0 555.1461,699.6782" fill="#E8F5E9" style="stroke:#666666;stroke-width:1;"/><path d="M908.4754,699.6782 L908.4754,709.6782 L918.4754,709.6782 L908.4754,699.6782" fill="#E8F5E9" style="stroke:#666666;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="248.2443" x="561.1461" y="718.5752">&#931;&#10214;signer&#10215; == &#931;&#10214;Ground(pk)&#10215; == &#931;&#10214;wallet&#10215;</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="309.8293" x="561.1461" y="736.2812">Multi-sig: funding_sig is the left-assoc Sig::And-fold</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="342.3293" x="561.1461" y="753.9872">of Sig::Ground(pk&#7522;) over the signers who actually signed.</text></g><g class="entity" data-qualified-name="GMN14" data-source-line="60" id="ent0015"><path d="M107.6461,699.6782 L107.6461,762.7963 A0,0 0 0 0 107.6461,762.7963 L437.9683,762.7963 A0,0 0 0 0 437.9683,762.7963 L437.9683,709.6782 L427.9683,699.6782 L276.8061,699.6782 L272.8061,638.8882 L268.8061,699.6782 L107.6461,699.6782 A0,0 0 0 0 107.6461,699.6782" fill="#E3F2FD" style="stroke:#666666;stroke-width:1;"/><path d="M427.9683,699.6782 L427.9683,709.6782 L437.9683,709.6782 L427.9683,699.6782" fill="#E3F2FD" style="stroke:#666666;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="303.0562" x="113.6461" y="718.5752">deploy_id still derives from envelope_sig (the wire</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="309.3223" x="113.6461" y="736.2812">signature) &#8212; so it is byte-identical before and after</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="298.1669" x="113.6461" y="753.9872">&#167;D2.9. This IS the decoupling: identity &#8800; funding.</text></g><!--link SRC to ENV--><g class="link" data-entity-1="ent0001" data-entity-2="ent0002" data-link-type="dependency" data-source-line="36" id="lnk6"><path d="M498.6761,170.5582 C489.9561,179.8082 481.1461,189.9782 473.8061,200.1382 C460.2661,218.8882 450.142,236.801 440.432,256.331" fill="none" id="SRC-to-ENV" style="stroke:#000000;stroke-width:1;"/><polygon fill="#000000" points="438.2061,260.8082,445.7945,254.5301,440.432,256.331,438.6311,250.9685,438.2061,260.8082" style="stroke:#000000;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="60.2686" x="506.4198" y="212.8971">derive from</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="123.4961" x="474.8061" y="227.879">wire_sig  (the signature)</text></g><!--link SRC to FUND--><g class="link" data-entity-1="ent0001" data-entity-2="ent0003" data-link-type="dependency" data-source-line="37" id="lnk7"><path d="M582.1461,170.2382 C616.1061,199.7882 659.3836,237.4367 693.4236,267.0467" fill="none" id="SRC-to-FUND" style="stroke:#000000;stroke-width:1;"/><polygon fill="#000000" points="697.1961,270.3282,693.0308,261.4035,693.4236,267.0467,687.7804,267.4394,697.1961,270.3282" style="stroke:#000000;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="60.2686" x="671.0834" y="212.8971">derive from</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="96.6233" x="652.9061" y="227.879">pk  (the public key)</text></g><!--link ENV to DID--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="40" id="lnk8"><path d="M296.5261,357.6582 C286.0061,366.0882 276.7361,375.9382 269.8061,387.4082 C241.5761,434.1082 247.6275,493.7849 257.6075,537.2649" fill="none" id="ENV-to-DID" style="stroke:#2E7D32;stroke-width:1;"/><polygon fill="#2E7D32" points="258.7261,542.1382,260.6113,532.4715,257.6075,537.2649,252.814,534.2612,258.7261,542.1382" style="stroke:#2E7D32;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="38.9947" x="302.6343" y="447.1671">identity</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="102.6512" x="270.8061" y="462.149">(NOT a funding key)</text></g><!--link FUND to POOL--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="dependency" data-source-line="41" id="lnk9"><path d="M764.9761,348.0782 C771.4261,360.1682 777.5161,373.9282 780.8061,387.4082 C793.9661,441.3782 795.0461,458.7082 780.8061,512.4082 C778.1161,522.5382 776.0702,528.3059 771.1102,537.8059" fill="none" id="FUND-to-POOL" style="stroke:#2E7D32;stroke-width:1;"/><polygon fill="#2E7D32" points="768.7961,542.2382,776.5073,536.1114,771.1102,537.8059,769.4156,532.4089,768.7961,542.2382" style="stroke:#2E7D32;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="76.3175" x="811.8061" y="447.1671">keys the wallet</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="115.7575" x="792.0861" y="462.149">&#931;&#10214;signer&#10215; == &#931;&#10214;wallet&#10215;</text></g><!--link ENV to POOL--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="44" id="lnk10"><path d="M399.2461,357.7582 C386.0461,402.5282 375.4861,469.0482 409.8061,512.4082 C436.3261,545.9082 534.6215,565.6553 618.1115,576.9953" fill="none" id="ENV-to-POOL" style="stroke:#C62828;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#C62828" points="623.0661,577.6682,614.6863,572.4933,618.1115,576.9953,613.6096,580.4205,623.0661,577.6682" style="stroke:#C62828;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="134.5389" x="524.4498" y="400.1671">&#10007; pre-&#167;D2.9 funding edge</text><path d="M414.8061,409.3901 L414.8061,507.3901 L767.8061,507.3901 L767.8061,419.3901 L757.8061,409.3901 L414.8061,409.3901" fill="#FFEBEE" style="stroke:#666666;stroke-width:1;"/><path d="M757.8061,409.3901 L757.8061,419.3901 L767.8061,419.3901 L757.8061,409.3901" fill="#FFEBEE" style="stroke:#666666;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="321.3199" x="420.8061" y="428.2871">&#10007; pre-&#167;D2.9 BUG: the funding pool was keyed by the</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="328.1853" x="420.8061" y="445.9931">wire-sig Quote atom (envelope_sig). That channel was</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="315.1318" x="420.8061" y="463.6991">a fresh, genesis-absent pool &#8212; always absent &#8658; the</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="327.7302" x="420.8061" y="481.4052">wallet was NEVER debited. &#167;D2.9 (3a4e03eb) re-points</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="332.8263" x="420.8061" y="499.1112">funding to Sig::Ground(pk) and leaves deploy_id alone.</text></g><g class="legend" data-source-line="65"><rect fill="none" height="147.4754" rx="7.5" ry="7.5" style="stroke:#000000;stroke-width:1;" width="385.0726" x="321.5244" y="776.7963"/><text fill="#000000" font-family="'sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="35.1539" x="330.1644" y="798.7622">color</text><text fill="#000000" font-family="'sans-serif'" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="61.6278" x="372.5983" y="798.7622">meaning</text><rect fill="#F8C3B8" height="19.0679" style="stroke:none;stroke-width:1;" width="42.4338" x="326.5244" y="802.8642"/><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="3.64" x="326.5244" y="817.8301">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="226.2391" x="372.5983" y="817.8301">deployer / signed source envelope</text><rect fill="#B2DFDB" height="19.0679" style="stroke:none;stroke-width:1;" width="42.4338" x="326.5244" y="821.9321"/><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="3.64" x="326.5244" y="836.898">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="275.4209" x="372.5983" y="836.898">key-derivation step (middleware/function)</text><rect fill="#BBDEFB" height="19.0679" style="stroke:none;stroke-width:1;" width="42.4338" x="326.5244" y="841"/><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="3.64" x="326.5244" y="855.9659">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="239.707" x="372.5983" y="855.9659">on-chain identity (tuplespace-visible)</text><rect fill="#C8E6C9" height="19.0679" style="stroke:none;stroke-width:1;" width="42.4338" x="326.5244" y="860.0679"/><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="3.64" x="326.5244" y="875.0339">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="245.6744" x="372.5983" y="875.0339">funding supply pool &#931;&#10214;&#183;&#10215; (accounting)</text><rect fill="#2E7D32" height="19.0679" style="stroke:none;stroke-width:1;" width="42.4338" x="326.5244" y="879.1358"/><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="3.64" x="326.5244" y="894.1018">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="303.9388" x="372.5983" y="894.1018">stable-identity / wallet-credit path (post-&#167;D2.9)</text><rect fill="#C62828" height="19.0679" style="stroke:none;stroke-width:1;" width="42.4338" x="326.5244" y="898.2038"/><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="3.64" x="326.5244" y="913.1697">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="14" lengthAdjust="spacing" textLength="325.3587" x="372.5983" y="913.1697">pre-&#167;D2.9 bug edge (wire-sig pool, never debited)</text><line style="stroke:#000000;stroke-width:1;" x1="326.5244" x2="701.597" y1="783.7963" y2="783.7963"/><line style="stroke:#000000;stroke-width:1;" x1="326.5244" x2="701.597" y1="802.8642" y2="802.8642"/><line style="stroke:#000000;stroke-width:1;" x1="326.5244" x2="701.597" y1="821.9321" y2="821.9321"/><line style="stroke:#000000;stroke-width:1;" x1="326.5244" x2="701.597" y1="841" y2="841"/><line style="stroke:#000000;stroke-width:1;" x1="326.5244" x2="701.597" y1="860.0679" y2="860.0679"/><line style="stroke:#000000;stroke-width:1;" x1="326.5244" x2="701.597" y1="879.1358" y2="879.1358"/><line style="stroke:#000000;stroke-width:1;" x1="326.5244" x2="701.597" y1="898.2038" y2="898.2038"/><line style="stroke:#000000;stroke-width:1;" x1="326.5244" x2="701.597" y1="917.2717" y2="917.2717"/><line style="stroke:#000000;stroke-width:1;" x1="326.5244" x2="326.5244" y1="783.7963" y2="917.2717"/><line style="stroke:#000000;stroke-width:1;" x1="368.9583" x2="368.9583" y1="783.7963" y2="917.2717"/><line style="stroke:#000000;stroke-width:1;" x1="701.597" x2="701.597" y1="783.7963" y2="917.2717"/></g><?plantuml-src VLRDRjj64BxpAQRMeHHWAhMKkB8G1x0aAZ2GIAbbfoYYm5YHGscXrIx1NKLGum2zjRq6GNifaA91coSeUiy3v1tg9-diaf8eEmrF4dT-lldccrb-OQOuHqW5uzBJCovJbh4vn9YmXJ0z9KsVqVcUPb876ZEUx9NC8ZLFbKHfXcOb43AC39CJWIKJFMMnMd8vWOG9NJuvoJArj1c6_7k4WuDFnOMN7a1RPJ5c7ILK1fM6UxnN9Uk-CjXcqMoIgOMC2xjUhzSC3svQbIBPftBe7izmG_074g6ZD9z8ZFV1B1NCSANX-eStn4SgrEgIn-0lUOO16LM1QteVgKKgC8OaKtCWCY4X3BRSL2a1VheOKv3gI7RFWeC6V7ZVhTUEMi1ZAewR5Lp__3iicH1eF6zRzTuQ1hm4c--I_kr3EeDN8sdXs3o5GOuCKBv0eLBSW_ltAxrcfz5kFdW0JCFmhBCJUMreGyBnI0xvfDNwPa7a-6t1PbWVr-yT-eGtVF9eyDtbyFHX_-JyuYoyx0uUdvpsYOrVDf2gLPUkNU_skkqyNTX_MivMaB6JxA5hav_ERdltBlhT7RGRtaTIoI2QaafBt14Jm_EJzgDmVoJ7AuD1VXGn0Mc6TrAbJP