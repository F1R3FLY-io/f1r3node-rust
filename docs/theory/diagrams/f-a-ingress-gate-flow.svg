ll="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="130.8728" cy="423.5265" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><rect fill="#C8E6C9" height="36.3441" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="188.5292" x="753.9872" y="191.3082"/><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="168.5292" x="763.9872" y="214.1363">build Cosigned { wire_sig, pk }</text><rect fill="#C8E6C9" height="52.6882" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="281.0378" x="707.7329" y="262.6523"/><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="103.9687" x="717.7329" y="285.4804">derive funding_sig</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="261.0378" x="717.7329" y="301.8245">(Sig::Ground(pk) / And-fold of Sig::Ground(pk&#7522;))</text><polygon fill="#FFE082" points="762.293,350.3406,934.2107,350.3406,946.2107,362.3406,934.2107,374.3406,762.293,374.3406,750.293,362.3406,762.293,350.3406" style="stroke:#333333;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="171.9177" x="762.293" y="366.6085">funding_sig.is_funding_former() ?</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="87.2622" x="663.0308" y="359.1176">yes &#183; g | #P | s&#8728;s</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="125.3331" x="946.2107" y="359.1176">no &#183; non-funding former</text><path d="M713.015,384.3406 L713.015,420.7526 L693.015,424.7526 L713.015,428.7526 L713.015,465.1646 A0,0 0 0 0 713.015,465.1646 L969.4972,465.1646 A0,0 0 0 0 969.4972,465.1646 L969.4972,394.3406 L959.4972,384.3406 L713.015,384.3406 A0,0 0 0 0 713.015,384.3406" fill="#FFF8E1" style="stroke:#666666;stroke-width:1;"/><path d="M959.4972,384.3406 L959.4972,394.3406 L969.4972,394.3406 L959.4972,384.3406" fill="#FFF8E1" style="stroke:#666666;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="190.1382" x="719.015" y="403.2376">GUARD (2): the regression lock.</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="235.4822" x="719.015" y="420.9436">envelope/funding derivation is already</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="229.0992" x="719.015" y="438.6496">total to Ground/And, so this branch is</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="172.7051" x="719.015" y="456.3556">always taken on valid traffic.</text><rect fill="#C8E6C9" height="52.6882" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="146.8543" x="546.1608" y="398.4085"/><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="97.4407" x="556.1608" y="421.2366">admit to the gate</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="126.8543" x="556.1608" y="437.5807">(key &#931;&#10214;s&#10215;, prove &#931; &#8805; &#916;)</text><path d="M1184.3343,384.3406 L1184.3343,420.7526 L1164.3343,424.7526 L1184.3343,428.7526 L1184.3343,465.1646 A0,0 0 0 0 1184.3343,465.1646 L1449.9945,465.1646 A0,0 0 0 0 1449.9945,465.1646 L1449.9945,394.3406 L1439.9945,384.3406 L1184.3343,384.3406 A0,0 0 0 0 1184.3343,384.3406" fill="#FFF8E1" style="stroke:#666666;stroke-width:1;"/><path d="M1439.9945,384.3406 L1439.9945,394.3406 L1449.9945,394.3406 L1439.9945,384.3406" fill="#FFF8E1" style="stroke:#666666;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="244.6602" x="1190.3343" y="403.2376">unreachable unless funding_sig is made</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="236.4962" x="1190.3343" y="420.9436">non-total by a future change &#8212; exactly</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="223.7302" x="1190.3343" y="438.6496">the regression F-A makes impossible</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="137.1241" x="1190.3343" y="456.3556">(belt-and-suspenders).</text><rect fill="#EF9A9A" height="52.6882" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="174.8371" x="989.4972" y="398.4085"/><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="126.8289" x="999.4972" y="421.2366">malformed &#8212; rejected</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="154.8371" x="999.4972" y="437.5807">(source_to_adt-failure path)</text><ellipse cx="1076.9158" cy="496.1646" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="1076.9158" cy="496.1646" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><ellipse cx="489.5623" cy="538.1646" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="489.5623" cy="538.1646" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#444444;stroke-width:1;" x1="489.5623" x2="489.5623" y1="80.9641" y2="100.9641"/><polygon fill="#444444" points="485.5623,90.9641,489.5623,100.9641,493.5623,90.9641,489.5623,94.9641" style="stroke:#444444;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#444444;stroke-width:1;" x1="130.8728" x2="130.8728" y1="243.9964" y2="310.0894"/><polygon fill="#444444" points="126.8728,300.0894,130.8728,310.0894,134.8728,300.0894,130.8728,304.0894" style="stroke:#444444;stroke-width:1;str