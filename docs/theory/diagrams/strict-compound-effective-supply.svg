<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="853px" preserveAspectRatio="none" style="width:1124px;height:853px;background:#FFFFFF;" version="1.1" viewBox="0 0 1124 853" width="1124px" zoomAndPan="magnify"><?plantuml $version$?><defs/><g><g class="title" data-source-line="23"><text fill="#000000" font-family="'sans-serif'" font-size="22" font-weight="700" lengthAdjust="spacing" textLength="923.5193" x="99.3013" y="38.5181">Strict compound deploy &#8212; fund from effective&#931;, not raw compound presence (&#167;D2.9)</text></g><ellipse cx="408.9445" cy="70.9641" fill="#FFFFFF" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFE0B2" height="52.6882" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="281.9019" x="267.9936" y="100.9641"/><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="206.1975" x="277.9936" y="123.7922">a strict, compound (multi-sig) deploy</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="261.9019" x="277.9936" y="140.1363">funding_sig = And(Ground(pk_l), Ground(pk_r))</text><rect fill="#C8E6C9" height="69.0323" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="276.4953" x="270.6968" y="173.6523"/><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="193.9214" x="280.6968" y="196.4804">genesis seeds the cosigner wallets</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="256.4953" x="280.6968" y="212.8245">&#931;&#10214;Ground(pk_l)&#10215;, &#931;&#10214;Ground(pk_r)&#10215; &#8212; but NOT</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="167.0559" x="280.6968" y="229.1686">the combined &#931;&#10214;And(&#8230;)&#10215; pool</text><rect fill="#B2DFDB" height="52.6882" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="313.7607" x="252.0641" y="262.6847"/><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="293.7607" x="262.0641" y="285.5128">effective&#931; = &#931;_compound (absent &#8658; 0) + min(&#931;_l, &#931;_r)</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="103.8247" x="262.0641" y="301.8569">(the Split/Join fold)</text><polygon fill="#FFE082" points="321.7591,335.3729,496.1299,335.3729,508.1299,347.3729,496.1299,359.3729,321.7591,359.3729,309.7591,347.3729,321.7591,335.3729" style="stroke:#333333;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="174.3708" x="321.7591" y="351.6409">what does the recompute key on?</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="193.9066" x="115.8525" y="344.1499">OLD &#8212; raw compound-pool presence</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="135.992" x="508.1299" y="344.1499">&#167;D2.9 &#8212; EFFECTIVE supply</text><rect fill="#EF9A9A" height="36.3441" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="244.4722" x="11" y="369.3729"/><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="224.4722" x="21" y="392.201">&#931;_compound is ABSENT &#8658; "not present"</text><path d="M252.6668,452.5272 L252.6668,471.2332 L232.6668,475.2332 L252.6668,479.2332 L252.6668,497.9392 A0,0 0 0 0 252.6668,497.9392 L539.998,497.9392 A0,0 0 0 0 539.998,497.9392 L539.998,462.5272 L529.998,452.5272 L252.6668,452.5272 A0,0 0 0 0 252.6668,452.5272" fill="#FFF8E1" style="stroke:#666666;stroke-width:1;"/><path d="M529.998,452.5272 L529.998,462.5272 L539.998,462.5272 L529.998,452.5272" fill="#FFF8E1" style="stroke:#666666;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="266.3313" x="258.6668" y="471.4242">The latent pre-&#167;D2.9 bug, exposed once the</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="253.6432" x="258.6668" y="489.1302">component wallets are genuinely funded.</text><rect fill="#EF9A9A" height="69.0323" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="198.8613" x="33.8055" y="440.717"/><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="178.8613" x="43.8055" y="463.5451">PLAY admits (it used effective&#931;),</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="178.6213" x="43.8055" y="479.8892">but REPLAY rejects (raw-absent)</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="115.8714" x="43.8055" y="496.2333">&#8658; play / replay FORK</text><ellipse cx="133.2361" cy="555.7494" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="133.2361" cy="555.7494" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><rect fill="#C8E6C9" height="69.0323" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="249.3096" x="559.998" y="369.3729"/><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="132.2396" x="569.998" y="392.201">effective&#931; &gt; 0 &#8658; ADMIT;</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="229.3096" x="569.998" y="408.5451">settle from the matched component pair</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="201.7574" x="569.998" y="424.8892">(left &#8722;= k, right &#8722;= k &#8212; balanced, P8)</text><rect fill="#C8E6C9" height="69.0323" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="246.8256" x="561.24" y="473.4052"/><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="171.0973" x="571.24" y="496.2333">settle-filter keeps the group iff</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="168.3604" x="571.24" y="512.5774">(strict &#8744; present(own pool)) &#8212;</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="226.8256" x="571.24" y="528.9216">mirrors the play-side early-admit exactly</text><path d="M822.4676,576.7494 L822.4676,613.1614 L802.4676,617.1614 L822.4676,621.1614 L822.4676,657.5734 A0,0 0 0 0 822.4676,657.5734 L1108.1219,657.5734 A0,0 0 0 0 1108.1219,657.5734 L1108.1219,586.7494 L1098.1219,576.7494 L822.4676,576.7494 A0,0 0 0 0 822.4676,576.7494" fill="#FFF8E1" style="stroke:#666666;stroke-width:1;"/><path d="M1098.1219,576.7494 L1098.1219,586.7494 L1108.1219,586.7494 L1098.1219,576.7494" fill="#FFF8E1" style="stroke:#666666;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="264.6542" x="828.4676" y="595.6464">effective_supply_with(raw, decompositions)</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="236.6132" x="828.4676" y="613.3524">is the already-proven Split/Join algebra</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="249.8082" x="828.4676" y="631.0584">(CAJoinConservation) applied at replay &#8212;</text><text fill="#000000" font-family="'sans-serif'" font-size="13" lengthAdjust="spacing" textLength="150.4751" x="828.4676" y="648.7644">no new proof obligation.</text><rect fill="#C8E6C9" height="52.6882" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="235.6295" x="566.8381" y="590.8173"/><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="215.6295" x="576.8381" y="613.6454">PLAY debit map == REPLAY recompute</text><text fill="#000000" font-family="'sans-serif'" font-size="12" lengthAdjust="spacing" textLength="210.6615" x="576.8381" y="629.9895">(byte-identical; non-strict unchanged)</text><ellipse cx="684.6529" cy="688.5734" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="684.6529" cy="688.5734" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#444444;stroke-width:1;" x1="408.9445" x2="408.9445" y1="80.9641" y2="100.9641"/><polygon fill="#444444" points="404.9445,90.9641,408.9445,100.9641,412.9445,90.9641,408.9445,94.9641" style="stroke:#444444;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#444444;stroke-width:1;" x1="408.9445" x2="408.9445" y1="153.6523" y2="173.6523"/><polygon fill="#444444" points="404.9445,163.6523,408.9445,173.6523,412.9445,163.6523,408.9445,167.6523" style="stroke:#444444;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#444444;stroke-width:1;" x1="408.9445" x2="408.9445" y1="242.6847" y2="262.6847"/><polygon fill="#444444" points="404.9445,252.6847,408.9445,262.6847,412.9445,252.6847,408.9445,256.6847" style="stroke:#444444;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#444444;stroke-width:1;" x1="133.2361" x2="133.2361" y1="405.717" y2="440.717"/><polygon fill="#444444" points="129.2361,430.717,133.2361,440.717,137.2361,430.717,133.2361,434.717" style="stroke:#444444;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#444444;stroke-width:1;" x1="133.2361" x2="133.2361" y1="509.7494" y2="544.7494"/><polygon fill="#444444" points="129.2361,534.7494,133.2361,544.7494,137.2361,534.7494,133.2361,538.7494" style="stroke:#444444;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><line style="stroke:#444