spacing" textLength="140.634" x="1485.74" y="758.4668">(filters slashed latest-msgs)</text></g><g class="entity" data-qualified-name="RaceWindow" data-source-line="79" id="ent0024"><path d="M11,84.9941 L11,214.8492 L233.1116,214.8492 L233.1116,94.9941 L223.1116,84.9941 L11,84.9941" fill="#FFE0B2" style="stroke:#E65100;stroke-width:1;"/><path d="M223.1116,84.9941 L223.1116,94.9941 L233.1116,94.9941 L223.1116,84.9941" fill="#FFE0B2" style="stroke:#E65100;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="173.6612" x="17" y="101.753">&#9888; Race window (Rust regression):</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="177.2527" x="17" y="116.7349">Casper.handle_invalid_block reads</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="188.0327" x="17" y="131.7168">Tracker, then writes without locking.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="184.8097" x="17" y="146.6987">Two threads can race and overwrite</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="191.7946" x="17" y="161.6806">accumulated hashes with Set::empty.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="149.8189" x="17" y="176.6625">Bug fix #2 (T-9.2) re-locks the</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="181.3007" x="17" y="191.6443">read-modify-write window through</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="201.1116" x="17" y="206.6262">Casper's access_equivocations_tracker.</text></g><!--link Validate to Casper--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="dependency" data-source-line="73" id="lnk20"><path d="