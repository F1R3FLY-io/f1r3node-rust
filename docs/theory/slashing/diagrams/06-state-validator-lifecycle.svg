<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="1404px" preserveAspectRatio="none" style="width:827px;height:1404px;background:#FFFFFF;" version="1.1" viewBox="0 0 827 1404" width="827px" zoomAndPan="magnify"><title>Validator lifecycle in the slashing protocol</title><defs/><g><g class="title" data-source-line="31"><text fill="#000000" font-family="'sans-serif'" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="460.3736" x="179.1637" y="38.5181">Validator lifecycle in the slashing protocol</text></g><g class="entity" data-qualified-name="Unbonded" id="ent0002"><rect fill="#ECEFF1" height="79.9276" rx="12.5" ry="12.5" style="stroke:#444444;stroke-width:1;" width="180.4009" x="306.56" y="916.6041"/><line style="stroke:#444444;stroke-width:1;" x1="306.56" x2="486.9609" y1="941.586" y2="941.586"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="54.7906" x="369.3651" y="933.363">Unbonded</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="142.031" x="311.56" y="958.3449">"(v, e&#8342;) &#8212; pre-bond lifetime.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="160.4009" x="311.56" y="973.3268">epoch tag e&#8342; is assigned on the</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="153.4159" x="311.56" y="988.3087">next successful bond deploy."</text></g><g class="entity" data-qualified-name="Bonded" id="ent0003"><rect fill="#C8E6C9" height="94.9094" rx="12.5" ry="12.5" style="stroke:#444444;stroke-width:1;" width="158.478" x="317.52" y="1102.5341"/><line style="stroke:#444444;stroke-width:1;" x1="317.52" x2="475.998" y1="1127.516" y2="1127.516"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="40.3367" x="376.5907" y="1119.293">Bonded</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="133.946" x="322.52" y="1144.2749">"(v, e&#8342;) &#8212; bonded lifetime;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="129.667" x="322.52" y="1159.2568">bond &gt; 0 (Bug #5 / T-9.5);</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="138.478" x="322.52" y="1174.2387">slash authorisation scoped</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="102.4312" x="322.52" y="1189.2206">to epoch e&#8342; (&#167;15.1)."</text></g><g class="entity" data-qualified-name="EquivocatorSuspect" id="ent0004"><rect fill="#FFF7EE" height="109.8913" rx="12.5" ry="12.5" style="stroke:#444444;stroke-width:1;" width="185.9107" x="560.8" y="1288.4441"/><line style="stroke:#444444;stroke-width:1;" x1="560.8" x2="746.7107" y1="1313.426" y2="1313.426"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="101.7053" x="602.9027" y="1305.203">EquivocatorSuspect</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="156.8039" x="565.8" y="1330.1849">"(v, e&#8342;) &#8212; documentation-only.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="156.1109" x="565.8" y="1345.1668">Detector saw 1 of 2 conflicting</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="163.4479" x="565.8" y="1360.1487">blocks. In Rust, code transitions</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="165.9107" x="565.8" y="1375.1306">Bonded &#8594; EquivocatorRecorded</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="143.626" x="565.8" y="1390.1125">directly in one atomic step."</text></g><g class="entity" data-qualified-name="EquivocatorRecorded" id="ent0005"><rect fill="#FFE0B2" height="64.9457" rx="12.5" ry="12.5" style="stroke:#444444;stroke-width:1;" width="171.9859" x="335.76" y="62.9641"/><line style="stroke:#444444;stroke-width:1;" x1="335.76" x2="507.7459" y1="87.946" y2="87.946"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="110.6372" x="366.4343" y="79.723">EquivocatorRecorded</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="151.9859" x="340.76" y="104.7049">"(v, e&#8342;) &#8212; EquivocationRecord</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="133.7591" x="340.76" y="119.6868">persisted in tracker store"</text></g><g class="entity" data-qualified-name="SlashPending" id="ent0006"><rect fill="#FFCDD2" height="64.9457" rx="12.5" ry="12.5" style="stroke:#444444;stroke-width:1;" width="188.1338" x="168.69" y="248.9141"/><line style="stroke:#444444;stroke-width:1;" x1="168.69" x2="356.8238" y1="273.896" y2="273.896"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="69.9375" x="227.7882" y="265.673">SlashPending</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="155.5389" x="173.69" y="290.6549">"(v, e&#8342;) &#8212; SlashDeploy emitted</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="168.1338" x="173.69" y="305.6368">by a proposer; not yet executed"</text></g><g class="entity" data-qualified-name="Slashed" id="ent0007"><rect fill="#D7CCC8" height="94.9094" rx="12.5" ry="12.5" style="stroke:#444444;stroke-width:1;" width="213.8626" x="155.82" y="419.8641"/><line style="stroke:#444444;stroke-width:1;" x1="155.82" x2="369.6826" y1="444.846" y2="444.846"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="40.0837" x="242.7094" y="436.623">Slashed</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="114.9932" x="160.82" y="461.6049">"(v, e&#8342;) &#8212; Bond zeroed</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="88.1094" x="160.82" y="476.5868">(allBonds[v] := 0).</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="123.6281" x="160.82" y="491.5687">Projection of the atomic</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="193.8626" x="160.82" y="506.5506">stateUpdateCh! at PoS.rhox:473-482."</text></g><g class="entity" data-qualified-name="Removed" id="ent0008"><rect fill="#B0BEC5" height="124.8732" rx="12.5" ry="12.5" style="stroke:#444444;stroke-width:1;" width="205.2497" x="261.13" y="630.7541"/><line style="stroke:#444444;stroke-width:1;" x1="261.13" x2="466.3797" y1="655.736" y2="655.736"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="48.5426" x="339.4835" y="647.513">Removed</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="125.8941" x="266.13" y="672.4949">"(v, e&#8342;) &#8212; Removed from</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="154.021" x="266.13" y="687.4768">activeValidators (same atomic</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="165.6589" x="266.13" y="702.4587">stateUpdate as Slashed; the two</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="153.6689" x="266.13" y="717.4406">are not separately observable</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="155.1209" x="266.13" y="732.4225">in the implementation but are</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="185.2497" x="266.13" y="747.4043">listed separately to match spec &#167;6)."</text></g><g class="start_entity" data-qualified-name=".start." data-source-line="41" id="ent0002"><ellipse cx="549.76" cy="693.1841" fill="#FFFFFF" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="67" id="ent0003"><path d="M542.31,67.9641 L542.31,91.4441 L507.94,95.4441 L542.31,99.4441 L542.31,122.9098 A0,0 0 0 0 542.31,122.9098 L749.1977,122.9098 A0,0 0 0 0 749.1977,122.9098 L749.1977,77.9641 L739.1977,67.9641 L542.31,67.9641 A0,0 0 0 0 542.31,67.9641" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M739.1977,67.9641 L739.1977,77.9641 L749.1977,77.9641 L739.1977,67.9641" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="150.6989" x="548.31" y="84.723">Bug fix #2 (T-9.2) ensures the</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="134.1221" x="548.31" y="99.7049">transition into this state is</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="185.8877" x="548.31" y="114.6868">atomic under concurrent insertions.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="73" id="ent0006"><path d="M391.42,253.9141 L391.42,277.3841 L356.93,281.3841 L391.42,285.3841 L391.42,308.8598 A0,0 0 0 0 391.42,308.8598 L626.0935,308.8598 A0,0 0 0 0 626.0935,308.8598 L626.0935,263.9141 L616.0935,253.9141 L391.42,253.9141 A0,0 0 0 0 391.42,253.9141" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M616.0935,253.9141 L616.0935,263.9141 L626.0935,263.9141 L616.0935,253.9141" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="210.5605" x="397.42" y="270.673">Bug fix #4 (T-9.4) ensures a deterministic</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="213.6735" x="397.42" y="285.6549">failure path back to EquivocatorRecorded</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="156.0999" x="397.42" y="300.6368">if the Coop-vault transfer fails.</text></g><g class="entity" data-qualified-name="GMN8" data-source-line="79" id="ent0009"><path d="M293.36,1315.9141 L293.36,1370.8598 A0,0 0 0 0 293.36,1370.8598 L500.1597,1370.8598 A0,0 0 0 0 500.1597,1370.8598 L500.1597,1325.9141 L490.1597,1315.9141 L400.76,1315.9141 L396.76,1197.8141 L392.76,1315.9141 L293.36,1315.9141 A0,0 0 0 0 293.36,1315.9141" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M490.1597,1315.9141 L490.1597,1325.9141 L500.1597,1325.9141 L490.1597,1315.9141" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="181.8947" x="299.36" y="1332.673">Bug fix #5 (T-9.5): a stake-0 bonded</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="171.7968" x="299.36" y="1347.6549">validator should be impossible &#8212;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="185.7997" x="299.36" y="1362.6368">enforced by assert(stake &gt; 0) in PoS.</text></g><g class="entity" data-qualified-name="GMN11" data-source-line="85" id="ent0012"><path d="M11,620.7641 L11,765.6011 A0,0 0 0 0 11,765.6011 L226.5116,765.6011 A0,0 0 0 0 226.5116,765.6011 L226.5116,630.7641 L216.5116,620.7641 L168.79,620.7641 L232.57,515.2441 L160.79,620.7641 L11,620.7641 A0,0 0 0 0 11,620.7641" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M216.5116,620.7641 L216.5116,630.7641 L226.5116,630.7641 L216.5116,620.7641" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="194.5116" x="17" y="637.523">Slashed and Removed are retained as</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="166.9459" x="17" y="652.5049">distinct lifecycle states matching</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="179.4637" x="17" y="667.4868">spec &#167;6, but in the implementation</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="166.9568" x="17" y="682.4687">they are projections of the same</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="160.2909" x="17" y="697.4506">atomic Rholang stateUpdate at</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="160.9508" x="17" y="712.4325">PoS.rhox:473-482. They are not</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="136.388" x="17" y="727.4143">separately observable; the</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="167.2417" x="17" y="742.3962">Slashed &#8594; Removed transition is</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="144.726" x="17" y="757.3781">conceptually instantaneous.</text></g><!--link *start* to Unbonded--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="41" id="lnk3"><path d="M551.45,703.2341 C556.46,732.6641 568.39,827.2241 527.76,886.6041 C517.52,901.5641 508.126,910.4022 492.446,919.8722" fill="none" id="*start*-to-Unbonded" style="stroke:#2E7D32;stroke-width:1;"/><polygon fill="#2E7D32" points="487.31,922.9741,497.0819,921.7452,491.59,920.3892,492.946,914.8973,487.31,922.9741" style="stroke:#2E7D32;stroke-width:1;"/></g><!--link Unbonded to Bonded--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="51" id="lnk4"><path d="M396.76,996.7641 C396.76,1027.2841 396.76,1063.7441 396.76,1096.0641" fill="none" id="Unbonded-to-Bonded" style="stroke:#2E7D32;stroke-width:1;"/><polygon fill="#2E7D32" points="396.76,1102.0641,400.76,1093.0641,396.76,1097.0641,392.76,1093.0641,396.76,1102.0641" style="stroke:#2E7D32;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="114.9932" x="400.5375" y="1039.293">Bond deploy succeeds</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="109.7242" x="403.172" y="1054.2749">(@PoS!("bond", &#8230;)) &#8212;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="120.5482" x="397.76" y="1069.2568">lifetime tag e&#8342; assigned</text></g><!--link Bonded to Bonded--><g class="link" data-entity-1="ent0003" data-entity-2="ent0003" data-link-type="dependency" data-source-line="53" id="lnk5"><path d="M476.3,1132.7941 C496.16,1134.0041 510.99,1139.7341 510.99,1149.9841 C510.99,1160.2441 502.1491,1165.6122 482.2891,1166.8122" fill="none" id="Bonded-to-Bonded" style="stroke:#2E7D32;stroke-width:1;"/><polygon fill="#2E7D32" points="476.3,1167.1741,485.5249,1170.624,481.2909,1166.8725,485.0424,1162.6386,476.3,1167.1741" style="stroke:#2E7D32;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="74.8215" x="539.5893" y="1147.243">honest activity</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="120.0202" x="516.99" y="1162.2249">(propose, 