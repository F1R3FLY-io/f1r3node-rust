<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="1402px" preserveAspectRatio="none" style="width:615px;height:1402px;background:#FFFFFF;" version="1.1" viewBox="0 0 615 1402" width="615px" zoomAndPan="magnify"><title>Validator lifecycle in the slashing protocol</title><defs/><g><g class="title" data-source-line="30"><text fill="#000000" font-family="'sans-serif'" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="460.3736" x="72.94" y="38.5181">Validator lifecycle in the slashing protocol</text></g><g class="entity" data-qualified-name="Unbonded" id="ent0002"><rect fill="#FFFFFF" height="50" rx="12.5" ry="12.5" style="stroke:#444444;stroke-width:1;" width="74.7906" x="323.53" y="142.9641"/><line style="stroke:#444444;stroke-width:1;" x1="323.53" x2="398.3206" y1="167.946" y2="167.946"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="54.7906" x="333.53" y="159.723">Unbonded</text></g><g class="entity" data-qualified-name="Bonded" id="ent0003"><rect fill="#C8E6C9" height="50" rx="12.5" ry="12.5" style="stroke:#444444;stroke-width:1;" width="60.3367" x="330.75" y="283.9641"/><line style="stroke:#444444;stroke-width:1;" x1="330.75" x2="391.0867" y1="308.946" y2="308.946"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="40.3367" x="340.75" y="300.723">Bonded</text></g><g class="entity" data-qualified-name="EquivocatorSuspect" id="ent0004"><rect fill="#FFF7EE" height="109.8913" rx="12.5" ry="12.5" style="stroke:#444444;stroke-width:1;" width="188.1558" x="150.84" y="424.9641"/><line style="stroke:#444444;stroke-width:1;" x1="150.84" x2="338.9958" y1="449.946" y2="449.946"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="101.7053" x="194.0653" y="441.723">EquivocatorSuspect</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="163.4368" x="155.84" y="466.7049">"(documentation-only) Detector</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="146.882" x="155.84" y="481.6868">saw 1 of 2 conflicting blocks.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="168.1558" x="155.84" y="496.6687">In Rust, code transitions Bonded</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="163.6227" x="155.84" y="511.6506">&#8594; EquivocatorRecorded directly</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="102.7173" x="155.84" y="526.6325">in one atomic step."</text></g><g class="entity" data-qualified-name="EquivocatorRecorded" id="ent0005"><rect fill="#FFE0B2" height="64.9457" rx="12.5" ry="12.5" style="stroke:#444444;stroke-width:1;" width="177.9369" x="155.95" y="625.8541"/><line style="stroke:#444444;stroke-width:1;" x1="155.95" x2="333.8869" y1="650.836" y2="650.836"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="110.6372" x="189.5998" y="642.613">EquivocatorRecorded</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="157.9369" x="160.95" y="667.5949">"EquivocationRecord persisted</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="83.0714" x="160.95" y="682.5768">in tracker store"</text></g><g class="entity" data-qualified-name="SlashPending" id="ent0006"><rect fill="#FFCDD2" height="64.9457" rx="12.5" ry="12.5" style="stroke:#444444;stroke-width:1;" width="188.1338" x="150.85" y="781.8041"/><line style="stroke:#444444;stroke-width:1;" x1="150.85" x2="338.9838" y1="806.786" y2="806.786"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="69.9375" x="209.9482" y="798.563">SlashPending</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="110.8022" x="155.85" y="823.5449">"SlashDeploy emitted</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="168.1338" x="155.85" y="838.5268">by a proposer; not yet executed"</text></g><g class="entity" data-qualified-name="Slashed" id="ent0007"><rect fill="#D7CCC8" height="79.9276" rx="12.5" ry="12.5" style="stroke:#444444;stroke-width:1;" width="213.8626" x="137.99" y="952.7541"/><line style="stroke:#444444;stroke-width:1;" x1="137.99" x2="351.8526" y1="977.736" y2="977.736"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="40.0837" x="224.8794" y="969.513">Slashed</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="161.2258" x="142.99" y="994.4949">"Bond zeroed (allBonds[v] := 0).</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="123.6281" x="142.99" y="1009.4768">Projection of the atomic</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="193.8626" x="142.99" y="1024.4587">stateUpdateCh! at PoS.rhox:473-482."</text></g><g class="entity" data-qualified-name="Removed" id="ent0008"><rect fill="#B0BEC5" height="124.8732" rx="12.5" ry="12.5" style="stroke:#444444;stroke-width:1;" width="215.8427" x="12" y="1148.6541"/><line style="stroke:#444444;stroke-width:1;" x1="12" x2="227.8427" y1="1173.636" y2="1173.636"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="48.5426" x="95.65" y="1165.413">Removed</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="165.8898" x="17" y="1190.3949">"Removed from activeValidators</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="195.8427" x="17" y="1205.3768">(same atomic stateUpdate as Slashed;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="135.772" x="17" y="1220.3587">the two are not separately</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="174.8107" x="17" y="1235.3406">observable in the implementation</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="138.1481" x="17" y="1250.3225">but are listed separately to</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="84.4134" x="17" y="1265.3043">match spec &#167;6)."</text></g><g class="start_entity" data-qualified-name=".start." data-source-line="40" id="ent0002"><ellipse cx="360.92" cy="71.9641" fill="#FFFFFF" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/></g><g class="end_entity" data-qualified-name=".end." data-source-line="62" id="ent0012"><ellipse cx="119.92" cy="1385.5141" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="119.92" cy="1385.5141" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN2" data-source-line="65" id="ent0003"><path d="M368.48,630.8541 L368.48,654.3341 L334.04,658.3341 L368.48,662.3341 L368.48,685.7998 A0,0 0 0 0 368.48,685.7998 L575.3677,685.7998 A0,0 0 0 0 575.3677,685.7998 L575.3677,640.8541 L565.3677,630.8541 L368.48,630.8541 A0,0 0 0 0 368.48,630.8541" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M565.3677,630.8541 L565.3677,640.8541 L575.3677,640.8541 L565.3677,630.8541" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="150.6989" x="374.48" y="647.613">Bug fix #2 (T-9.2) ensures the</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="134.1221" x="374.48" y="662.5949">transition into this state is</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="185.8877" x="374.48" y="677.5768">atomic under concurrent insertions.</text></g><g class="entity" data-qualified-name="GMN5" data-source-line="71" id="ent0006"><path d="M373.58,786.8041 L373.58,810.2741 L339.09,814.2741 L373.58,818.2741 L373.58,841.7498 A0,0 0 0 0 373.58,841.7498 L608.2535,841.7498 A0,0 0 0 0 608.2535,841.7498 L608.2535,796.8041 L598.2535,786.8041 L373.58,786.8041 A0,0 0 0 0 373.58,786.8041" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M598.2535,786.8041 L598.2535,796.8041 L608.2535,796.8041 L598.2535,786.8041" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="210.5605" x="379.58" y="803.563">Bug fix #4 (T-9.4) ensures a deterministic</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="213.6735" x="379.58" y="818.5449">failure path back to EquivocatorRecorded</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="156.0999" x="379.58" y="833.5268">if the Coop-vault transfer fails.</text></g><g class="entity" data-qualified-name="GMN8" data-source-line="77" id="ent0009"><path d="M373.52,452.4441 L373.52,507.3898 L580.3197,507.3898 L580.3197,462.4441 L570.3197,452.4441 L373.52,452.4441" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M570.3197,452.4441 L570.3197,462.4441 L580.3197,462.4441 L570.3197,452.4441" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="181.8947" x="379.52" y="469.203">Bug fix #5 (T-9.5): a stake-0 bonded</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="171.7968" x="379.52" y="484.1849">validator should be impossible &#8212;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="185.7997" x="379.52" y="499.1668">enforced by assert(stake &gt; 0) in PoS.</text></g><g class="entity" data-qualified-name="GMN11" data-source-line="83" id="ent0012"><path d="M263.17,1138.6741 L263.17,1283.5111 L478.6816,1283.5111 L478.6816,1148.6741 L468.6816,1138.6741 L263.17,1138.6741" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M468.6816,1138.6741 L468.6816,1148.6741 L478.6816,1148.6741 L468.6816,1138.6741" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="194.5116" x="269.17" y="1155.433">Slashed and Removed are retained as</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="166.9459" x="269.17" y="1170.4149">distinct lifecycle states matching</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="179.4637" x="269.17" y="1185.3968">spec &#167;6, but in the implementation</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="166.9568" x="269.17" y="1200.3787">they are projections of the same</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="160.2909" x="269.17" y="1215.3606">atomic Rholang stateUpdate at</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="160.9508" x="269.17" y="1230.3425">PoS.rhox:473-482. They are not</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="136.388" x="269.17" y="1245.3243">separately observable; the</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="167.2417" x="269.17" y="1260.3062">Slashed &#8594; Removed transition is</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="144.726" x="269.17" y="1275.2881">conceptually instantaneous.</text></g><!--link *start* to Unbonded--><g class="link" data-entity-1="ent0002" data-entity-2="ent0002" data-link-type="dependency" data-source-line="40" id="lnk3"><path d="M360.92,82.3241 C360.92,96.2541 360.92,116.9241 360.92,136.6141" fill="none" id="*start*-to-Unbonded" style="stroke:#000000;stroke-width:1;"/><polygon fill="#000000" points="360.92,142.6141,364.92,133.6141,360.92,137.6141,356.92,133.6141,360.92,142.6141" style="stroke:#000000;stroke-width:1;"/></g><!--link Unbonded to Bonded--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="50" id="lnk4"><path d="M360.92,193.1741 C360.92,218.5341 360.92,252.1341 360.92,277.5641" fill="none" id="Unbonded-to-Bonded" style="stroke:#2E7D32;stroke-width:1;"/><polygon fill="#2E7D32" points="360.92,283.5641,364.92,274.5641,360.92,278.5641,356.92,274.5641,360.92,283.5641" style="stroke:#2E7D32;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="114.9932" x="361.92" y="235.723">Bond deploy succeeds</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="95.8643" x="371.4844" y="250.7049">(@PoS!("bond", &#8230;))</text></g><!--link Bonded to Bonded--><g class="link" data-entity-1="ent0003" data-entity-2="ent0003" data-link-type="dependency" data-source-line="51" id="lnk5"><path d="M391.43,296.5241 C409.33,293.8741 426.09,298.0241 426.09,308.9641 C426.09,319.9141 415.2653,324.9428 397.3653,322.2928" fill="none" id="Bonded-to-Bonded" style="stroke:#2E7D32;stroke-width:1;"/><polygon fill="#2E7D32" points="391.43,321.4141,399.7472,326.689,396.3761,322.1463,400.9188,318.7753,391.43,321.4141" style="stroke:#2E7D32;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="74.8215" x="454.6893" y="306.223">honest activity</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="120.0202" x="432.09" y="321.2049">(propose, validate, etc.)</text></g><!--link Bonded to EquivocatorSuspect--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="53" id="lnk6"><path d="M340.66,334.2741 C333.28,343.4141 325.02,354.0141 317.92,363.9641 C304.13,383.3141 293.1056,400.0996 280.9256,419.5396" fill="none" id="Bonded-to-EquivocatorSuspect" style="stroke:#C62828;stroke-width:1;"/><polygon fill="#C62828" points="277.74,424.6241,285.9081,419.1212,280.3947,420.3871,279.1288,414.8737,277.74,424.6241" style="stroke:#C62828;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="92.9493" x="338.1864" y="376.723">detector observes</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="131.4821" x="318.92" y="391.7049">conflicting block_2 by self</text></g><!--link EquivocatorSuspect to EquivocatorRecorded--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="54" id="lnk7"><path d="M244.92,535.2841 C244.92,564.8441 244.92,594.3841 244.92,619.4741" fill="none" id="EquivocatorSuspect-to-EquivocatorRecorded" style="stroke:#E65100;stroke-width:1;"/><polygon fill="#E65100" points="244.92,625.4741,248.92,616.4741,244.92,620.4741,240.92,616.4741,244.92,625.4741" style="stroke:#E65100;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="139.941" x="245.92" y="577.613">insert_equivocation_record</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength