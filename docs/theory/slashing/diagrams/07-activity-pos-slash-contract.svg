<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1111px" preserveAspectRatio="none" style="width:1194px;height:1111px;background:#FFFFFF;" version="1.1" viewBox="0 0 1194 1111" width="1194px" zoomAndPan="magnify"><title>PoS.slash() &#8212; activity flow</title><defs/><g><g class="title" data-source-line="35"><text fill="#000000" font-family="'sans-serif'" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="285.4729" x="453.0803" y="38.5181">PoS.slash() &#8212; activity flow</text></g><ellipse cx="736.95" cy="65.9641" fill="#FFFFFF" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#BBDEFB" height="34.9819" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="312.6199" x="580.6401" y="95.9641"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="292.6199" x="590.6401" y="117.723">receive (deployerId, blockHash, sysAuthToken, returnCh)</text><path d="M851.1448,140.946 L851.1448,225.8554 L1187.6335,225.8554 L1187.6335,150.946 L1177.6335,140.946 L851.1448,140.946" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1177.6335,140.946 L1177.6335,150.946 L1187.6335,150.946 L1177.6335,140.946" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="199.0985" x="857.1448" y="157.7049">Auth-token check at PoS.rhox:437-439:</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="309.7687" x="862.8647" y="172.6868">sysAuthTokenOps!("check", sysAuthToken, *isValidTokenCh)</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="239.9633" x="862.8647" y="187.6687">for (@isValid &lt;- isValidTokenCh) { if (isValid) ... }</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="265.5711" x="857.1448" y="202.6506">The auth token is unforgeable; only system deploys</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="87.7024" x="857.1448" y="217.6325">carry a valid one.</text><polygon fill="#FFF8E1" points="634.7553,225.8554,839.1448,225.8554,851.1448,237.8554,839.1448,249.8554,634.7553,249.8554,622.7553,237.8554,634.7553,225.8554" style="stroke:#E65100;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="204.3895" x="634.7553" y="242.1234">sysAuthTokenOps.check(sysAuthToken)</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="24.1998" x="598.5554" y="234.6325">valid</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="33.8358" x="851.1448" y="234.6325">invalid</text><path d="M650.1403,268.3826 L650.1403,338.3101 L832.9491,338.3101 L832.9491,278.3826 L822.9491,268.3826 L650.1403,268.3826" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M822.9491,268.3826 L822.9491,278.3826 L832.9491,278.3826 L822.9491,268.3826" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="161.8088" x="656.1403" y="285.1415">The two reads are independent</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="123.6391" x="656.1403" y="300.1234">(parallel composition `|`</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="134.54" x="656.1403" y="315.1053">in PoS.rhox:443-445); they</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="107.3812" x="656.1403" y="330.0872">join before runMVar.</text><rect fill="#000000" height="6" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="416.5245" x="213.6158" y="259.8554"/><rect fill="#BBDEFB" height="34.9819" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="186.5707" x="227.6158" y="285.8554"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="166.5707" x="237.6158" y="307.6143">getInvalidBlocks &#8594; invalidBlocks</text><rect fill="#BBDEFB" height="34.9819" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="173.9538" x="442.1866" y="285.8554"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="153.9538" x="452.1866" y="307.6143">getUser(deployerId) &#8594; userPk</text><rect fill="#000000" height="6" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="416.5245" x="213.6158" y="340.8373"/><rect fill="#ECEFF1" height="34.9819" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="248.7984" x="297.4789" y="366.8373"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="228.7984" x="307.4789" y="388.5962">runMVar(stateCh, stateProcessCh, returnCh)</text><polygon fill="#FFF8E1" points="353.876,421.8192,489.8802,421.8192,501.8802,433.8192,489.8802,445.8192,353.876,445.8192,341.876,433.8192,353.876,421.8192" style="stroke:#E65100;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="136.0042" x="353.876" y="438.0872">blockHash &#8712; invalidBlocks</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="17.0829" x="324.7931" y="430.5962">yes</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="13.4529" x="501.8802" y="430.5962">no</text><rect fill="#BBDEFB" height="34.9819" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="208.4166" x="226.6108" y="455.8192"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="188.4166" x="236.6108" y="477.5781">validator &#8592; invalidBlocks[blockHash]</text><path d="M590.8466,455.8192 L590.8466,516.7468 L570.8466,520.7468 L590.8466,524.7468 L590.8466,585.6743 A0,0 0 0 0 590.8466,585.6743 L855.4287,585.6743 A0,0 0 0 0 855.4287,585.6743 L855.4287,465.8192 L845.4287,455.8192 L590.8466,455.8192 A0,0 0 0 0 590.8466,455.8192" fill="#FFCDD2" style="stroke:#000000;stroke-width:1;"/><path d="M845.4287,455.8192 L845.4287,465.8192 L855.4287,465.8192 L845.4287,455.8192" fill="#FFCDD2" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="8.7559" x="596.8466" y="472.5781">&#9940;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="195.5786" x="608.4625" y="472.5781">Branch removed by Bug #12 / T-9.13</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="243.5821" x="596.8466" y="487.56">(`main_T9_13_unknown_slash_evidence_noop`).</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="239.6553" x="596.8466" y="502.5419">Per spec &#167;15.2, an unknown invalid-block hash</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="185.9317" x="596.8466" y="517.5238">is no longer a slashable witness: the</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="216.3245" x="596.8466" y="532.5057">pre-replay authorization guard rejects the</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="213.1895" x="596.8466" y="547.4876">deploy and PoS state is not mutated. This</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="207.9756" x="596.8466" y="562.4694">branch is retained for historical diagram</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="156.6499" x="596.8466" y="577.4513">fidelity and is dead post-&#167;15.2.</text><rect fill="#FFCDD2" height="34.9819" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="115.8192" x="455.0274" y="503.2558"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="95.8192" x="465.0274" y="525.0147">validator &#8592; userPk</text><polygon fill="#FFF8E1" points="421.8781,591.6743,433.8781,603.6743,421.8781,615.6743,409.8781,603.6743,421.8781,591.6743" style="stroke:#E65100;stroke-width:1;"/><rect fill="#BBDEFB" height="34.9819" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="202.6966" x="320.5298" y="635.6743"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="182.6966" x="330.5298" y="657.4332">valBond &#8592; state.allBonds[validator]</text><rect fill="#FFFFFF" height="352.7827" style="stroke:#000000;stroke-width:1;" width="898.5373" x="6" y="680.6562"/><path d="M131.0262,680.6562 L131.0262,688.6381 L121.0262,698.6381 L6,698.6381" fill="none" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="115.0262" x="9" y="693.4151">Transfer to Coop vault</text><rect fill="#D1C4E9" height="64.9457" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="179.6969" x="332.0296" y="715.6381"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="114.4212" x="342.0296" y="737.397">@posVault!("transfer",</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="153.9769" x="347.7496" y="752.3789">coopMultiVaultAddr, valBond,</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="153.7348" x="347.7496" y="767.3608">posAuthKey, transferDoneCh)</text><polygon fill="#FFF8E1" points="347.9421,800.5837,495.814,800.5837,507.814,812.5837,495.814,824.5837,347.9421,824.5837,335.9421,812.5837,347.9421,800.5837" style="stroke:#E65100;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="147.8719" x="347.9421" y="816.8517">transferDoneCh receives ok?</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="17.0829" x="318.8592" y="809.3608">yes</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="103.1463" x="507.814" y="809.3608">no &#8212; current FIXME</text><path d="M406.1806,839.5837 L406.1806,878.0385 L386.1806,882.0385 L406.1806,886.0385 L406.1806,924.4932 A0,0 0 0 0 406.1806,924.4932 L578.2096,924.4932 A0,0 0 0 0 578.2096,924.4932 L578.2096,849.5837 L568.2096,839.5837 L406.1806,839.5837 A0,0 0 0 0 406.1806,839.5837" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M568.2096,839.5837 L568.2096,849.5837 L578.2096,849.5837 L568.2096,839.5837" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="151.0289" x="412.1806" y="856.3427">Single map-construction step</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="136.542" x="412.1806" y="871.3245">in PoS.rhox:473-482 &#8212; the</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="140.106" x="412.1806" y="886.3064">three field updates are one</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="147.322" x="412.1806" y="901.2883">atomic stateUpdateCh write,</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="141.998" x="412.1806" y="916.2702">not three sequential writes.</text><rect fill="#FFE0B2" height="94.9094" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="368.1806" x="18" y="834.5837"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="225.2454" x="28" y="856.3427">atomic stateUpdate(state', (true, Nil)) where</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="263.2392" x="33.72" y="871.3245">state'.allBonds          := state.allBonds[validator := 0]</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="304.8189" x="33.72" y="886.3064">state'.activeValidators  := state.activeValidators \ {validator}</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="342.4607" x="33.72" y="901.2883">state'.committedRewards  := state.committedRewards \ {validator}</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="2.86" x="28" y="916.2702">&#160;</text><rect fill="#C8E6C9" height="34.9819" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="124.1252" x="140.0277" y="964.4932"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="104.1252" x="150.0277" y="986.2521">returnCh!((true, Nil))</text><path d="M705.1221,834.5837 L705.1221,895.5113 L685.1221,899.5113 L705.1221,903.5113 L705.1221,964.4388 A0,0 0 0 0 705.1221,964.4388 L884.5373,964.4388 A0,0 0 0 0 884.5373,964.4388 L884.5373,844.5837 L874.5373,834.5837 L705.1221,834.5837 A0,0 0 0 0 705.1221,834.5837" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M874.5373,834.5837 L874.5373,844.5837 L884.5373,844.5837 L874.5373,834.5837" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="158.4152" x="711.1221" y="851.3427">&#9888; PoS.rhox:469 "FIXME handle</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="109.3942" x="711.1221" y="866.3245">transfer failing case".</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="133.55" x="711.1221" y="881.3064">No error path. The deploy</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="73.2704" x="711.1221" y="896.2883">never returns.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="133.055" x="711.1221" y="911.2702">Bug fix #4 (T-9.4) replaces</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="123.6832" x="711.1221" y="926.2521">this with a deterministic</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="118.3921" x="711.1221" y="941.234">(false, "transfer failed")</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="101.5842" x="711.1221" y="956.2159">return on returnCh.</text><rect fill="#FFCDD2" height="34.9819" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="86.9125" x="598.2096" y="882.0204"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="66.9125" x="608.2096" y="903.7793">hang forever</text><ellipse cx="641.6658" cy="1010.4388" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="641.6658" cy="1010.4388" fill="#FFFFFF" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFCDD2" height="34.9819" rx="12.5" ry="12.5" style="stroke:#333333;stroke-width:1;" width="254.9693" x="924.5373" y="259.8554"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="234.9693" x="934.5373" y="281.6143">returnCh!((false, "Invalid system auth