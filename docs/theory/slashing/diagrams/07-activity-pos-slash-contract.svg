if'" font-size="11" lengthAdjust="spacing" textLength="265.5711" x="857.1448" y="202.6506">The auth token is unforgeable; only system deploys</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="87.7024" x="857.1448" y="217.6325">carry a valid one.</text><polygon fill="#FFF8E1" points="634.7553,225.8554,839.1448,225.8554,851.1448,237.8554,839.1448,249.8554,634.7553,249.8554,622.7553,237.8554,634.7553,225.8554" style="stroke:#E65100;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="204.3895" x="634.7553" y="242.1234">sysAuthTokenOps.check(sysAuthToken)</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="24.1998" x="598.5554" y="234.6325">valid</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="33.8358" x="851.1448" y="234.6325">invalid</text><path d="M650.1403,268.3826 L650.1403,338.3101 L832.9491,338.3101 L832.9491,278.3826 L822.9491,268.3826 L650.1403,268.3826" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M822.9491,268.3826 L822.9491,278.3826 L832.9491,278.3826 L822.9491,268.3826" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="161.8088" x="656.1403" y="285.1415">The two reads are independent</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="123.6391" x="656.1403" y="300.1234">(parallel composition `|`</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="134.54" x="656.1403" y="315.1053">in PoS.rhox:443-445); they</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="107.3812" x="656.1403" y="330.0872">join before runMVar.</text><rect fill="#000000" height="6" rx="2.5" ry="