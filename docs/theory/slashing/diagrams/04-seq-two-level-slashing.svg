#000000;stroke-width:1;" width="10" x="2152.9051" y="2162.3883"/></g><path d="M252,146.946 L252,350.946 L2426,350.946 L2426,156.946 L2416,146.946 L252,146.946" fill="#ECEFF1" style="stroke:#000000;stroke-width:1;"/><path d="M2416,146.946 L2416,156.946 L2426,156.946 L2416,146.946" fill="#ECEFF1" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="75.8665" x="1149.502" y="163.7049">Preconditions</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="228.3584" x="1149.502" y="178.6868">&#8226; Validators A, B, P all bonded with stake &gt; 0.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="238.4552" x="1149.502" y="193.6687">&#8226; A signs b @ seqN, then b' @ seqN with b' &#8800; b</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="245.0233" x="1155.222" y="208.6506">(b' becomes a dependency of some later block).</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="25.1128" x="1149.502" y="223.6325">&#8226; B is</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="34.0777" x="1177.4748" y="223.6325">aware</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="245.5512" x="1214.4125" y="223.6325">of A's equivocation (b' is in B's view of the DAG).</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="300.8699" x="1149.502" y="238.6143">&#8226; B will choose to cite b' in its own block b_B's justifications</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="306.9088" x="1155.222" y="253.5962">WITHOUT attaching a SlashDeploy targeting A &#8212; that is the</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="174.4038" x="1155.222" y="268.5781">"neglect" act that triggers Level 2.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="2.86" x="1149.502" y="283.56">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="69.3325" x="1149.502" y="298.5419">Color legend</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="370.0374" x="1149.502" y="313.5238">red = adversarial / regression  &#183;  orange = detection verdict / slash effect</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="253.4932" x="1149.502" y="328.5057">green = honest write / Valid    &#183;  blue = read query</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="355.7486" x="1149.502" y="343.4876">purple = Rholang invocation     &#183;  teal = block gossip   &#183;  gray = internal</text><rect fill="#ECEFF1" height="3" style="stroke:#ECEFF1;stroke-width:1;" width="2431.0414" x="5" y="377.2015"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2436.0414" y1="377.2015" y2="377.2015"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2436.0414" y1="380.2015" y2="380.2015"/><rect fill="#ECEFF1" height="22.9819" style="stroke:#000000;stroke-width:1;" width="235.7914" x="1102.625" y="366.7105"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="218.9315" x="1108.625" y="382.4694">Level 1 &#8212; A equivocates and is recorded</text><g class="message" data-entity-1="part1" data-entity-2="part4" id="msg1"><polygon fill="#C62828" points="542.3613,431.6562,552.3613,435.6562,542.3613,439.6562,546.3613,435.6562" style="stroke:#C62828;stroke-width:1;"/><line style="stroke:#C62828;stroke-width:1;" x1="290.6342" x2="548.3613" y1="435.6562" y2="435.6562"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="297.6342" y="422.9423">1</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="88.9454" x="307.9262" y="415.4513">signed b' @ seqN</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="220.6364" x="307.9262" y="430.4332">(b @ seqN was signed earlier; both in DAG)</text></g><path d="M432,448.6562 L432,517.6562 L684,517.6562 L684,458.6562 L674,448.6562 L432,448.6562" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M674,448.6562 L674,458.6562 L684,458.6562 L674,448.6562" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="225.4665" x="438" y="465.4151">requested_as_dependency = &#8868; is computed</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="231.9664" x="438" y="480.397">upstream by the block-processor and passed</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="227.0384" x="438" y="495.3789">in as a parameter to check_equivocations &#8212;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="210.5605" x="438" y="510.3608">it is not queried from DS by the detector.</text><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg2"><polygon fill="#1565C0" points="866.1062,555.5475,876.1062,559.5475,866.1062,563.5475,870.1062,559.5475" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="564.3613" x2="872.1062" y1="559.5475" y2="559.5475"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="571.3613" y="546.8336">2</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="121.6371" x="581.6532" y="539.3427">check_equivocations(b',</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="215.7205" x="587.3732" y="554.3245">requested_as_dependency = &#8868;, snapshot)</text></g><g class="message" data-entity-1="part5" data-entity-2="part5" id="msg3"><line style="stroke:#546E7A;stroke-width:1;" x1="888.1062" x2="930.1062" y1="603.5113" y2="603.5113"/><line style="stroke:#546E7A;stroke-width:1;" x1="930.1062" x2="930.1062" y1="603.5113" y2="616.5113"/><line style="stroke:#546E7A;stroke-width:1;" x1="889.1062" x2="930.1062" y1="616.5113" y2="616.5113"/><polygon fill="#546E7A" points="899.1062,612.5113,889.1062,616.5113,899.1062,620.5113,895.1062,616.5113" style="stroke:#546E7A;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="895.1062" y="590.7974">3</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="141.118" x="905.3982" y="583.3064">extract creator_justification</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="96.7443" x="905.3982" y="598.2883">from b' (proto_util)</text></g><g class="message" data-entity-1="part5" data-entity-2="part7" id="msg4"><polygon fill="#1565C0" points="1256.9998,641.4932,1266.9998,645.4932,1256.9998,649.4932,1260.9998,645.4932" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="888.1062" x2="1262.9998" y1="645.4932" y2="645.4932"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="895.1062" y="640.2702">4</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="217.3023" x="905.3982" y="640.2702">latest_message_hash(b'.sender) &#8594; hash(b)</text></g><g class="message" data-entity-1="part5" data-entity-2="part5" id="msg5"><line style="stroke:#546E7A;stroke-width:1;" x1="888.1062" x2="930.1062" y1="689.457" y2="689.457"/><line style="stroke:#546E7A;stroke-width:1;" x1="930.1062" x2="930.1062" y1="689.457" y2="702.457"/><line style="stroke:#546E7A;stroke-width:1;" x1="889.1062" x2="930.1062" y1="702.457" y2="702.457"/><polygon fill="#546E7A" points="899.1062,698.457,889.1062,702.457,899.1062,706.457,895.1062,702.457" style="stroke:#546E7A;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="895.1062" y="676.743">5</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="167.8247" x="905.3982" y="669.2521">creator_justification(b') &#8800; b.hash</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="126.861" x="905.3982" y="684.234">&#8594; equivocation detected</text></g><g class="message" data-entity-1="part5" data-entity-2="part4" id="msg6"><polygon fill="#E65100" points="575.3613,727.4388,565.3613,731.4388,575.3613,735.4388,571.3613,731.4388" style="stroke:#E65100;stroke-width:1;"/><line style="stroke:#E65100;stroke-width:1;stroke-dasharray:2,2;" x1="569.3613" x2="882.1062" y1="731.4388" y2="731.4388"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="581.3613" y="726.2159">6</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="190.9917" x="591.6532" y="726.2159">InvalidBlock::AdmissibleEquivocation</text></g><g class="message" data-entity-1="part4" data-entity-2="part6" id="msg7"><polygon fill="#E65100" points="1078.2229,756.4207,1088.2229,760.4207,1078.2229,764.4207,1082.2229,760.4207" style="stroke:#E65100;stroke-width:1;"/><line style="stroke:#E65100;stroke-width:1;" x1="564.3613" x2="1084.2229" y1="760.4207" y2="760.4207"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="571.3613" y="755.1978">7</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="190.9917" x="581.6532" y="755.1978">InvalidBlock::AdmissibleEquivocation</text></g><g class="message" data-entity-1="part6" data-entity-2="part8" id="msg8"><polygon fill="#E65100" points="1411.8625,815.4026,1421.8625,819.4026,1411.8625,823.4026,1415.8625,819.4026" style="stroke:#E65100;stroke-width:1;"/><line style="stroke:#E65100;stroke-width:1;" x1="1100.2229" x2="1417.8625" y1="819.4026" y2="819.4026"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="1107.2229" y="814.1796">8</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="219.6695" x="1117.5148" y="814.1796">insert_equivocation_record(A, seqN &#8722; 1, &#8709;)</text></g><g class="message" data-entity-1="part6" data-entity-2="part7" id="msg9"><polygon fill="#E65100" points="1256.9998,844.3845,1266.9998,848.3845,1256.9998,852.3845,1260.9998,848.3845" style="stroke:#E65100;stroke-width:1;"/><line style="stroke:#E65100;stroke-width:1;" x1="1095.2229" x2="1262.9998" y1="848.3845" y2="848.3845"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="1102.2229" y="843.1615">9</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="118.6341" x="1112.5148" y="843.1615">insert(b', invalid = true)</text></g><path d="M1428,861.3845 L1428,930.3845 L1647,930.3845 L1647,871.3845 L1637,861.3845 L1428,861.3845" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1637,861.3845 L1637,871.3845 L1647,871.3845 L1637,861.3845" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="189.4296" x="1434" y="878.1434">Level 1 done: an EquivocationRecord</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="190.4416" x="1434" y="893.1253">for A exists. Anyone who now cites b'</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="198.0866" x="1434" y="908.1072">must accompany it with a SlashDeploy</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="197.3606" x="1434" y="923.0891">targeting A, or be slashed themselves.</text><rect fill="#ECEFF1" height="3" style="stroke:#ECEFF1;stroke-width:1;" width="2431.0414" x="5" y="956.803"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2436.0414" y1="956.803" y2="956.803"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2436.0414" y1="959.803" y2="959.803"/><rect fill="#ECEFF1" height="22.9819" style="stroke:#000000;stroke-width:1;" width="336.6826" x="1052.1794" y="946.3121"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="319.8226" x="1058.1794" y="962.071">Level 2 setup &#8212; B cites A's invalid block WITHOUT slashing</text><g class="message" data-entity-1="part2" data-entity-2="part4" id="msg10"><polygon fill="#C62828" points="542.3613,1026.2396,552.3613,1030.2396,542.3613,1034.2396,546.3613,1030.2396" style="stroke:#C62828;stroke-width:1;"/><line style="stroke:#C62828;stroke-width:1;" x1="369.0698" x2="548.3613" y1="1030.2396" y2="1030.2396"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="376.0698" y="1010.0348">10</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="140.81" x="392.6537" y="995.0529">signed block b_B @ seqN_B</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="139.6671" x="392.6537" y="1010.0348">with b' &#8712; b_B.justifications,</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="131.2181" x="392.6537" y="1025.0166">NO SlashDeploy attached</text></g><g class="message" data-entity-1="part4" data-entity-2="part9" id="msg11"><polygon fill="#1565C0" points="1602.8325,1085.1853,1612.8325,1089.1853,1602.8325,1093.1853,1606.8325,1089.1853" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="564.3613" x2="1608.8325" y1="1089.1853" y2="1089.1853"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="571.3613" y="1068.9804">11</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="242.9883" x="587.9452" y="1053.9985">casper_snapshot.dag.lookup(j.latestBlockHash)</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="153.307" x="587.9452" y="1068.9804">for each j &#8712; b_B.justifications;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="173.7877" x="587.9452" y="1083.9623">filter where lookup.invalid = TRUE</text></g><g class="message" data-entity-1="part9" data-entity-2="part4" id="msg12"><polygon fill="#1565C0" points="575.3613,1114.1672,565.3613,1118.1672,575.3613,1122.1672,571.3613,1118.1672" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;stroke-dasharray:2,2;" x1="569.3613" x2="1613.8325" y1="1118.1672" y2="1118.1672"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="581.3613" y="1112.9442">12</tex