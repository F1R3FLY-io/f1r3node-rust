2</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="121.6371" x="339.6532" y="539.3427">check_equivocations(b',</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="215.7205" x="345.3732" y="554.3245">requested_as_dependency = &#8868;, snapshot)</text></g><g class="message" data-entity-1="part5" data-entity-2="part5" id="msg3"><line style="stroke:#546E7A;stroke-width:1;" x1="646.1062" x2="688.1062" y1="603.5113" y2="603.5113"/><line style="stroke:#546E7A;stroke-width:1;" x1="688.1062" x2="688.1062" y1="603.5113" y2="616.5113"/><line style="stroke:#546E7A;stroke-width:1;" x1="647.1062" x2="688.1062" y1="616.5113" y2="616.5113"/><polygon fill="#546E7A" points="657.1062,612.5113,647.1062,616.5113,657.1062,620.5113,653.1062,616.5113" style="stroke:#546E7A;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="653.1062" y="590.7974">3</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="141.118" x="663.3982" y="583.3064">extract creator_justification</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="96.7443" x="663.3982" y="598.2883">from b' (proto_util)</text></g><g class="message" data-entity-1="part5" data-entity-2="part7" id="msg4"><polygon fill="#1565C0" points="1014.9998,641.4932,1024.9998,645.4932,1014.9998,649.4932,1018.9998,645.4932" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="646.1062" x2="1020.9998" y1="645.4932" y2="645.4932"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="653.1062" y="640.2702">4</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="217.3023" x="663.3982" y="640.2702">lates