 lengthAdjust="spacing" textLength="133.814" x="1906" y="1993.3465">prepare_slashing_deploys</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="140.942" x="1906" y="2008.3284">emits ONE SlashDeploy per</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="140.304" x="1906" y="2023.3103">offender; both are bundled</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="132.9671" x="1906" y="2038.2922">into the SAME block bP as</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="132.7031" x="1906" y="2053.274">separate system_deploys.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="133.231" x="1906" y="2068.2559">They execute sequentially</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="148.312" x="1906" y="2083.2378">during local block evaluation</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="143.978" x="1906" y="2098.2197">but produce ONE post-state</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="156.2429" x="1906" y="2113.2016">hash gossiped to the network.</text><g class="message" data-entity-1="part10" data-entity-2="part11" id="msg27"><polygon fill="#6A1B9A" points="2140.9051,2158.3883,2150.9051,2162.3883,2140.9051,2166.3883,2144.9051,2162.3883" style="stroke:#6A1B9A;stroke-width:1;"/><line style="stroke:#6A1B9A;stroke-width:1;" x1="1895.1718" x2="2146.9051" y1="2162.3883" y2="2162.3883"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="1902.1718" y="2149.6744">27</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="172.5008" x="1918.7557" y="2142.1835">SlashDeploy(blockHash = b'.hash,</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="165.8128" x="1924.4756" y="2157.1654">target = A) &#8212; system_deploys[0]</text></g><g class="message" data-entity-1="part11" data-entity-2="part12" id="msg28"><polygon fill="#E65100" points="2376.0787,2292.2434,2386.0787,2296.2434,2376.0787,2300.2434,2380.0787,2296.2434" style="stroke:#E65100;stroke-width:1;"/><line style="stroke:#E65100;stroke-width:1;" x1="2162.9051" x2="2382.0787" y1="2296.2434" y2="2296.2434"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="2169.9051" y="2238.5839">28</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="122.4512" x="2186.489" y="2186.1473">atomic stateUpdateCh!{</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="142.394" x="2192.209" y="2201.1291">allBonds := allBonds[A := 0],</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="122.1211" x="2192.209" y="2216.111">activeValidators := \ {A},</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="137.994" x="2192.209" y="2231.0929">committedRewards := \ {A}</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="60.8076" x="2186.489" y="2246.0748">} ; (true, Nil)</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="156.5069" x="2186.489" y="2261.0567">(single map-construction step,</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="93.3013" x="2189.349" y="2276.0386">PoS.rhox:473-482;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="181.1687" x="2189.349" y="2291.0205">A's bond transferred to Coop vault)</text></g><g class="message" data-entity-1="part11" data-entity-2="part10" id="msg29"><polygon fill="#2E7D32" points="1906.1718,2321.2253,1896.1718,2325.2253,1906.1718,2329.2253,1902.1718,2325.2253" style="stroke:#2E7D32;stroke-width:1;"/><line style="stroke:#2E7D32;stroke-width:1;stroke-dasharray:2,2;" x1="1900.1718" x2="2151.9051" y1="2325.2253" y2="2325.2253"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="1912.1718" y="2320.0024">29</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="113.7392" x="1928.7557" y="2320.0024">(true, Nil) on returnCh</text></g><g class="message" data-entity-1="part10" data-entity-2="part11" id="msg30"><polygon fill="#6A1B9A" points="2140.9051,2365.1891,2150.9051,2369.1891,2140.9051,2373.1891,2144.9051,2369.1891" style="stroke:#6A1B9A;stroke-width:1;"/><line style="stroke:#6A1B9A;stroke-width:1;" x1="1895.1718" x2="2146.9051" y1="2369.1891" y2="2369.1891"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="1902.1718" y="2356.4752">30</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="182.0597" x="1918.7557" y="2348.9842">SlashDeploy(blockHash = b_B.hash,</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="165.9338" x="1924.4756" y="2363.9661">target = B) &#8212; system_deploys[1]</text></g><g class="message" data-entity-1="part11" data-entity-2="part12" id="msg31"><polygon fill="#E65100" points="2376.0787,2469.0804,2386.0787,2473.0804,2376.0787,2477.0804,2380.0787,2473.0804" style="stroke:#E65100;stroke-width:1;"/><line style="stroke:#E65100;stroke-width:1;" x1="2162.9051" x2="2382.0787" y1="2473.0804" y2="2473.0804"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="2169.9051" y="2430.4027">31</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="122.4512" x="2186.489" y="2392.948">atomic stateUpdateCh!{</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="142.515" x="2192.209" y="2407.9299">allBonds := allBonds[B := 0],</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="122.2421" x="2192.209" y="2422.9118">activeValidators := \ {B},</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="138.115" x="2192.209" y="2437.8937">committedRewards := \ {B}</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="60.8076" x="2186.489" y="2452.8756">} ; (true, Nil)</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="184.5897" x="2186.489" y="2467.8575">(B's bond transferred to Coop vault)</text></g><g class="message" data-entity-1="part11" data-entity-2="part10" id="msg32"><polygon fill="#2E7D32" points="1901.1718,2498.0623,1891.1718,2502.0623,1901.1718,2506.0623,1897.1718,2502.0623" style="stroke:#2E7D32;stroke-width:1;"/><line style="stroke:#2E7D32;stroke-width:1;stroke-dasharray:2,2;" x1="1895.1718" x2="2156.9051" y1="2502.0623" y2="2502.0623"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="1907.1718" y="2496.8393">32</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="113.7392" x="1923.7557" y="2496.8393">(true, Nil) on returnCh</text></g><path d="M252,2515.0623 L252,2629.0623 L2426,2629.0623 L2426,2525.0623 L2416,2515.0623 L252,2515.0623" fill="#C8E6C9" style="stroke:#000000;stroke-width:1;"/><path d="M2416,2515.0623 L2416,2525.0623 L2426,2525.0623 L2416,2515.0623" fill="#C8E6C9" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="50.4676" x="1195.3607" y="2531.8212">Outcome</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="59.4106" x="1195.3607" y="2546.8031">A and B are</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="25.7508" x="1257.6313" y="2546.8031">both</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="151.931" x="1286.2421" y="2546.8031">slashed in the same block bP.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="260.2912" x="1195.3607" y="2561.785">Collusion is mutually destructive: if B had attached</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="278.32" x="1195.3607" y="2576.7669">a SlashDeploy(b', A) to b_B, then b_B would have been</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="270.686" x="1195.3607" y="2591.7488">ADMITTED (post-fix Rust widening, T-9.9), and only A</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="273.392" x="1195.3607" y="2606.7307">would have been slashed. By neglecting, B incurs the</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="206.2266" x="1195.3607" y="2621.7126">same economic cost as the equivocator.</text><rect fill="#ECEFF1" height="3" style="stroke:#ECEFF1;stroke-width:1;" width="2431.0414" x="5" y="2655.4265"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2436.0414" y1="2655.4265" y2="2655.4265"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2436.0414" y1="2658.4265" y2="2658.4265"/><rect fill="#ECEFF1" height="22.9819" style="stroke:#000000;stroke-width:1;" width="424.956" x="1008.0427" y="2644.9355"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="408.096" x="1014.0427" y="2660.6944">Slash-closure iteration (spec &#167;8.1 Def 8.2; T-11 termination &#8804; |V|&#8722;1 rounds)</text><path d="M252,2682.9174 L252,2961.9174 L2426,2961.9174 L2426,2692.9174 L2416,2682.9174 L252,2682.9174" fill="#FFF8E1" style="stroke:#000000;stroke-width:1;"/><path d="M2416,2682.9174 L2416,2692.9174 L2426,2692.9174 L2416,2682.9174" fill="#FFF8E1" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="266.3521" x="1195.6742" y="2699.6763">This diagram shows Level-1 (A direct) and Level-2 (B</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="259.2241" x="1195.6742" y="2714.6582">neglects A). The general two-level slashing closure</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="254.4722" x="1195.6742" y="2729.6401">generalises to any reachable depth in the neglect</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="33.9898" x="1195.6742" y="2744.622">graph:</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="2.86" x="1195.6742" y="2759.6039">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="110.4711" x="1204.2542" y="2774.5858">Sl&#8320; &#8592; DirectOffenders</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="123.1874" x="1204.2542" y="2789.5677">Sl_{i+1} &#8592; Sl_i &#8746; { v &#8712; V :</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="112.1765" x="1267.1738" y="2804.5496">neglect(v) &#8745; Sl_i &#8800; &#8709; }</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="2.86" x="1195.6742" y="2819.5314">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="261.2042" x="1195.6742" y="2834.5133">A validator C who cited B's invalid block without an</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="277.693" x="1195.6742" y="2849.4952">accompanying SlashDeploy(b_B, B) becomes a Level-3</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="272.2371" x="1195.6742" y="2864.4771">neglecter; D who cites C becomes Level-4; and so on.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="22.4508" x="1195.6742" y="2879.459">T-11</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="139.5559" x="1220.985" y="2879.459">(`t_11_level_2_termination`,</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="235.9373" x="1195.6742" y="2894.4409">`TwoLevelSlashing.v:331`) proves the iteration</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="178.7708" x="1195.6742" y="2909.4228">stabilises in at most |V|&#8722;1 rounds.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="22.4508" x="1377.305" y="2909.4228">T-12</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="170.4327" x="1195.6742" y="2924.4047">(`t_12_bft_quorum_preservation`,</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="2