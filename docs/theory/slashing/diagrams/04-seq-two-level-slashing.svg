10.9051" y="2127.4065"/></g><path d="M10,146.946 L10,350.946 L2184,350.946 L2184,156.946 L2174,146.946 L10,146.946" fill="#ECEFF1" style="stroke:#000000;stroke-width:1;"/><path d="M2174,146.946 L2174,156.946 L2184,156.946 L2174,146.946" fill="#ECEFF1" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="75.8665" x="907.502" y="163.7049">Preconditions</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="228.3584" x="907.502" y="178.6868">&#8226; Validators A, B, P all bonded with stake &gt; 0.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="238.4552" x="907.502" y="193.6687">&#8226; A signs b @ seqN, then b' @ seqN with b' &#8800; b</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="245.0233" x="913.222" y="208.6506">(b' becomes a dependency of some later block).</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="25.1128" x="907.502" y="223.6325">&#8226; B is</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="34.0777" x="935.4748" y="223.6325">aware</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="245.5512" x="972.4125" y="223.6325">of A's equivocation (b' is in B's view of the DAG).</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="300.8699" x="907.502" y="238.6143">&#8226; B will choose to cite b' in its own block b_B's justifications</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="306.9088" x="913.222" y="253.5962">WITHOUT attaching a SlashDeploy targeting A &#8212; that is the</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="174.4038" x="913.222" y="268.5781">"neglect" act that triggers Level 2.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="2.86" x="907.502" y="283.56">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="69.3325" x="907.502" y="298.5419">Color legend</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="370.0374" x="907.502" y="313.5238">red = adversarial / regression  &#183;  orange = detection verdict / slash effect</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="253.4932" x="907.502" y="328.5057">green = honest write / Valid    &#183;  blue = read query</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="355.7486" x="907.502" y="343.4876">purple = Rholang invocation     &#183;  teal = block gossip   &#183;  gray = internal</text><rect fill="#ECEFF1" height="3" style="stroke:#ECEFF1;stroke-width:1;" width="2189.0414" x="5" y="377.2015"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2194.0414" y1="377.2015" y2="377.2015"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2194.0414" y1="380.2015" y2="380.2015"/><rect fill="#ECEFF1" height="22.9819" style="stroke:#000000;stroke-width:1;" width="235.7914" x="981.625" y="366.7105"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="218.9315" x="987.625" y="382.4694">Level 1 &#8212; A equivocates and is recorded</text><g class="message" data-entity-1="part1" data-entity-2="part4" id="msg1"><polygon fill="#C62828" points="300.3613,431.6562,310.3613,435.6562,300.3613,439.6562,304.3613,435.6562" style="stroke:#C62828;stroke-width:1;"/><line style="stroke:#C62828;stroke-width:1;" x1="48.6342" x2=