10" x="1888.5313" y="2185.3702"/></g><path d="M10,146.946 L10,350.946 L2161,350.946 L2161,156.946 L2151,146.946 L10,146.946" fill="#ECEFF1" style="stroke:#000000;stroke-width:1;"/><path d="M2151,146.946 L2151,156.946 L2161,156.946 L2151,146.946" fill="#ECEFF1" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="75.8665" x="896.3151" y="163.7049">Preconditions</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="228.3584" x="896.3151" y="178.6868">&#8226; Validators A, B, P all bonded with stake &gt; 0.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="238.4552" x="896.3151" y="193.6687">&#8226; A signs b @ seqN, then b' @ seqN with b' &#8800; b</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="245.0233" x="902.035" y="208.6506">(b' becomes a dependency of some later block).</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="25.1128" x="896.3151" y="223.6325">&#8226; B is</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="34.0777" x="924.2879" y="223.6325">aware</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="245.5512" x="961.2256" y="223.6325">of A's equivocation (b' is in B's view of the DAG).</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="300.8699" x="896.3151" y="238.6143">&#8226; B will choose to cite b' in its own block b_B's justifications</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="306.9088" x="902.035" y="253.5962">WITHOUT attaching a SlashDeploy targeting A &#8212; that is the</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="174.4038" x="902.035" y="268.5781">"neglect" act that triggers Level 2.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="2.86" x="896.3151" y="283.56">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="69.3325" x="896.3151" y="298.5419">Color legend</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="370.0374" x="896.3151" y="313.5238">red = adversarial / regression  &#183;  orange = detection verdict / slash effect</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="253.4932" x="896.3151" y="328.5057">green = honest write / Valid    &#183;  blue = read query</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="355.7486" x="896.3151" y="343.4876">purple = Rholang invocation     &#183;  teal = block gossip   &#183;  gray = internal</text><rect fill="#ECEFF1" height="3" style="stroke:#ECEFF1;stroke-width:1;" width="2166.6676" x="5" y="377.2015"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2171.6676" y1="377.2015" y2="377.2015"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2171.6676" y1="380.2015" y2="380.2015"/><rect fill="#ECEFF1" height="22.9819" style="stroke:#000000;stroke-width:1;" width="235.7914" x="970.4381" y="366.7105"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="218.9315" x="976.4381" y="382.4694">Level 1 &#8212; A equivocates and is recorded</text><g class="message" data-entity-1="part1" data-entity-2="part4" id="msg1"><polygon fill="#C62828" points="300.3613,431.6562,310.3613,435.6562,300.3613,439.6562,304.3613,435.6562" style="stroke:#C62828;stroke-width:1;"/><line style="stroke:#C62828;stroke-width:1;" x1="48.6342" x2="306.3613" y1="435.6562" y2="435.6562"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="55.6342" y="422.9423">1</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="88.9454" x="65.9262" y="415.4513">signed b' @ seqN</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="220.6364" x="65.9262" y="430.4332">(b @ seqN was signed earlier; both in DAG)</text></g><path d="M190,448.6562 L190,517.6562 L442,517.6562 L442,458.6562 L432,448.6562 L190,448.6562" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M432,448.6562 L432,458.6562 L442,458.6562 L432,448.6562" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="225.4665" x="196" y="465.4151">requested_as_dependency = &#8868; is computed</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="231.9664" x="196" y="480.397">upstream by the block-processor and passed</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="227.0384" x="196" y="495.3789">in as a parameter to check_equivocations &#8212;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="210.5605" x="196" y="510.3608">it is not queried from DS by the detector.</text><g class="message" data-entity-1="part4" data-entity-2="part5" id="msg2"><polygon fill="#1565C0" points="624.1062,555.5475,634.1062,559.5475,624.1062,563.5475,628.1062,559.5475" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="322.3613" x2="630.1062" y1="559.5475" y2="559.5475"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="32