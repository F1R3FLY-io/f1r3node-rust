spacing" textLength="267.4411" x="351.6651" y="1316.7812">:= scan b_B.body.system_deploys (input field of b_B)</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="187.6147" x="360.2451" y="1331.7631">for SystemDeployData::Slash variant</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="156.5938" x="351.6651" y="1346.745">&#8594; FALSE (B did not attach one)</text></g><g class="message" data-entity-1="part4" data-entity-2="part4" id="msg17"><line style="stroke:#546E7A;stroke-width:1;" x1="322.3613" x2="364.3613" y1="1408.9317" y2="1408.9317"/><line style="stroke:#546E7A;stroke-width:1;" x1="364.3613" x2="364.3613" y1="1408.9317" y2="1421.9317"/><line style="stroke:#546E7A;stroke-width:1;" x1="323.3613" x2="364.3613" y1="1421.9317" y2="1421.9317"/><polygon fill="#546E7A" points="333.3613,1417.9317,323.3613,1421.9317,333.3613,1425.9317,329.3613,1421.9317" style="stroke:#546E7A;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="329.3613" y="1396.2178">17</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="171.0878" x="345.9452" y="1388.7268">reject &#10234; neglected &#8743; &#172;has_slash</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="221.1303" x="351.6651" y="1403.7087">&#8594; REJECT (post-fix branch, see Diagram 08)</text></g><g class="message" data-entity-1="part4" data-entity-2="part6" id="msg18"><polygon fill="#E65100" points="836.2229,1446.9136,846.2229,1450.9136,836.2229,1454.9136,840.2229,1450.9136" style="stroke:#E65100;stroke-width:1;"/><line style="stroke:#E65100;stroke-width:1;stroke-dasharray:2,2;" x1="322.3613" x2="842.2229" y1="1450.9136" y2="1450.9136"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust=