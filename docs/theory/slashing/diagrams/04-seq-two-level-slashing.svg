e="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="189.4296" x="1192" y="878.1434">Level 1 done: an EquivocationRecord</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="190.4416" x="1192" y="893.1253">for A exists. Anyone who now cites b'</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="198.0866" x="1192" y="908.1072">must accompany it with a SlashDeploy</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="197.3606" x="1192" y="923.0891">targeting A, or be slashed themselves.</text><rect fill="#ECEFF1" height="3" style="stroke:#ECEFF1;stroke-width:1;" width="2189.0414" x="5" y="956.803"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2194.0414" y1="956.803" y2="956.803"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2194.0414" y1="959.803" y2="959.803"/><rect fill="#ECEFF1" height="22.9819" style="stroke:#000000;stroke-width:1;" width="336.6826" x="931.1794" y="946.3121"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="319.8226" x="937.1794" y="962.071">Level 2 setup &#8212; B cites A's invalid block WITHOUT slashing</text><g class="message" data-entity-1="part2" data-entity-2="part4" id="msg10"><polygon fill="#C62828" points="300.3613,1026.2396,310.3613,1030.2396,300.3613,1034.2396,304.3613,1030.2396" style="stroke:#C62828;stroke-width:1;"/><line style="stroke:#C62828;stroke-width:1;" x1="127.0698" x2="306.3613" y1="1030.2396" y2="1030.2396"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="134.0698" y="1010.0348">10</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="140.81" x="150.6537" y="995.0529">signed block b_B @ seqN_B</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="139.6671" x="150.6537" y="1010.0348">with b' &#8712; b_B.justifications,</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="131.2181" x="150.6537" y="1025.0166">NO SlashDeploy attached</text></g><g class="message" data-entity-1="part4" data-entity-2="part9" id="msg11"><polygon fill="#1565C0" points="1360.8325,1085.1853,1370.8325,1089.1853,1360.8325,1093.1853,1364.8325,1089.1853" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="322.3613" x2="1366.8325" y1="1089.1853" y2="1089.1853"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="329.3613" y="1068.9804">11</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="242.9883" x="345.9452" y="1053.9985">casper_snapshot.dag.lookup(j.latestBlockHash)</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="153.307" x="345.9452" y="1068.9804">for each j &#8712; b_B.justifications;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="173.7877" x="345.9452" y="1083.9623">filter where lookup.invalid = TRUE</text></g><g class="message" data-entity-1="part9" data-entity-2="part4" id="msg12"><polygon fill="#1565C0" points="333.3613,1114.1672,323.3613,1118.1672,333.3613,1122.1672,329.3613,1118.1672" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;stroke-dasharray:2,2;" x1="327.3613" x2="1371.8325" y1="1118.1672" y2="1118.1672"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="339.3613" y="1112.9442">12</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust=