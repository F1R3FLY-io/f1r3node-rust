"spacing" textLength="180.0687" x="1396.4164" y="1808.4552">{ (A, b', epoch e), (B, b_B, epoch e) }</text></g><g class="message" data-entity-1="part10" data-entity-2="part9" id="msg24"><polygon fill="#1565C0" points="1383.8325,1838.66,1373.8325,1842.66,1383.8325,1846.66,1379.8325,1842.66" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="1377.8325" x2="1642.1718" y1="1842.66" y2="1842.66"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="1389.8325" y="1837.437">24</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="229.7554" x="1406.4164" y="1837.437">casper_snapshot.on_chain_state.bonds_map</text></g><g class="message" data-entity-1="part9" data-entity-2="part10" id="msg25"><polygon fill="#1565C0" points="1631.1718,1867.6419,1641.1718,1871.6419,1631.1718,1875.6419,1635.1718,1871.6419" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;stroke-dasharray:2,2;" x1="1372.8325" x2="1637.1718" y1="1871.6419" y2="1871.6419"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="1379.8325" y="1866.4189">25</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="199.9236" x="1396.4164" y="1866.4189">bonds_map (both A and B still bonded)</text></g><g class="message" data-entity-1="part10" data-entity-2="part10" id="msg26"><line style="stroke:#546E7A;stroke-width:1;" x1="1653.1718" x2="1695.1718" y1="1915.6057" y2="1915.6057"/><line style="stroke:#546E7A;stroke-width:1;" x1="1695.1718" x2="1695.1718" y1="1915.6057" y2="1928.6057"/><line style="stroke:#546E7A;stroke-width:1;" x1="1654.1718" x2="1695.1718" y1="1928.6057" y2="1928.6057"/><polygon fill="#546E7A" points="1664.1718,1924.6057,1654.1718,1928.6057,1664.1718,1932.6057,1660.1718,1928.6057" style="stroke:#546E7A;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="1660.1718" y="1902.8918">26</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="217.1494" x="1676.7557" y="1895.4008">filter current epoch and bonds_map[*] &gt; 0</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="106.6651" x="1676.7557" y="1910.3827">&#8594; keep both A and B</text></g><path d="M1658,1941.6057 L1658,2085.6057 L1835,2085.6057 L1835,1951.6057 L1825,1941.6057 L1658,1941.6057" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1825,1941.6057 L1825,1951.6057 L1835,1951.6057 L1825,1941.6057" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="133.814" x="1664" y="1958.3646">prepare_slashing_deploys</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="140.942" x="1664" y="1973.3465">emits ONE SlashDeploy per</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="140.304" x="1664" y="1988.3284">offender; both are bundled</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="132.9671" x="1664" y="2003.3103">into the SAME block bP as</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="132.7031" x="1664" y="2018.2922">separate system_deploys.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="133.231" x="1664" y="2033.274">They execute sequentially</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="148.312" x="1664" y="2048.2559">during local block evaluation</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="143.978" x="1664" y="2063.2378">but produce ONE post-state</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="156.2429" x="1664" y="2078.2197">hash gossiped to the network.</text><g class="message" data-entity-1="part10" data-entity-2="part11" id="msg27"><polygon fill="#6A1B9A" points="1898.9051,2123.4065,1908.9051,2127.4065,1898.9051,2131.4065,1902.9051,2127.4065" style="stroke:#6A1B9A;stroke-width:1;"/><line style="stroke:#6A1B9A;stroke-width:1;" x1="1653.1718" x2="1904.9051" y1="2127.4065" y2="2127.4065"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="1660.1718" y="2114.6925">27</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="172.5008" x="1676.7557" y="2107.2016">SlashDeploy(blockHash = b'.hash,</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="165.8128" x="1682.4756" y="2122.1835">target = A) &#8212; system_deploys[0]</text></g><g class="message" data-entity-1="part11" data-entity-2="part12" id="msg28"><polygon fill="#E65100" points="2134.0787,2257.2616,2144.0787,2261.2616,2134.0787,2265.2616,2138.0787,2261.2616" style="stroke:#E65100;stroke-width:1;"/><line style="stroke:#E65100;stroke-width:1;" x1="1920.9051" x2="2140.0787" y1="2261.2616" y2="2261.2616"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="1927.9051" y="2203.602">28</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="122.4512" x="1944.489" y="2151.1654">atomic stateUpdateCh!{</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="142.394" x="1950.209" y="2166.1473">allBonds := allBonds[A := 0],</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="122.1211" x="1950.209" y="2181.1291">activeValidators := \ {A},</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="137.994" x="1950.209" y="2196.111">committedRewards := \ {A}</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="60.8076" x="1944.489" y="2211.0929">} ; (true, Nil)</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="156.5069" x="1944.489" y="2226.0748">(single map-construction step,</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="93.3013" x="1947.349" y="2241.0567">PoS.rhox:473-482;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="181.1687" x="1947.349" y="2256.0386">A's bond transferred to Coop vault)</text></g><g class="message" data-entity-1="part11" data-entity-2="part10" id="msg29"><polygon fill="#2E7D32" points="1664.1718,2286.2434,1654.1718,2290.2434,1664.1718,2294.2434,1660.1718,2290.2434" style="stroke:#2E7D32;stroke-width:1;"/><line style="stroke:#2E7D32;stroke-width:1;stroke-dasharray:2,2;" x1="1658.1718" x2="1909.9051" y1="2290.2434" y2="2290.2434"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="1670.1718" y="2285.0205">29</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="113.7392" x="1686.7557" y="2285.0205">(true, Nil) on returnCh</text></g><g class="message" data-entity-1="part10" data-entity-2="part11" id="msg30"><polygon fill="#6A1B9A" points="1898.9051,2330.2072,1908.9051,2334.2072,1898.9051,2338.2072,1902.9051,2334.2072" style="stroke:#6A1B9A;stroke-width:1;"/><line style="stroke:#6A1B9A;stroke-width:1;" x1="1653.1718" x2="1904.9051" y1="2334.2072" y2="2334.2072"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="1660.1718" y="2321.4933">30</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="182.0597" x="1676.7557" y="2314.0024">SlashDeploy(blockHash = b_B.hash,</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="165.9338" x="1682.4756" y="2328.9842">target = B) &#8212; system_deploys[1]</text></g><g class="message" data-entity-1="part11" data-entity-2="part12" id="msg31"><polygon fill="#E65100" points="2134.0787,2434.0985,2144.0787,2438.0985,2134.0787,2442.0985,2138.0787,2438.0985" style="stroke:#E65100;stroke-width:1;"/><line style="stroke:#E65100;stroke-width:1;" x1="1920.9051" x2="2140.0787" y1="2438.0985" y2="2438.0985"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="1927.9051" y="2395.4209">31</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="122.4512" x="1944.489" y="2357.9661">atomic stateUpdateCh!{</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="142.515" x="1950.209" y="2372.948">allBonds := allBonds[B := 0],</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="122.2421" x="1950.209" y="2387.9299">activeValidators := \ {B},</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="138.115" x="1950.209" y="2402.9118">committedRewards := \ {B}</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="60.8076" x="1944.489" y="2417.8937">} ; (true, Nil)</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="184.5897" x="1944.489" y="2432.8756">(B's bond transferred to Coop vault)</text></g><g class="message" data-entity-1="part11" data-entity-2="part10" id="msg32"><polygon fill="#2E7D32" points="1659.1718,2463.0804,1649.1718,2467.0804,1659.1718,2471.0804,1655.1718,2467.0804" style="stroke:#2E7D32;stroke-width:1;"/><line style="stroke:#2E7D32;stroke-width:1;stroke-dasharray:2,2;" x1="1653.1718" x2="1914.9051" y1="2467.0804" y2="2467.0804"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="1665.1718" y="2461.8575">32</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="113.7392" x="1681.7557" y="2461.8575">(true, Nil) on returnCh</text></g><path d="M10,2480.0804 L10,2594.0804 L2184,2594.0804 L2184,2490.0804 L2174,2480.0804 L10,2480.0804" fill="#C8E6C9" style="stroke:#000000;stroke-width:1;"/><path d="M2174,2480.0804 L2174,2490.0804 L2184,2490.0804 L2174,2480.0804" fill="#C8E6C9" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="50.4676" x="953.3607" y="2496.8393">Outcome</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="59.4106" x="953.3607" y="2511.8212">A and B are</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="25.7508" x="1015.6313" y="2511.8212">both</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="151.931" x="1044.2421" y="2511.8212">slashed in the same block bP.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="260.2912" x="953.3607" y="2526.8031">Collusion is mutually destructive: if B had attached</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="278.32" x="953.3607" y="2541.785"