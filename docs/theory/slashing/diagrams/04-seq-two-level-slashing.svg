2.1152" y="2284.0386">(single map-construction step,</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="93.3013" x="1924.9752" y="2299.0205">PoS.rhox:473-482;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="181.1687" x="1924.9752" y="2314.0024">A's bond transferred to Coop vault)</text></g><g class="message" data-entity-1="part11" data-entity-2="part10" id="msg31"><polygon fill="#2E7D32" points="1676.8877,2344.2072,1666.8877,2348.2072,1676.8877,2352.2072,1672.8877,2348.2072" style="stroke:#2E7D32;stroke-width:1;"/><line style="stroke:#2E7D32;stroke-width:1;stroke-dasharray:2,2;" x1="1670.8877" x2="1887.5313" y1="2348.2072" y2="2348.2072"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="1682.8877" y="2342.9842">31</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="113.7392" x="1699.4716" y="2342.9842">(true, Nil) on returnCh</text></g><g class="message" data-entity-1="part10" data-entity-2="part11" id="msg32"><polygon fill="#6A1B9A" points="1876.5313,2388.171,1886.5313,2392.171,1876.5313,2396.171,1880.5313,2392.171" style="stroke:#6A1B9A;stroke-width:1;"/><line style="stroke:#6A1B9A;stroke-width:1;" x1="1665.8877" x2="1882.5313" y1="2392.171" y2="2392.171"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="1672.8877" y="2379.4571">32</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="182.0597" x="1689.4716" y="2371.9661">SlashDeploy(blockHash = b_B.hash,</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="165.9338" x="1695.1916" y="2386.948">target = B) &#8212; system_deploys[1]</text></g><g class="message" data-entity-1="part11" data-entity-2="part12" id="msg33"><polygon fill="#E65100" points="2111.7049,2492.0623,2121.7049,2496.0623,2111.7049,2500.0623,2115.7049,2496.0623" style="stroke:#E65100;stroke-width:1;"/><line style="stroke:#E65100;stroke-width:1;" x1="1898.5313" x2="2117.7049" y1="2496.0623" y2="2496.0623"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="1905.5313" y="2453.3846">33</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="122.4512" x="1922.1152" y="2415.9299">atomic stateUpdateCh!{</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="142.515" x="1927.8351" y="2430.9118">allBonds := allBonds[B := 0],</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="122.2421" x="1927.8351" y="2445.8937">activeValidators := \ {B},</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="138.115" x="1927.8351" y="2460.8756">committedRewards := \ {B}</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="60.8076" x="1922.1152" y="2475.8575">} ; (true, Nil)</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="184.5897" x="1922.1152" y="2490.8393">(B's bond transferred to Coop vault)</text></g><g class="message" data-entity-1="part11" data-entity-2="part10" id="msg34"><polygon fill="#2E7D32" points="1671.8877,2521.0442,1661.8877,2525.0442,1671.8877,2529.0442,1667.8877,2525.0442" style="stroke:#2E7D32;stroke-width:1;"/><line style="stroke:#2E7D32;stroke-width:1;stroke-dasharray:2,2;" x1="1665.8877" x2="1892.5313" y1="2525.0442" y2="2525.0442"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="1677.8877" y="2519.8212">34</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="113.7392" x="1694.4716" y="2519.8212">(true, Nil) on returnCh</text></g><path d="M10,2538.0442 L10,2652.0442 L2161,2652.0442 L2161,2548.0442 L2151,2538.0442 L10,2538.0442" fill="#C8E6C9" style="stroke:#000000;stroke-width:1;"/><path d="M2151,2538.0442 L2151,2548.0442 L2161,2548.0442 L2151,2538.0442" fill="#C8E6C9" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="50.4676" x="942.1738" y="2554.8031">Outcome</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="59.4106" x="942.1738" y="2569.785">A and B are</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="25.7508" x="1004.4444" y="2569.785">both</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="151.931" x="1033.0552" y="2569.785">slashed in the same block bP.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="260.2912" x="942.1738" y="2584.7669">Collusion is mutually destructive: if B had attached</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="278.32" x="942.1738" y="2599.7488">a SlashDeploy(b', A) to b_B, then b_B would have been</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="270.686" x="942.1738" y="2614.7307">ADMITTED (post-fix Rust widening, T-9.9), and only A</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="273.392" x="942.1738" y="2629.7126">would have been slashed. By neglecting, B incurs the</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="206.2266" x="942.1738" y="2644.6944">same economic cost as the equivocator.</text><?plantuml-src hLZFRzl85RxhhtXh7s9fBQr_95xRWOEAbBp98h6DM9iUua0OaIE9CSNXpf1Mr230NbfiUrpqtg8eq4ll1NhSFyL_IRytGqgahMIpRNr8RCxC-_czxxsPBxAfd4bAOn4bZKOMPR6amLorOtaZOpAnCDCecT3j3t-cGCLnRYALK6HebcUvYEC5XT9aEW-ow4Os6kOwIbAXnOoC_3wNII3fVOEegxMQ-ofMcce_cm_j3tOyZyRoUPH8J-bGwjNMpGFxWnqNGcTH4AKYoMgRDlVj3tQSgUpU-ReCkqC4rnEjyYIiQ3azFJtixsB7DrX9rmXPQUb5Dn5MxudPxFlzqzFTneTA448v5dcSdQeaEnE8yeOHYMaRgQFnnlfjbz7l9EtkDXeYprIIpqPIu_SWMrgoqVy-ZsvK8FXJTsCLIs6ewtmvzFUzm_eXdrC7gydRg2K0X-18jlxGKvKWjtIXLQfWCrriB0zTM4t-OV_0FsgagypGnYiHHw78P5sFFVIg27NVz_RhXvO-0LmzcKcsOiCTwdtqq0k4B08gP9BvmgHIFvkbyOOzv7_qa1UhuBed9fVG82OhArdJvSTygfetq4Yyr7mUft5iy953pgRBHAHcghAhP2jAsZCvKtf1flX8QdoLzBhVq9UaadOmHGcIoH2ygoJLiXqh4SgGHWiQiTN3LAj06gDqqohsBzShjYxwMeeYYDLSSs0slRtUQS-h7xfGb_HogcAHJ3Rkf8sNQBEtwp_i7pMGMZ4IHbg0U2e9QIPIE5UttndepLRd6WbAZzGDODJTvfMoN8XQhGij0uYAEBwcrSAtsn_-HWMIb3Rso3P01yAX4NOYAlCecxAoQqbFQATJdEcIYIQ9eH7zXXdeR9j0RmcD7XH_ksFuy_QFVwLHWxtOmbyZw9z9GmAbc4h8Ju85aaC6Noc6Gzgbe5dgyPW2Moqn1_nQBTxQVM18Ld1YvM8JGk9XwIQISzu6SmWPhmYQHt0gc2gK66MAWWXnugDWsSoGcYTEDOs6BETjRh9e73aTnZhmssU3f-VV3KXacGWiMGkwPDxkoJHM2yg4diYCltSjZMTJaR5bCCMUtqZa94R98MTW0hkQwMWoaGZySzi5zZeDcoV7TB6S84GsJHg9E24H8gr6w4Z4z1M-JJHGoY6Wd_z5X3fB9XBRGblO_1tRmmYwldBzXUHuZ1N8mqbawuIcZddcceFnbKC2cyhoHd7Eqe3laD1Yz0BdqbodCNyj88peBVDGdiiap3ifWZbHi30jLYPQBB0I9SXp8k86l2E6QwDnSb94ODT6hhlAC8C5sn16ngvcH9wSD1fTQh_Uz0_s3lSEtpm1uNtv9HrRI78Tbo14kOoMU4IT5EjIw3YI-Z4G3emY_uoJIjsyiW67ooQJuL2OOGMh9tJxfx-pDS1nccCTU_CKZLcYlO1067RMy_QIHApzgJ36ReOwmVYt3Kaou1cBKmdQgQBQS1nukqKGRBCfY63zMAiPKsYXB2nOlBEAvYkEpUwZWqV-3cBJSx5PemA5itsL_8AlsqiIRJPwBFZHmuF-rrqhc21NliiqmpbmF3YirSrLOgr5GhOGZamDyooA2pah0ozP3XU_oOOW1uDsCPm2hh2lOzWOtQJRF_n4xjjwCzQgXu2c8w0EdxrAM4gDErpqa1Whit_mQ7TdvqsR0GMPpv8RhWTByyV7tN0M0SkZM5QxL2EKWaSoM4yz5_b2oXCqHnlvNolcLSElYHbO1wC4aq5MI-3GLSGMIDj2_FR7dsXt6__zldb7X0kn4y5PvxArfNu21ifbiwhUTvK0OffotwG13ur5ROQWYsFWcQgslxHMODUO1oK08ZAPwL0tMM0tpQSAg9nRkaMxU81zC-G85CWL9985GzmsYngPObk5JhT1RkWTZiLG0pnA6ndVIDDPHo9xY4UMfvPAl48pjutIQqTD9PqlHs_c5JkaVO9QoWvHq