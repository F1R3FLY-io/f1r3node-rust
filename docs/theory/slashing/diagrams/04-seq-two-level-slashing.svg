5 L1847,2009.5695 L1837,1999.5695 L1670,1999.5695" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1837,1999.5695 L1837,2009.5695 L1847,2009.5695 L1837,1999.5695" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="133.814" x="1676" y="2016.3284">prepare_slashing_deploys</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="140.942" x="1676" y="2031.3103">emits ONE SlashDeploy per</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="140.304" x="1676" y="2046.2922">offender; both are bundled</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="132.9671" x="1676" y="2061.274">into the SAME block bP as</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="132.7031" x="1676" y="2076.2559">separate system_deploys.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="133.231" x="1676" y="2091.2378">They execute sequentially</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="148.312" x="1676" y="2106.2197">during local block evaluation</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="143.978" x="1676" y="2121.2016">but produce ONE post-state</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="156.2429" x="1676" y="2136.1835">hash gossiped to the network.</text><g class="message" data-entity-1="part10" data-entity-2="part11" id="msg29"><polygon fill="#6A1B9A" points="1876.5313,2181.3702,1886.5313,2185.3702,1876.5313,2189.3702,1880.5313,2185.3702" style="stroke:#6A1B9A;stroke-width:1;"/><line style="stroke:#6A1B9A;stroke-width:1;" x1="1665.8877" x2="1882