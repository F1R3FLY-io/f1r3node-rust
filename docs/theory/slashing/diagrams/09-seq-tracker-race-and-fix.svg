<path d="M732.73,65.9641 C732.73,55.9641 750.73,55.9641 750.73,55.9641 C750.73,55.9641 768.73,55.9641 768.73,65.9641 L768.73,91.9641 C768.73,101.9641 750.73,101.9641 750.73,101.9641 C750.73,101.9641 732.73,101.9641 732.73,91.9641 L732.73,65.9641" fill="#C8E6C9" style="stroke:#000000;stroke-width:1;"/><path d="M732.73,65.9641 C732.73,75.9641 750.73,75.9641 750.73,75.9641 C750.73,75.9641 768.73,75.9641 768.73,65.9641" fill="none" style="stroke:#000000;stroke-width:1;"/></g><g class="participant participant-tail" data-entity-uid="part4" data-qualified-name="KV" id="part4-tail"><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="42.9107" x="726.2747" y="2277.8575">KV store</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="118.787" x="688.3365" y="2292.8393">((Validator, SeqNum) &#8594;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="80.9374" x="708.6913" y="2307.8212">Set[BlockHash])</text><path d="M732.73,2321.0442 C732.73,2311.0442 750.73,2311.0442 750.73,2311.0442 C750.73,2311.0442 768.73,2311.0442 768.73,2321.0442 L768.73,2347.0442 C768.73,2357.0442 750.73,2357.0442 750.73,2357.0442 C750.73,2357.0442 732.73,2357.0442 732.73,2347.0442 L732.73,2321.0442" fill="#C8E6C9" style="stroke:#000000;stroke-width:1;"/><path d="M732.73,2321.0442 C732.73,2331.0442 750.73,2331.0442 750.73,2331.0442 C750.73,2331.0442 768.73,2331.0442 768.73,2321.0442" fill="none" style="stroke:#000000;stroke-width:1;"/></g><g><title>EquivocationTrackerStore</title><rect fill="#FFFFFF" height="166.8732" style="stroke:#000000;stroke-width:1;" width="10" x="489.0797" y="1701.5695"/></g><g><title>EquivocationTrackerStore</title><rect fill="#FFFFFF" height="161.8551" style="stroke:#000000;stroke-width:1;" width="10" x="489.0797" y="1962.3702"/></g><path d="M21,161.9098 L21,395.9098 L819,395.9098 L819,171.9098 L809,161.9098 L21,161.9098" fill="#ECEFF1" style="stroke:#000000;stroke-width:1;"/><path d="M809,161.9098 L809,171.9098 L819,171.9098 L809,161.9098" fill="#ECEFF1" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="75.8665" x="230.5431" y="178.6687">Preconditions</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="369.7623" x="230.5431" y="193.6506">&#8226; Validator A signed b1 and b2 &#8212; both at sequence number sn &#8212; by the</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="289.3078" x="236.263" y="208.6325">same sender, with b1.hash &#8800; b2.hash (an equivocation).</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="361.3695" x="230.5431" y="223.6143">&#8226; Both b1 and b2 propagate to the local node concurrently and trigger</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="360.9844" x="236.263" y="238.5962">two `handle_invalid_block(...)` invocations on different worker threads.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="352.6575" x="230.5431" y="253.5781">&#8226; Both threads independently observe "AdmissibleEquivocation" and</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="224.4204" x="236.263" y="268.56">eventually reach the neglect-detection path</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="343.2745" x="236.263" y="283.5419">`update_equivocation_records_after_neglect_check(...)` where each</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="202.9706" x="236.263" y="298.5238">accumulates evidence at key (A, sn &#8722; 1).</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="254.3292" x="230.5431" y="313.5057">&#8226; The KV store starts with NO record at (A, sn &#8722; 1).</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="2.86" x="230.5431" y="328.4876">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="69.3325" x="230.5431" y="343.4694">Color legend</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="370.0374" x="230.5431" y="358.4513">red = adversarial / regression  &#183;  orange = detection verdict / slash effect</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="253.4932" x="230.5431" y="373.4332">green = honest write / Valid    &#183;  blue = read query</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="355.7486" x="230.5431" y="388.4151">purple = Rholang invocation     &#183;  teal = block gossip   &#183;  gray = internal</text><rect fill="#ECEFF1" height="3" style="stroke:#ECEFF1;stroke-width:1;" width="819.1236" x="5" y="422.129"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="824.1236" y1="422.129" y2="422.129"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="824.1236" y1="425.129" y2="425.129"/><rect fill="#ECEFF1" height="22.9819" style="stroke:#000000;stroke-width:1;" width="351.8345" x="238.6445" y="411.6381"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="334.9745" x="244.6445" y="427.397">Pre-fix Phase a &#8212; handle_invalid_block: both threads insert &#8709;</text><path d="M12,449.62 L12,548.62 L337,548.62 L337,459.62 L327,449.62 L12,449.62" fill="#ECEFF1" style="stroke:#000000;stroke-width:1;"/><path d="M327,449.62 L327,459.62 L337,459.62 L327,449.62" fill="#ECEFF1" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="243.3292" x="42.757" y="466.3789">Both threads enter handle_invalid_block on the</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="254.9782" x="42.757" y="481.3608">AdmissibleEquivocation verdict and idempotently</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="210.4945" x="42.757" y="496.3427">insert an empty record at (A, sn &#8722; 1). This</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="215.6425" x="42.757" y="511.3245">step is NOT the source of the race &#8212; both</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="237.3453" x="42.757" y="526.3064">threads write the same value. The race begins</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="56.1656" x="42.757" y="541.2883">in Phase b.</text><g class="message" data-entity-1="part1" data-entity-2="part3" id="msg1"><polygon fill="#2E7D32" points="482.0797,571.4932,492.0797,575.4932,482.0797,579.4932,486.0797,575.4932" style="stroke:#2E7D32;stroke-width:1;"/><line style="stroke:#2E7D32;stroke-width:1;" x1="90.123" x2="488.0797" y1="575.4932" y2="575.4932"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="97.123" y="570.2702">1</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="199.4186" x="107.415" y="570.2702">insert_equivocation_record(A, sn&#8722;1, &#8709;)</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg2"><polygon fill="#2E7D32" points="738.73,600.4751,748.73,604.4751,738.73,608.4751,742.73,604.4751" style="stroke:#2E7D32;stroke-width:1;"/><line s