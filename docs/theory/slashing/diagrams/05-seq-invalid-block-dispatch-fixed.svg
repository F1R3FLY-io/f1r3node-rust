" fill="none" style="stroke:#000000;stroke-width:1;"/></g><g><title>Validate</title><rect fill="#FFFFFF" height="218.8551" style="stroke:#000000;stroke-width:1;" width="10" x="286.3692" y="435.6562"/></g><g><title>Validate</title><rect fill="#FFFFFF" height="218.8551" style="stroke:#000000;stroke-width:1;" width="10" x="286.3692" y="1000.3121"/></g><g><title>MultiParentCasperImpl</title><rect fill="#FFFFFF" height="100.9638" style="stroke:#000000;stroke-width:1;" width="10" x="579.5564" y="624.5113"/></g><g><title>MultiParentCasperImpl</title><rect fill="#FFFFFF" height="371.7283" style="stroke:#000000;stroke-width:1;" width="10" x="579.5564" y="1189.1672"/></g><g><title>BlockCreator</title><rect fill="#FFFFFF" height="529.6015" style="stroke:#000000;stroke-width:1;" width="10" x="1530.9781" y="1632.8593"/></g><g><title>PoS Rholang</title><rect fill="#FFFFFF" height="204.8189" style="stroke:#000000;stroke-width:1;" width="10" x="1797.9182" y="1957.6419"/></g><path d="M11,146.946 L11,350.946 L2093,350.946 L2093,156.946 L2083,146.946 L11,146.946" fill="#ECEFF1" style="stroke:#000000;stroke-width:1;"/><path d="M2083,146.946 L2083,156.946 L2093,156.946 L2083,146.946" fill="#ECEFF1" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="75.8665" x="862.797" y="163.7049">Preconditions</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="333.7707" x="862.797" y="178.6868">&#8226; Validator V* is bonded with stake &gt; 0 and has previously signed</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="329.7997" x="868.517" y="193.6687">blocks at seq numbers 0&#8230;(bX.seqNum &#8722; 1) seen by the network.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="369.4435" x="862.797" y="208.6506">&#8226; V* signs a NEW block bX at seq bX.seqNum whose creator-justification</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="348.9066" x="868.517" y="223.6325">points at a strictly *older* sequence number than V*'s known latest</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="150.699" x="868.517" y="238.6143">message &#8212; i.e., a regression.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="345.0456" x="862.797" y="253.5962">&#8226; The example uses JustificationRegression but the dispatcher logic</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="245.7383" x="868.517" y="268.5781">is identical for any is_slashable() = TRUE variant.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="2.86" x="862.797" y="283.56">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="69.3325" x="862.797" y="298.5419">Color legend</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="370.0374" x="862.797" y="313.5238">red = adversarial / regression  &#183;  orange = detection verdict / slash effect</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="253.4932" x="862.797" y="328.5057">green = honest write / Valid    &#183;  blue = read query</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="355.7486" x="862.797" y="343.4876">purple = Rholang invocation     &#183;  teal = block gossip   &#183;  gray = internal</text><rect fill="#ECEFF1" height="3" style="stroke:#ECEFF1;stroke-width:1;" width="2097.6314" x="5" y="377.2015"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2102.6314" y1="377.2015" y2="377.2015"/><line