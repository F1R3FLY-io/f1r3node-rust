l="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="4.136" x="900.7872" y="223.6325">&#8226;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="123.2101" x="907.7832" y="223.6325">Distinguishing feature</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="32.3068" x="1030.9933" y="223.6325">: b1' is</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="23.9908" x="1066.1601" y="223.6325">NOT</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="69.0245" x="1093.0109" y="223.6325">referenced in</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="280.905" x="906.5072" y="238.6143">any other block's justifications &#8212; it arrived unsolicited.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="354.9894" x="900.7872" y="253.5962">&#8226; The base sequence number for the EquivocationRecord is seqN &#8722; 1.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="2.86" x="900.7872" y="268.5781">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="69.3325" x="900.7872" y="283.56">Color legend</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="370.0374" x="900.7872" y="298.5419">red = adversarial / regression  &#183;  orange = detection verdict / slash effect</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="253.4932" x="900.7872" y="313.5238">green = honest write / Valid    &#183;  blue = read query</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="355.7486" x="900.7872" y="328.5057">purple = Rholang invocation     &#183;  teal = block gossip   &#183;  gray = internal</text><rect fill="#ECEFF1" height="3" style="stroke:#ECEFF1;stroke-width:1;" width="2175.6119" x="5" y="362.2196"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2180.6119" y1="362.2196" y2="362.2196"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2180.6119" y1="365.2196" y2="365.2196"/><rect fill="#ECEFF1" height="22.9819" style="stroke:#000000;stroke-width:1;" width="189.4708" x="998.0706" y="351.7286"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="172.6108" x="1004.0706" y="367.4876">Pre-fix behavior &#8212; current Rust</text><g class="message" data-entity-1="part1" data-entity-2="part3" id="msg1"><polygon fill="#C62828" points="342.2883,401.6924,352.2883,405.6924,342.2883,409.6924,346.2883,405.6924" style="stroke:#C62828;stroke-width:1;"/><line style="stroke:#C62828;stroke-width:1;" x1="48.6342" x2="348.2883" y1="405.6924" y2="405.6924"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="55.6342" y="400.4694">1</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="194.0826" x="65.9262" y="400.4694">signed block b1' @ seqN  (unsolicited)</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg2"><polygon fill="#1565C0" points="578.2318,430.6743,588.2318,434.6743,578.2318,438.6743,582.2318,434.6743" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="364.2883" x2="584.2318" y1="434.6743" y2="434.6743"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="371.2883" y="429.4513">2</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdju