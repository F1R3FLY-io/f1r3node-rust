" fill="#ECEFF1" style="stroke:#000000;stroke-width:1;"/><path d="M2210,146.946 L2210,156.946 L2220,156.946 L2210,146.946" fill="#ECEFF1" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="75.8665" x="925.8781" y="163.7049">Preconditions</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="181.2237" x="1004.6045" y="163.7049">(same as Diagram 02 unless noted)</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="202.0576" x="925.8781" y="178.6868">&#8226; Validator A is bonded with stake s &gt; 0.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="295.6779" x="925.8781" y="193.6687">&#8226; A has previously signed b1 @ seqN (already in the DAG).</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="203.8274" x="925.8781" y="208.6506">&#8226; A now signs b1' @ seqN with b1' &#8800; b1.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="4.136" x="925.8781" y="223.6325">&#8226;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="123.2101" x="932.874" y="223.6325">Distinguishing feature</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="32.3068" x="1056.0841" y="223.6325">: b1' is</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="23.9908" x="1091.2509" y="223.6325">NOT</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="69.0245" x="1118.1017" y="223.6325">referenced in</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="280.905" x="931.598" y="238.6143">any other block's justifications &#8212; it arrived unsolicited.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="354.9894" x="925.8781" y="253.5962">&#8226; The base sequence number for the EquivocationRecord is seqN &#8722; 1.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="2.86" x="925.8781" y="268.5781">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="69.3325" x="925.8781" y="283.56">Color legend</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="370.0374" x="925.8781" y="298.5419">red = adversarial / regression  &#183;  orange = detection verdict / slash effect</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="253.4932" x="925.8781" y="313.5238">green = honest write / Valid    &#183;  blue = read query</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="355.7486" x="925.8781" y="328.5057">purple = Rholang invocation     &#183;  teal = block gossip   &#183;  gray = internal</text><rect fill="#ECEFF1" height="3" style="stroke:#ECEFF1;stroke-width:1;" width="2291.8344" x="5" y="362.2196"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2296.8344" y1="362.2196" y2="362.2196"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2296.8344" y1="365.2196" y2="365.2196"/><rect fill="#ECEFF1" height="22.9819" style="stroke:#000000;stroke-width:1;" width="189.4708" x="1056.1818" y="351.7286"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="172.6108" x="1062.1818" y="367.4876">Pre-fix behavior &#8212; current Rust</text><g class="message" data-entity-1="part1" data-entity-2="part3" id="msg1"><polygon fill="#C62828" points="342.2883,401.6924,352.2883,405.6924,342.2883,409.6924,346.2883,405.6924" style="stroke:#C62828;stroke-width:1;"/><line style="stroke:#C62828;stroke-width:1;" x1="48.6342" x2="348.2883" y1="405.6924" y2="405.6924"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="55.6342" y="400.4694">1</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="194.0826" x="65.9262" y="400.4694">signed block b1' @ seqN  (unsolicited)</text></g><g class="message" data-entity-1="part3" data-entity-2="part4" id="msg2"><polygon fill="#1565C0" points="578.2318,430.6743,588.2318,434.6743,578.2318,438.6743,582.2318,434.6743" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="364.2883" x2="584.2318" y1="434.6743" y2="434.6743"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="371.2883" y="429.4513">2</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="128.2811" x="381.5802" y="429.4513">check_equivocations(b1')</text></g><g class="message" data-entity-1="part4" data-entity-2="part6" id="msg3"><polygon fill="#1565C0" points="1014.1713,459.6562,1024.1713,463.6562,1014.1713,467.6562,1018.1713,463.6562" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="600.2318" x2="1020.1713" y1="463.6562" y2="463.6562"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="607.2318" y="458.4332">3</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="121.9561" x="617.5238" y="458.4332">creator_justification(b1)</text></g><g class="message" data-entity-1="part4" data-entity-2="part6" id="msg4"><polygon fill="#1565C0" points="1014.1713,503.62,1024.1713,507.62,1014.1713,511.62,1018.1713,507.62" style="stroke:#1565C0;stroke-width:1;"/><line style="stroke:#1565C0;stroke-width:1;" x1="600.2318" x2="1020.1713" y1="507.62" y2="507.62"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="607.2318" y="494.9061">4</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="202.1235" x="617.5238" y="487.4151">requested_as_dependency(b1') = FALSE</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="127.9511" x="617.5238" y="502.397">(no descendant cites b1')</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg5"><polygon fill="#E65100" points="375.2883,532.6019,365.2883,536.6019,375.2883,540.6019,371.2883,536.6019" style="stroke:#E65100;stroke-width:1;"/><line style="stroke:#E65100;stroke-width:1;stroke-dasharray:2,2;" x1="369.2883" x2="594.2318" y1="536.6019" y2="536.6019"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="381.2883" y="531.3789">5</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="185.3597" x="391.5802" y="531.3789">InvalidBlock::IgnorableEquivocation</text></g><g class="message" data-entity-1="part3" data-entity-2="part5" id="msg6"><polygon fill="#E65100" points="738.039,561.5837,748.039,565.5837,738.039,569.5837,742.039,565.5837" style="stroke:#E65100;stroke-width:1;"/><line style="stroke:#E65100;stroke-width:1;" x1="364.2883" x2="744.039" y1="565.5837" y2="565.5837"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="371.2883" y="560.3608">6</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="185.3597" x="381.5802" y="560.3608">InvalidBlock::IgnorableEquivocation</text></g><g class="message" data-entity-1="part5" data-entity-2="part5" id="msg7"><line style="stroke:#C62828;stroke-width:1;" x1="760.039" x2="802.039" y1="689.4932" y2="689.4932"/><line style="stroke:#C62828;stroke-width:1;" x1="802.039" x2="802.039" y1="689.4932" y2="702.4932"/><line style="stroke:#C62828;stroke-width:1;" x1="755.039" x2="802.039" y1="702.4932" y2="702.4932"/><polygon fill="#C62828" points="765.039,698.4932,755.039,702.4932,765.039,706.4932,761.039,702.4932" style="stroke:#C62828;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="6.2919" x="767.039" y="654.3064">7</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="65.2955" x="777.3309" y="624.3427">tracing::info!</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="182.3897" x="777.3309" y="639.3245">("Did not add block {} as that would</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="221.1204" x="783.0509" y="654.3064">add an equivocation to the BlockDAG", b1')</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="220.8564" x="777.3309" y="669.2883">(no EquivocationRecord, no DAG mutation,</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="82.8294" x="780.1909" y="684.2702">no SlashDeploy)</text></g><path d="M760,710.4932 L760,839.4932 L996,839.4932 L996,720.4932 L986,710.4932 L760,710.4932" fill="#FFCDD2" style="stroke:#000000;stroke-width:1;"/><path d="M986,710.4932 L986,720.4932 L996,720.4932 L986,710.4932" fill="#FFCDD2" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="215.0978" x="766" y="727.2521">&#9888; multi_parent_casper_impl.rs:1077-1088</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="211.4955" x="766" y="742.234">returns Ok(dag.clone()) without any state</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="214.2455" x="766" y="757.2159">change. The behavior is documented as a</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="140.018" x="766" y="772.1978">DOS vector by the TODO at</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="111.1102" x="766" y="787.1796">block_status.rs:36-39:</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="204.2135" x="766" y="802.1615">"IgnorableEquivocation slashable again</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="208.2395" x="768.86" y="817.1434">... will become a DOS vector if not fixed."</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="214.6965" x="766" y="832.1253">Equivocator A pays nothing under pre-fix.</text><path d="M18,850.3483 L18,979.3483 L2291,979.3483 L2291,860.3483 L2281,850.3483 L18,850.3483" fill="#FFCDD2" style="stroke:#000000;stroke-width:1;"/><path d="M2281,850.3483 L2281,860.3483 L2291,860.3483 L2281,850.3483" fill="#FFCDD2" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="87.2404" x="1041.298" y="867.1072">Pre-fix outcome</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="171.5988" x="1041.298" y="882.0891">Equivocator A pays nothing &#8212; no</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="191.0466" x="1041.298" y="897.071">EquivocationRecord, no SlashDeploy,</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="191.8826" x="1041.298" y="912.0529">no bond loss. Ignorable equivocation</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="55.6926" x="1041.298" y="927.0348">becomes a</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="127.3351" x="1099.8506" y="927.0348">DOS vector at zero cost</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="2.948" x="1227.1857" y="927.0348">:</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="207.8545" x="1041.298" y="942.0166">an adversary can flood the network with</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="218.2384" x="1041.298" y="956.9985">unrequested second blocks knowing none</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="78.1105" x="1041.298" y="971.9804">will be slashed.</text><rect fill="#ECEFF1" height="3" style="stroke:#ECEFF1;stroke-width:1;" width="2291.8344" x="5" y="1005.6943"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2296.8344" y1="1005.6943" y2="1005.6943"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2296.8344" y1="1008.6943" y2="1008.6943"/><rect fill="#ECEFF1" height="22.9819" style="stroke:#000000;stroke-width:1;" width="145.625" x="1078.1047" y="995.2034"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="128.7651" x="1084.1047" y="1010.9623">Post-fix behavior (T-9.1)</text><rect fill="#ECEFF1" height="3" style="stroke:#ECEFF1;stroke-width:1;" width="2291.8344" x="5" y="1073.6762"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="2296.8344" y1="1073.6762" y2="1073.6762"/><line