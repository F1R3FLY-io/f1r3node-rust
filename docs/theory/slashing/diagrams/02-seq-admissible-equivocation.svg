8.6506">&#8226; Both b1 and b1' will be signed at seqN, where seqN &#8805; 1.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="358.1574" x="938.8406" y="223.6325">&#8226; The "base sequence number" used as the EquivocationRecord key is</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="46.3867" x="1299.858" y="223.6325">seqN &#8722; 1</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="2.948" x="1346.2447" y="223.6325">.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="444.1746" x="938.8406" y="238.6143">&#8226; Every block goes through Validate &#8594; EquivocationDetector &#8594; MultiParentCasperImpl</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="369.1904" x="944.5606" y="253.5962">on receipt; the diagram shows D explicitly when its verdict is non-trivial.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="2.86" x="938.8406" y="268.5781">&#160;</text><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="69.3325" x="938.8406" y="283.56">Color legend</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="370.0374" x="938.8406" y="298.5419">red = adversarial / regression  &#183;  orange = detection verdict / slash effect</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="253.4932" x="938.8406" y="313.5238">green = honest write / Valid    &#183;  blue = read query</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="355.7486" x="938.8406" y="328.5057">purple = Rholang invocation     &#183;  teal = block gossip   &#183