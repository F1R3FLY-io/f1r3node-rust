,2708.9899,156.6242,2704.9899" style="stroke:#00838F;stroke-width:1;"/><line style="stroke:#00838F;stroke-width:1;" x1="154.6242" x2="1547.6876" y1="2704.9899" y2="2704.9899"/><text fill="#000000" font-family="'sans-serif'" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="12.5839" x="166.6242" y="2669.8031">36</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="179.1008" x="183.208" y="2639.8393">finalized block bP (post-state hash)</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="186.6796" x="183.208" y="2654.8212">including the executed SlashDeploy.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="177.4728" x="183.208" y="2669.8031">P gossips bP to the network; other</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="193.5106" x="183.208" y="2684.785">validators replay the deploys to verify</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="74.5685" x="183.208" y="2699.7669">the post-state.</text></g><path d="M2286,2717.9899 L2286,2801.9899 L2504,2801.9899 L2504,2727.9899 L2494,2717.9899 L2286,2717.9899" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M2494,2717.9899 L2494,2727.9899 L2504,2727.9899 L2494,2717.9899" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="185.7337" x="2292" y="2734.7488">ForkChoice does not receive a push.</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="185.4257" x="2292" y="2749.7307">On every fork-choice computation it</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="162.5018" x="2292" y="2764.7126">reads on-chain bonds_map and<