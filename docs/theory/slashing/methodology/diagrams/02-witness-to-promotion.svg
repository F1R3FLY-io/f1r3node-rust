="#FFE0B2" style="stroke:#E65100;stroke-width:1;"/><path d="M1450,1429.0404 L1450,1439.0404 L1460,1439.0404 L1450,1429.0404" fill="#FFE0B2" style="stroke:#E65100;stroke-width:1;"/><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="311.7817" x="561.6044" y="1445.7993">The pipeline is monotone: every iteration either expands the</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="337.8625" x="561.6044" y="1460.7812">ledger (new finding), expands the mechanized arm (new theorem</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="312.5738" x="561.6044" y="1475.7631">or invariant), or expands the corpus (new replayable fixture).</text><text fill="#000000" font-family="'sans-serif'" font-size="11" lengthAdjust="spacing" textLength="180.3217" x="561.6044" y="1490.745">No finding is ever silently dropped.</text><?plantuml-src bLRBJXn75DttLzpW3PCCji46MqH4mcHGeX24ZAKiGjIgwRupKwQxgbrL3HxaHRB9Eeho3Vc8V8w_9AUg-ZK3Ozaj8GtTztdkkO-lt89BfgeGKYM9lPQg4aQKT26CavciX7AlH7OzDxfM-OakjA57f-7P8AnDpYOAuddqB3m3sNFjUDrYV61tylJLthhigi5MTdAml_lqwK3saj_Lh38-apFygHMzHy_3Cv3EUIRgmfrgvSu5yj-oGjaToqREjXuMkvHtJBkxIUAaAvX-aKwnjVJnpx_fmkXIEwaLLRBY0ivfEnDAAvc9WfmH6O-IfEf1egrB5YPRaDEwk5BRbsBEO_fXMMbKmqexlbALqPLZwyPKoEbfVNV71cz_4agEwKphSanlpav6MqJ2qXjO2LLvCPcikdcpC2pSJgbpXf-i4DRAcMIprU88xPFkRQZ0gtKRhslh2E7aTUPpl5A6-_-seetNpIlsbPcSxe4Tgt5u3CHK5j8jhrJ1-NmGGnl8MNWTgpivFJxTNRLn71mIgpa01cWLPAqJhhQZhSv68xJ9ni-SBG3X7UVaNyz4vc3fjSxUqHC0UlpnZ__mmwCyQZ8RQ3oOMK37yDo0304Tq4seRA6x_08yxVU7otJ11bLtZD-PDbLj4TGCDNyofaL7YhJgfD8eDQQFl__RSE0alEcoJewEwD9nHRkG-QTZwvmL6n4WEZfA0czsVcrwwRUTxmPSEAJRHkUMjl5pGIKxaGidHeb2MvAHyuKZFGliIoYIa4lfl4PGiCpvcD1B-HZVRMHyw2jsI6KCd7BIKpJT3UUGy9HduvPq8tKHWdoSC4IykpwXlP3GaDZKyZhhCXjm6ldjxX_idzpBp_-QgwXCsnfDYsGErhFhDH3XL5fPoa8O-a085SawpjDfFKzdyZrzW0JQFfT0YTEf7s_2BBseqMyv43Crqbu7GLYjoogyoo09GFYzA2jC5l-rLlo-WWfOXmdp5vMHPKsYomTWUHPWkUWQauPT-Yb8kjOzz2g5MA9