# cargo-deny configuration for the F1R3node Rust workspace.
# See https://embarkstudios.github.io/cargo-deny/ for documentation.

[graph]
all-features = false
no-default-features = false

# ---------------------------------------------------------------------------
# Security advisories — RustSec database.
# ---------------------------------------------------------------------------
[advisories]
db-path = "$CARGO_HOME/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"

# Specific advisories knowingly accepted. Each entry MUST justify why.
ignore = [
    # rustls-webpki 0.101.7 (transitive via rustls 0.21 -> hyper-rustls 0.24
    # -> reqwest 0.11 -> hocon / opentelemetry-zipkin). All three issues are
    # reachable only after signature verification and require certificate
    # misissuance to exploit. Cannot be patched without bumping hocon /
    # opentelemetry — out of scope for this sync.
    "RUSTSEC-2026-0098", # URI name constraints
    "RUSTSEC-2026-0099", # wildcard-name constraints
    "RUSTSEC-2026-0104", # CRL parsing panic

    # Unmaintained advisories accepted for now (transitive deps from upstream
    # crates we don't own). Track upstream remediation; revisit on next sync.
    "RUSTSEC-2025-0134", # rustls-pemfile (transitive via reqwest/tonic)
    "RUSTSEC-2024-0387", # opentelemetry_api merged into opentelemetry
    "RUSTSEC-2025-0141", # bincode 1.x (workspace dep; bincode 2.0 is breaking)
    "RUSTSEC-2021-0141", # dotenv (transitive via openai-api-rs)
    "RUSTSEC-2021-0153", # encoding (transitive via hocon -> nom)
    "RUSTSEC-2024-0436", # paste proc-macro (transitive via metrics)

    # Rand unsoundness with custom-logger + rand::rng(). We don't override
    # the global rng with a custom logger; the unsafe path is unreachable in
    # this codebase. Track upstream rand fix.
    "RUSTSEC-2026-0097",
]

# ---------------------------------------------------------------------------
# Licenses — permissive-only baseline. Workspace members (private, unpublished)
# are skipped via `private.ignore`.
# ---------------------------------------------------------------------------
[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "Zlib",
    "MPL-2.0",
    "BSL-1.0",
    "OpenSSL",
    "Unlicense",
]

# Per-crate exceptions for licenses outside the global allow list.
exceptions = [
    # zbase32 is a small permissively-spirited base32 encoder published under
    # LGPL-3.0+. It is consumed as a dynamic dependency and contains no
    # modifications, satisfying the LGPL linking exception.
    { allow = ["LGPL-3.0-or-later"], crate = "zbase32" },
]

# Skip license checks for unpublished workspace members.
private = { ignore = true }

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# F1R3FLY-io rholang-rs crates: published from a private Git repo that
# omits the `license` field in their Cargo.toml. The repo itself is
# Apache-2.0 (see https://github.com/F1R3FLY-io/rholang-rs).
[[licenses.clarify]]
name = "rholang-parser"
expression = "Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "rholang-tree-sitter"
expression = "Apache-2.0"
license-files = []

# ---------------------------------------------------------------------------
# Bans — disallow specific crates / version patterns.
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
# Workspace-internal path deps without explicit versions are reported as
# wildcards. Treat as warning so workspace structure isn't penalised.
wildcards = "warn"
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

# ---------------------------------------------------------------------------
# Sources — only crates.io and the F1R3FLY-io rholang-rs git repo.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/F1R3FLY-io/rholang-rs",
]
