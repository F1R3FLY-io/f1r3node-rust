\* TLC Model Configuration for ConcurrentTracker
\*
\* This .cfg sets Locked = TRUE (post-fix verification).
\* For the bug demonstration run, copy to MC_ConcurrentTracker_pre_fix.cfg
\* and change `Locked = TRUE` to `Locked = FALSE` — TLC will then produce
\* a counter-example trace exhibiting the overwrite race.

CONSTANTS
    t1 = t1
    t2 = t2
    v1 = v1
    h1 = h1
    h2 = h2
    Threads     <- MC_Threads
    Validators  <- MC_Validators
    BlockHashes <- MC_BlockHashes
    Locked = TRUE

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANT TypeOK
INVARIANT Inv_RecordMonotone
INVARIANT Inv_NoOverwrite

PROPERTY Live_AllThreadsFinish
