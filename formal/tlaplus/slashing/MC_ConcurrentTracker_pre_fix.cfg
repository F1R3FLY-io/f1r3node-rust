\* TLC Model Configuration for ConcurrentTracker — pre-fix run.
\*
\* Locked = FALSE.  TLC must report Inv_RecordMonotone violation:
\* a counter-example trace where Thread 1 writes h1, Thread 2 reads
\* the empty view, writes h2, and the resulting store at v1 is
\* {h2} — the overwrite that loses h1.
\*
\* This run is the formal demonstration of bug #2 (the Rust regression);
\* the post-fix run with Locked = TRUE must pass the same invariant.

CONSTANTS
    t1 = t1
    t2 = t2
    v1 = v1
    h1 = h1
    h2 = h2
    Threads     <- MC_Threads
    Validators  <- MC_Validators
    BlockHashes <- MC_BlockHashes
    Locked = FALSE

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANT TypeOK
INVARIANT Inv_RecordMonotone
INVARIANT Inv_NoOverwrite

PROPERTY Live_AllThreadsFinish
