\* TLC Model Configuration for EquivocationDetector — SAFETY ONLY
\*
\* Safety invariants only, no temporal property. This allows TLC to
\* checkpoint and complete without the liveness-graph blowup that
\* OOM'd the combined safety+liveness run at 14.9M distinct states.
\*
\* Safety invariants run exhaustively over the full 2v × 2s × 2b state
\* space.

CONSTANTS
    v1 = v1
    v2 = v2
    Validators       <- MC_Validators
    MaxSeqNum        <- MC_MaxSeqNum
    MaxBlocksPerSeq  <- MC_MaxBlocksPerSeq

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANT TypeOK
INVARIANT Inv_DetectionSound
INVARIANT Inv_TaxonomyCorrect
INVARIANT Inv_NeglectedHasDetectableView
INVARIANT Inv_FixedDetectorTotal
INVARIANT Inv_MissingPointerNonContributing
INVARIANT Inv_DuplicateChildNeedsDistinctChildren
INVARIANT Inv_TwoDistinctChildrenDetect
INVARIANT Inv_DetectedHashDetects
INVARIANT Inv_DetectorTraversalFiniteFuel
INVARIANT Inv_DetectorTraversalInDomain
INVARIANT Inv_DetectorBugFixClassAllowed
INVARIANT Inv_CanonicalChildSound
INVARIANT Inv_CanonicalChildBoundary
INVARIANT Inv_CanonicalGapCompleteness
INVARIANT Inv_CanonicalDenseSubsumesPreFix
INVARIANT Inv_CanonicalPrefixStability
INVARIANT Inv_CanonicalSameBranchNoOvercount
INVARIANT Inv_CanonicalMemoizedEquivalent
INVARIANT Inv_RecordHasWitness
