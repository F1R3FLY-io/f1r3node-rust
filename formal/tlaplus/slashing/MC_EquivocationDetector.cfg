\* TLC Model Configuration for EquivocationDetector
\*
\* 3 validators × 3 seqnums × 2 blocks-per-seq = 18 (validator, seq, block)
\* triples. Total reachable state space stays under 10⁵.

CONSTANTS
    v1 = v1
    v2 = v2
    Validators       <- MC_Validators
    MaxSeqNum        <- MC_MaxSeqNum
    MaxBlocksPerSeq  <- MC_MaxBlocksPerSeq

SPECIFICATION Spec

\* Terminal states are expected (all blocks classified)
CHECK_DEADLOCK FALSE

INVARIANT TypeOK
INVARIANT Inv_DetectionSound
INVARIANT Inv_TaxonomyCorrect
INVARIANT Inv_RecordHasWitness

PROPERTY Live_DetectionComplete
