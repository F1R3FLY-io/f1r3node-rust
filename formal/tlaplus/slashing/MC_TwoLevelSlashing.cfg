\* TLC Model Configuration for TwoLevelSlashing

CONSTANTS
    v1 = v1
    v2 = v2
    v3 = v3
    v4 = v4
    Validators <- MC_Validators
    MaxLevel   <- MC_MaxLevel

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANT TypeOK
INVARIANT Inv_LevelClosureTerminates
INVARIANT Inv_SlashedInUniverse

\* Inv_ActiveSetAboveQuorum is NOT checked here because the spec's Init
\* does not enforce |equivocators ∪ neglect-closure| ≤ F (the BFT
\* precondition). Without that precondition the invariant CAN fail under
\* an adversarial neglect graph — TLC produces a counter-example trace
\* with slashed = {v1, v4}, neglectGraph[v4] = {v1, v2} that drops the
\* active set below quorum. The BFT-style claim is mechanized in Rocq as
\* TwoLevelSlashing.t_12_bft_quorum_preservation, which carries the
\* precondition explicitly. See slashing-verification.md §7.3.
