\* TLC Model Configuration for CostAccountingThreats
\*
\* Models adversarial replay tampering, missing commitments, activation
\* downgrade attempts, unauthorized settlement, and cost-invalid evidence
\* recording against a single cost-accounted deploy boundary.

CONSTANTS
    good_digest = good_digest
    bad_digest = bad_digest
    GoodDigest <- MC_GoodDigest
    BadDigest <- MC_BadDigest
    InitialFuel <- MC_InitialFuel

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANT TypeOK
INVARIANT CostAccountedReplayAcceptsOnlyValidPayload
INVARIANT CostAccountedReplayRejectsMissingCommitment
INVARIANT SettlementNeverAddsRuntimeFuel
INVARIANT CostInvalidEvidenceHasViolation
INVARIANT ReplayTamperCannotStayAccepted
