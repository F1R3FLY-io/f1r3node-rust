\* TLC config for the #12 compound (Split/Join) three-pool settlement debit.
\*
\* MaxSupply = 4 makes each of the four pre-state pools (Σ⟦comp⟧, Σ⟦s₁⟧,
\* Σ⟦s₂⟧, Σ⟦s₃⟧) range over 0..4 and every admissible compound demand k
\* (0..Σ⟦comp⟧ + min(Σ⟦s₁⟧,Σ⟦s₂⟧)) and k2 — a bounded-exhaustive sweep of the
\* combined-pool-first split AND the cross-group shared-component residual ledger.

CONSTANTS
    MaxSupply = 4

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    Inv_ComponentDrawNoUnderflow
    Inv_CompoundDebitConserves
    Inv_DrawMatchesDemand
    Inv_SharedComponentSummedDrawWithinSupply
    Inv_CombinedPoolSummedDrawWithinSupply
