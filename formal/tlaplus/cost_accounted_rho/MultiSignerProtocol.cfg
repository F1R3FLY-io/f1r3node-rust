\* TLC config for MultiSignerProtocol model checking.
\* Bounded state-space verification of the Phase 1.7 / 1.6 multi-signature
\* deploy protocol. Default bound matches §1.10: state-space bound 5.
\* Increase for higher-confidence verification at the cost of TLC runtime.

CONSTANTS
    NumCosigners = 3
    PhloLimit = 6
    PhloPrice = 1

SPECIFICATION Spec

INVARIANTS
    MapDomainEqualsInFlightSigners
    RefundFinalizes
    NoRefundCrossAttribution
    PartialFailureNoConsumption
    NoNegativeAmounts
    ChargedAmountBounded
    PhloShareConservation
    FailureRevertsCharges
    TotalRefundConservation

PROPERTIES
    EventuallyDoneOrReverted
    EventuallyAllRefundsComplete
