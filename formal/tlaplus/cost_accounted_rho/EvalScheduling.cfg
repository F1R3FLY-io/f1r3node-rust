\* TLC Model Configuration for EvalScheduling
\*
\* Models 3 bodies sharing a channel, with asymmetric storage costs.
\* Verifies: internalized cost is deterministic (order-independent).

CONSTANTS
    b1 = b1
    b2 = b2
    b3 = b3
    Bodies          <- MC_Bodies
    CostPerToken    <- MC_CostPerToken
    StorageCostA    <- MC_StorageCostA
    StorageCostB    <- MC_StorageCostB
    MintAmount      <- MC_MintAmount
    CanonOrder      <- MC_CanonOrder
    Demand          <- MC_Demand
    PoolSupply      <- MC_PoolSupply

SPECIFICATION LiveSpec

CHECK_DEADLOCK FALSE

\* Invariants
INVARIANT TypeOK
INVARIANT InternalizedCostDeterministic
INVARIANT InternalizedCostBounded
\* Cost-Accounted Rho Stage B supply invariants
INVARIANT HaltedValidatorSupplyNonIncreasing
INVARIANT SupplyOnlyFromMint
\* Cost-Accounted Rho WD-D2 acceptance-gate invariants
INVARIANT NoDoubleSpendAtBlock
INVARIANT RejectBothOnOversubscription
INVARIANT GateBeforeExecute
INVARIANT SupplyConservation

\* Temporal properties
PROPERTY AllEventuallyDone
\* Cost-Accounted Rho Stage B supply action-properties
PROPERTY SupplyMonotoneStep
PROPERTY HaltedSupplyFrozenStep
\* Cost-Accounted Rho WD-D2 acceptance-gate action-property
PROPERTY SupplyOnlyWrittenByMint
