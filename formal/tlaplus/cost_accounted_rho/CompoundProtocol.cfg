\* TLC Model Configuration for CompoundProtocol
\*
\* 2 atomic processes + 1 compound process + 1 spawned child.
\* Tests Split mediators, nested gates, recursive eval, and
\* cost determinism across all interleavings.

CONSTANTS
    a1 = a1
    a2 = a2
    c1 = c1
    child1 = child1
    ch_a1 = ch_a1
    ch_a2 = ch_a2
    ch_c1_combined = ch_c1_combined
    ch_c1_s1 = ch_c1_s1
    ch_c1_s2 = ch_c1_s2
    ch_child1 = ch_child1
    Procs           <- MC_Procs
    Channels        <- MC_Channels
    AtomicProcs     <- MC_AtomicProcs
    CompoundProcs   <- MC_CompoundProcs
    TokensPerProc   <- MC_TokensPerProc
    PrimaryChan     <- MC_PrimaryChan
    SecondaryChan   <- MC_SecondaryChan
    CompoundChan    <- MC_CompoundChan
    SpawnedProcs    <- MC_SpawnedProcs
    CostPerGate     <- MC_CostPerGate

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

\* Invariants
INVARIANT TypeOK
INVARIANT TokenConservation
INVARIANT NoNegativeTokens
INVARIANT FuelGateSafety
INVARIANT SplitOrdering
INVARIANT InnerGateOrdering
INVARIANT CostDeterminism

\* Temporal properties
PROPERTY AllSpawnedComplete
