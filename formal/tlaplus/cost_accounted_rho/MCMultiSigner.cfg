\* TLC harness for MCMultiSigner — re-uses MultiSignerProtocol invariants
\* with a slightly enlarged scale (5 cosigners, phlo 8) to exercise more
\* of the Map-in-MVar concurrency interleavings. Companion to
\* MultiSignerProtocol.cfg (3 cosigners, phlo 6) for a default run.

CONSTANTS
    NumCosigners = 5
    PhloLimit = 8
    PhloPrice = 1

SPECIFICATION Spec

INVARIANTS
    MapDomainEqualsInFlightSigners
    RefundFinalizes
    PartialFailureNoConsumption
    NoNegativeAmounts
    ChargedAmountBounded
    PhloShareConservation
    FailureRevertsCharges

PROPERTIES
    EventuallyDoneOrReverted
    EventuallyAllRefundsComplete
