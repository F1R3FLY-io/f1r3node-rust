\* TLC config for MAJOR-5 — the M2 (TRANSPILER runtime-gate) griefing-vector
\* REFUTATION run.
\*
\* This .cfg checks ONLY Inv_M2_NoVictimDrainWithoutFire, which asserts that
\* under the transpiler's runtime sequential-gate model the victim pool sV is
\* drained ONLY IF the griefer's join actually fired. TLC REFUTES this with a
\* counterexample: a reachable terminal state in which the griefer acquired its
\* clause-2 gate (debiting sV at ENTRY) but withheld clause 1, so the join never
\* fires yet sV has been drained. That counterexample CONFIRMS the griefing
\* vector is real FOR THE TRANSPILER MODEL — and, by contrast with the native
\* suite (TokenGatedJoin.cfg, which proves Inv_M1_NoVictimDrainWithoutFire
\* HOLDS), real ONLY there.
\*
\* A NON-ZERO TLC exit (invariant violated, trace printed) is the EXPECTED,
\* INTENDED outcome of this run. It is therefore NOT registered in the default
\* runner's pass set (it is invoked explicitly with its own banner).
\*
\* MaxSupply = 3, same bounded sweep as the native suite.

CONSTANTS
    MaxSupply = 3

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANTS
    Inv_M2_NoGrieferDrainOfVictim
