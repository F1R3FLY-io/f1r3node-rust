\* TLC Model Configuration for CostAccountedRho
\*
\* Models 3 processes on 3 channels, each with 1 fuel token.
\* TLC exhaustively explores all interleavings to verify
\* that total cost is scheduling-independent.

CONSTANTS
    p1 = p1
    p2 = p2
    p3 = p3
    ch_a = ch_a
    ch_b = ch_b
    ch_c = ch_c
    Processes   <- MC_Processes
    Channels    <- MC_Channels
    InitialTokens <- MC_InitialTokens
    sigChannel  <- MC_sigChannel

SPECIFICATION Spec

\* Terminal states (all processes done) are not deadlocks
CHECK_DEADLOCK FALSE

\* Invariants (checked in every reachable state)
INVARIANT TypeOK
INVARIANT TokenConservation
INVARIANT NoNegativeFuel
INVARIANT FuelGateSafety
INVARIANT CostDeterminism

\* Temporal properties (checked on all behaviors)
PROPERTY AllComplete
