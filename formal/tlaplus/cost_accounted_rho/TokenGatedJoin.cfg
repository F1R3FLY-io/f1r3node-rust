\* TLC config for MAJOR-5 — the token-gated-join sequential-fuel
\* griefing / atomicity obligation (NATIVE-model safety suite).
\*
\* MaxSupply = 3 makes each of the four signer pools (Σ⟦s1⟧, Σ⟦s2⟧, Σ⟦sV⟧,
\* Σ⟦sG⟧) range over 0..3, and the data-presence flags over BOOLEAN — a
\* bounded-exhaustive sweep of every pre-state against BOTH funding regimes
\* (M1 native acceptance-time atomic admit/reject; M2 transpiler runtime
\* sequential gates with every clause interleaving). 2 effective signers
\* (principal s1, s2) plus the victim/griefer contention pool, per the
\* memory's "2–3 signers, balances 0..3" envelope.
\*
\* This .cfg checks the invariants that MUST HOLD for the native model. The
\* M2 griefing-vector REFUTATION (the expected counterexample) is in the
\* companion TokenGatedJoinM2Grief.cfg.

CONSTANTS
    MaxSupply = 3

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    Inv_M1_AtomicNoPartialPrefix
    Inv_M1_NoVictimDrainWithoutFire
    Inv_FundedPathEquivalence
    Inv_NoUnderflow
    Inv_NoCrossSignerTheft
    Inv_Conservation
    Inv_ConservationOfAuthority
