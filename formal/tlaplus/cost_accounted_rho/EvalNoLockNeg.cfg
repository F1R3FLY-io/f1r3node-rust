\* CA-P-171 NEGATIVE-CONTROL TLC config for EvalScheduling.
\*
\* Same model as EvalScheduling.cfg EXCEPT group B's disjoint signature pool is
\* UNFUNDED (PoolSupplyB = 0, DemandB[b1] = 1 > 0). The strict gate admits NOTHING
\* for group B, so its WHOLE order is NOT admitted (admittedLenB = 0 != 1) and the
\* concurrent-admission liveness property must be REFUTED. TLC PRODUCING A
\* COUNTEREXAMPLE is the EXPECTED, intended outcome — it proves the property is
\* non-vacuous (it has teeth: an unfunded disjoint pool does NOT get admitted).
\*
\* Paired with the wrapper MCEvalNoLockNeg.tla (PoolSupplyB = 0). NOT registered
\* in the check script's WRAPPED_BY map (a counterexample is not a "pass"). Run:
\*   tlc -deadlock -config EvalNoLockNeg.cfg MCEvalNoLockNeg.tla

CONSTANTS
    b1 = b1
    b2 = b2
    b3 = b3
    Bodies          <- MC_Bodies
    CostPerToken    <- MC_CostPerToken
    StorageCostA    <- MC_StorageCostA
    StorageCostB    <- MC_StorageCostB
    MintAmount      <- MC_MintAmount
    FeeAmount       <- MC_FeeAmount
    CanonOrder      <- MC_CanonOrder
    Demand          <- MC_Demand
    PoolSupply      <- MC_PoolSupply
    CanonOrderB     <- MC_CanonOrderB
    DemandB         <- MC_DemandB
    PoolSupplyB     <- MC_PoolSupplyB

SPECIFICATION LiveSpec

CHECK_DEADLOCK FALSE

\* The property under test — EXPECTED TO BE REFUTED here (unfunded group B is
\* never admitted, so concurrent admission of both disjoint pools cannot hold).
PROPERTY DisjointPoolsAdmitConcurrentlyNoGlobalLock
