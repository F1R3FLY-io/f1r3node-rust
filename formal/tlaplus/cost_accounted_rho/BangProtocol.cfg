\* TLC config for BangProtocol model checking.
\* Default: bounded variant with Bound=3 (small, fast to exhaust).

CONSTANTS
    Bound = 3
    MaxInvocations = 6

SPECIFICATION Spec

INVARIANTS
    BangReplicationSafety
    BangUsageBound
    BangBoundedNonNegative
    BangPersistence
    BangApprovedBoundedByLimit

PROPERTIES
    BangBoundedEventuallyExhausts
