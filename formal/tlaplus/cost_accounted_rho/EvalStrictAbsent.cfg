\* TLC config for the #13b spec-strict reject-when-ABSENT case of EvalScheduling.
\*
\* PoolSupply = 0 models an ABSENT supply pool (the paper's supply(s) = 0 for an
\* absent pool, which task #13a's strict gate treats as present-zero). Every
\* deploy has Δ = 2 > 0, so the strict gate admits NOTHING — exercising
\* Inv_StrictRejectsAbsent NON-vacuously (a Δ>0 deploy is never admitted against
\* a zero pool). Paired with the wrapper MCEvalStrictAbsent.tla (PoolSupply = 0).

CONSTANTS
    b1 = b1
    b2 = b2
    b3 = b3
    Bodies          <- MC_Bodies
    CostPerToken    <- MC_CostPerToken
    StorageCostA    <- MC_StorageCostA
    StorageCostB    <- MC_StorageCostB
    MintAmount      <- MC_MintAmount
    FeeAmount       <- MC_FeeAmount
    CanonOrder      <- MC_CanonOrder
    Demand          <- MC_Demand
    PoolSupply      <- MC_PoolSupply
    CanonOrderB     <- MC_CanonOrderB
    DemandB         <- MC_DemandB
    PoolSupplyB     <- MC_PoolSupplyB

SPECIFICATION LiveSpec

CHECK_DEADLOCK FALSE

\* Invariants — the #13b strict-reject headline plus the structural gate
\* invariants (so the absent-pool instance is also internally consistent).
INVARIANT TypeOK
INVARIANT Inv_StrictRejectsAbsent
INVARIANT NoDoubleSpendAtBlock
INVARIANT RejectBothOnOversubscription
INVARIANT GateBeforeExecute
INVARIANT SupplyConservation
