\* TLC config for ThresholdProtocol model checking.
\* Default: 4-member set with 2-of-4 quorum threshold.

CONSTANTS
    NumMembers = 4
    Threshold = 2

SPECIFICATION Spec

INVARIANTS
    QuorumThresholdConstraint
    QuorumExactness
    QuorumNoOverCount
    AuthorizedSubsetPresented
    PresentedSubsetMembers
    RejectionImpliesShortQuorum

PROPERTIES
    EventuallyTerminates
