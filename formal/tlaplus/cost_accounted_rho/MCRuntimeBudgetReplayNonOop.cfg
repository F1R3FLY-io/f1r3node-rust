\* TLC Model Configuration for RuntimeBudgetReplay — NON-OOP arm.
\*
\* InitialBudget (12) exceeds the sum of intrinsically-valid weights (9), so
\* the deploy never goes OOP under any schedule. Exercises the non-OOP arm of
\* ConsumedAndVerdictScheduleIndependent / TotalCostMatchesClampedSum and the
\* NonOopCommittedMultisetComplete completeness invariant.

CONSTANTS
    e1 = e1
    e2 = e2
    e3 = e3
    e4 = e4
    e5 = e5
    e0 = e0
    no_oop = no_oop
    Events        <- MC_Events
    DeployId      <- MC_DeployId
    SourcePath    <- MC_SourcePath
    RedexId       <- MC_RedexId
    LocalIndex    <- MC_LocalIndex
    KindId        <- MC_KindId
    PrimitiveDescriptor <- MC_PrimitiveDescriptor
    Weight        <- MC_Weight
    Rank          <- MC_Rank
    InitialBudget <- MC_InitialBudget
    MaxTraceEvents <- MC_MaxTraceEvents
    MaxSourcePathComponents <- MC_MaxSourcePathComponents
    MaxPrimitiveDescriptor <- MC_MaxPrimitiveDescriptor
    NoOop         <- MC_NoOop

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANT TypeOK
INVARIANT NoOverspend
INVARIANT OopCommitsBoundary
INVARIANT ReplayTraceSubset
INVARIANT OopNotLogged
INVARIANT PermitsMatchSuccessfulTrace
INVARIANT NoUnpaidPhysicalWork
INVARIANT LiveTraceIsAdmissibleSchedule
INVARIANT FinalizedTraceSequence
INVARIANT FinalizationPreservesActiveBudget
INVARIANT LoggedEventsHavePositiveWeight
INVARIANT LoggedEventsAreValidated
INVARIANT TraceWithinRetentionBound
INVARIANT ResetClearsActiveTraceAfterFinalization
INVARIANT PostOopRejectionsPreserveSingleBoundary
INVARIANT CanonicalDigestEventCountMatches
INVARIANT CanonicalDigestDomainSeparatesOop
INVARIANT CanonicalDigestStableAfterFinalization
INVARIANT ConsumedAndVerdictScheduleIndependent
INVARIANT TotalCostMatchesClampedSum
INVARIANT NonOopCommittedMultisetComplete
INVARIANT CapTruncatedCommittedIsLowestK
