/**
 * The main API is `DeployService`.
 */
syntax = "proto3";

package casper;

// If you are building for other languages "scalapb.proto"
// can be manually obtained here:
// https://raw.githubusercontent.com/scalapb/ScalaPB/master/protobuf/scalapb/scalapb.proto
// make a scalapb directory in this file's location and place it inside

import "scalapb/scalapb.proto";
import "RhoTypes.proto";

option (scalapb.options) = {
  package_name: "coop.rchain.casper.protocol"
  flat_package: true
  single_file: true
  preamble: "sealed trait CasperMessageProto"
  preserve_unknown_fields: false
};

message HasBlockRequestProto {
  option (scalapb.message).extends = "CasperMessageProto";
  bytes  hash = 1;
}

message HasBlockProto {
  option (scalapb.message).extends = "CasperMessageProto";
  bytes  hash = 1;
}

message BlockRequestProto {
  option (scalapb.message).extends = "CasperMessageProto";
  bytes  hash = 1;
}

message ForkChoiceTipRequestProto {
  option (scalapb.message).extends = "CasperMessageProto";
}

// ---------- Signing Protocol ---------
message ApprovedBlockCandidateProto {
  option (scalapb.message).extends = "CasperMessageProto";
  BlockMessageProto block  = 1 [(scalapb.field).no_box = true];
  int32 requiredSigs       = 2;
}

message UnapprovedBlockProto {
  option (scalapb.message).extends = "CasperMessageProto";
  ApprovedBlockCandidateProto candidate = 1 [(scalapb.field).no_box = true];
  int64                       timestamp = 2;
  int64                       duration  = 3;
}

message Signature {
  bytes  publicKey = 1;
  string algorithm = 2;
  bytes  sig       = 3;
}

message BlockApprovalProto {
  option (scalapb.message).extends = "CasperMessageProto";
  ApprovedBlockCandidateProto candidate = 1 [(scalapb.field).no_box = true];
  Signature sig                         = 2 [(scalapb.field).no_box = true];
}

message ApprovedBlockProto  {
  option (scalapb.message).extends = "CasperMessageProto";
  ApprovedBlockCandidateProto candidate = 1 [(scalapb.field).no_box = true];
  repeated Signature sigs               = 2;
}

message ApprovedBlockRequestProto {
  option (scalapb.message).extends = "CasperMessageProto";
  string identifier = 1;
  bool trimState    = 2;
}

message NoApprovedBlockAvailableProto {
  option (scalapb.message).extends = "CasperMessageProto";
  string identifier    = 1;
  string nodeIdentifier = 2;
}

// ------- End Signing Protocol --------

// --------- Core Protocol  --------
message BlockMessageProto {
  option (scalapb.message).extends = "CasperMessageProto";
  bytes                       blockHash      = 1; // obtained by hashing the information in the header
  HeaderProto                 header         = 2 [(scalapb.field).no_box = true];
  BodyProto                   body           = 3 [(scalapb.field).no_box = true];
  repeated JustificationProto justifications = 4; // map of all validators to latest blocks based on current view
  bytes                       sender         = 5; // public key of the validator that created the block
  int32                       seqNum         = 6; // number of blocks created by the validator
  bytes                       sig            = 7; // signature generated by signing `hash(hash(justification) concat blockHash)`.
  string                      sigAlgorithm   = 8; // name of the algorithm used to sign
  string                      shardId        = 9; // identifier of the shard where the block was created
  bytes                       extraBytes     = 10;
}

message BlockHashMessageProto {
  option (scalapb.message).extends = "CasperMessageProto";
  bytes  hash         = 1;
  bytes  blockCreator = 2;
}

message BlockMetadataInternal {
  // This message in mapped to a different Scala class because of protobuf's inability to create map<bytes, int64> for
  // bonds.
  option (scalapb.message).type = "coop.rchain.models.BlockMetadata";

  bytes blockHash                            = 1;
  repeated bytes parents                     = 2 [(scalapb.field).collection_type="collection.immutable.List"];
  bytes sender                               = 3;
  repeated JustificationProto justifications = 4 [(scalapb.field).collection_type="collection.immutable.List"];
  repeated BondProto bonds                   = 5 [(scalapb.field).collection_type="collection.immutable.List"];
  int64 blockNum                             = 6;
  int32 seqNum                               = 7;
  bool invalid                               = 8; // whether the block was marked as invalid
  bool directlyFinalized                     = 9; // whether the block has been last finalized block (LFB)
  bool finalized                             = 10;// whether the block is finalized
  float faultToleranceValue                  = 11;// cached normalized FT at finalization time
}

message HeaderProto {
  repeated bytes parentsHashList = 1; //list of parent block hashes
  int64 timestamp  = 5;
  int64 version    = 6;
  bytes extraBytes = 7;
}

/**
 * Note: deploys are uniquely keyed by (`deployer`, `timestamp`).
 *
 * Multi-signature support is provided via the `cosigners` and `primary_phlo_share`
 * fields, realizing the compound-signature operational semantics of the
 * cost-accounted rho-calculus paper (`publications/cost-accounting/cost-accounted-rho.tex`,
 * §3.2 Rules 2-5). When `cosigners` is empty, the deploy is a legacy single-signer
 * deploy: fields 1/4/5 hold the only signer and `phloLimit` (field 8) is its share.
 * When `cosigners` is non-empty, the primary signer occupies index 0 (fields 1/4/5)
 * with phlo share `primary_phlo_share` (field 15), and additional cosigners occupy
 * `cosigners` (field 14) entries with their own (pk, sig, sig_algorithm, phlo_share).
 * The wire decoder enforces canonical `pk.bytes` ascending sort, no duplicate signers,
 * Σ(primary_phlo_share + cosigners[i].phlo_share) == phloLimit, and that every
 * signer's signature verifies against the canonical message hash.
 */
message DeployDataProto {
  bytes  deployer             = 1; //public key
  string term                 = 2; //rholang source code to deploy (will be parsed into `Par`)
  int64  timestamp            = 3; //millisecond timestamp
  bytes  sig                  = 4; //signature of (hash(term) + timestamp) using private key
  string sigAlgorithm         = 5; //name of the algorithm used to sign
  int64 phloPrice             = 7; //phlo price
  int64 phloLimit             = 8; //phlo limit for the deployment
  int64 validAfterBlockNumber = 10;
  string shardId              = 11;//shard ID to prevent replay of deploys between shards
  string language             = 12;//language (rholang or metta) of the source code
  int64 expirationTimestamp   = 13;//optional millisecond timestamp after which deploy is invalid (0 = no expiration)
  repeated CompoundSigner cosigners = 14; //additional cosigners (empty = legacy single-sig)
  int64 primary_phlo_share   = 15; //primary signer's phlo share; required iff cosigners != []; Σ shares == phloLimit
  // Phase 2: M-of-N threshold quorum size.
  //   0  → N-of-N (Phase 1 semantics): every signer must verify.
  //   k>0 → M-of-N: at least `k` of `cosigners.len() + 1` signers must
  //         present a valid signature. Placeholder signers (sig.is_empty())
  //         are allowed and do not count toward quorum.
  // Constraint at decode: 0 ≤ cosigner_threshold ≤ cosigners.len() + 1.
  int32 cosigner_threshold   = 16;
  // Phase 3: LL-rich signature algebra. When present, OVERRIDES
  // `cosigners[]` and `cosigner_threshold` — the deploy is validated
  // against the algebraic expression instead of the flat list. Atomic
  // leaves (SigAtom) carry the per-signer (pk, sig, sig_algorithm,
  // phlo_share) tuples, and the algebra describes their combination.
  // See `rholang/src/rust/interpreter/accounting/mod.rs::Sig` for the
  // operational semantics.
  optional SigCompound sig_algebra = 17;
}

// One cosigner in a multi-signature deploy. Sorted ascending by `pk` bytes
// in `DeployDataProto.cosigners` (decoder enforces). Each cosigner signs
// the same canonical message hash as the primary deployer.
message CompoundSigner {
  bytes  pk           = 1; //cosigner public key
  bytes  sig          = 2; //cosigner signature of (hash(term) + timestamp) using private key
  string sigAlgorithm = 3; //name of the algorithm used to sign (e.g., "secp256k1", "ed25519")
  int64  phloShare    = 4; //this cosigner's contribution to phloLimit
}

// Phase 2 / Phase 3 LL-rich signature algebra wire encoding.
//
// `SigCompound` is a recursive algebraic shape mirroring the runtime
// `Sig` enum (`rholang/src/rust/interpreter/accounting/mod.rs`). When
// present on a `DeployDataProto` (future field expansion — Phase 2/3 RFC),
// the verifier validates the deploy against the `Sig` expression instead
// of the flat `cosigners[]` list.
//
// At Phase 1 (current), `Sig::And` is the only compound shape used and
// the flat cosigners[] field encodes a left-associated And tree. The
// `SigCompound` message is introduced here to give downstream Phase 2/3
// wire-format extensions a forward-compatible scaffold:
//
//   - Phase 2 (M-of-N quorum): set `threshold` field to encode a
//     `Sig::Threshold` envelope; populate `members[]` with the candidate
//     signers and `threshold_min` with the required quorum size.
//   - Phase 3 (LL-rich): set `plus` / `with_` / `bang` / `whynot` /
//     `lolly` to encode the corresponding LL connectives. Branch witness
//     for `Plus` is carried via `plus_branch` (0 = left, 1 = right).
message SigCompound {
  oneof connective {
    SigAtom      atom      = 1;   // Sig::Ground / Sig::Quote leaf (atom_kind selects axis)
    SigPair      tensor    = 2;   // Sig::And / Sig::Tensor (multiplicative ⊗)
    SigPlus      plus      = 3;   // Sig::Plus  (additive ⊕ with branch witness)
    SigPair      with_     = 4;   // Sig::With  (additive & — LL "with")
    SigBang      bang      = 5;   // Sig::Bang  (exponential !)
    SigCompound  whynot    = 6;   // Sig::WhyNot (exponential ?)
    SigLolly     lolly     = 7;   // Sig::Lolly  (linear implication ⊸)
    SigThreshold threshold = 8;   // Sig::Threshold (M-of-N quorum)
  }
}

// Distinguishes the two atomic signature axes of the cost-accounted
// rho-calculus (`publications/cost-accounting/cost-accounted-rho.tex`
// §App-A, eqs. eq:app-sig-ground / eq:app-sig-hash):
//   GROUND (`g`)  — a ground signature key `g ∈ G`; Σ⟦g⟧ = quote(H_g).
//   QUOTE  (`#P`) — a cryptographic process-hash `#P`; Σ⟦#P⟧ = quote(H(𝒫⟦P⟧)).
// Both reflect to a quoted name on the wire, so the SIGNATURE-CHANNEL
// derivation is identical for equal `pk` bytes; the axis is carried only
// so the runtime `Sig` value round-trips faithfully. GROUND = 0 is the
// proto3 default, so any legacy `SigAtom` decoded without this field is a
// ground atom — preserving backward compatibility.
enum AtomKind {
  GROUND = 0;
  QUOTE  = 1;
}

message SigAtom {
  bytes    pk           = 1;
  bytes    sig          = 2;
  string   sigAlgorithm = 3;
  int64    phloShare    = 4;
  AtomKind atom_kind    = 5;
}

message SigPair {
  SigCompound left  = 1;
  SigCompound right = 2;
}

message SigPlus {
  SigCompound left          = 1;
  SigCompound right         = 2;
  int32       chosen_branch = 3; // 0 = left, 1 = right (signer's choice)
}

message SigBang {
  SigCompound inner               = 1;
  // uses_bound = 0 means unbounded (LL-canonical); uses_bound > 0 means
  // bounded replication (Phase 3 §3.5 capability registry).
  int64       uses_bound          = 2;
  // capability_handle: optional registry pointer to a pre-registered
  // replicable signature (Phase 3 §3.5 rho:system:capabilities).
  bytes       capability_handle   = 3;
}

message SigLolly {
  SigCompound from                = 1;
  SigCompound to                  = 2;
  // capability_handle: pointer into rho:system:capabilities registry
  // that holds the transformer process for this σ_from ⊸ σ_to delegation.
  bytes       capability_handle   = 3;
}

message SigThreshold {
  int32 threshold              = 1; // required quorum size k
  repeated SigCompound members = 2; // candidate signers (n total; k-of-n)
}

message ProcessedDeployProto {
    DeployDataProto deploy        = 1 [(scalapb.field).no_box = true];
    rhoapi.PCost cost             = 2 [(scalapb.field).no_box = true];
    repeated EventProto deployLog = 3; //the new terms and comm. rule reductions from this deploy
    bool errored                  = 5; //true if deploy encountered a user error
    string systemDeployError      = 6;
    // Fields 7-8 (costTraceDigest, costTraceEventCount) were removed: the
    // per-operation cost trace is diagnostic-only and is NOT a consensus
    // quantity. Consensus cost integrity is the conserved total `cost`
    // (field 2) plus `errored` status plus the post-state hash. The trace
    // itself remains available at runtime via RuntimeBudget diagnostics.
    reserved 7, 8;
    reserved "costTraceDigest", "costTraceEventCount";
}

message SlashSystemDeployDataProto {
  bytes invalidBlockHash = 1;
  bytes issuerPublicKey = 2;
  int64 targetActivationEpoch = 3;
}

message CloseBlockSystemDeployDataProto{
}

message SystemDeployDataProto{
  oneof systemDeploy{
    SlashSystemDeployDataProto slashSystemDeploy = 1;
    CloseBlockSystemDeployDataProto closeBlockSystemDeploy = 2;
  }
}

message ProcessedSystemDeployProto {
    SystemDeployDataProto systemDeploy = 1 [(scalapb.field).no_box = true];
    repeated EventProto deployLog      = 2;
    string errorMsg                    = 3;
}

message BodyProto {
  RChainStateProto state                            = 1 [(scalapb.field).no_box = true];
  repeated ProcessedDeployProto deploys             = 2;
  repeated ProcessedSystemDeployProto systemDeploys = 3;
  bytes extraBytes                                  = 4;
  repeated RejectedDeployProto rejectedDeploys      = 5;
}

message RejectedDeployProto{
  bytes sig = 1;
}

message JustificationProto {
  bytes validator       = 1;
  bytes latestBlockHash = 2;
}

message RChainStateProto {
  bytes preStateHash  = 1; //hash of the tuplespace contents before new deploys
  bytes postStateHash = 2; //hash of the tuplespace contents after new deploys

  //Internals of what will be the "blessed" PoS contract
  //(which will be part of the tuplespace in the real implementation).
  repeated BondProto bonds = 3;
  int64 blockNumber        = 4;
}

message EventProto {
  oneof event_instance {
    ProduceEventProto produce = 1;
    ConsumeEventProto consume = 2;
    CommEventProto comm       = 3;
  }
}

message ProduceEventProto {
  bytes channelsHash         = 1;
  bytes hash                 = 2;
  bool persistent            = 3;
  int32 timesRepeated        = 4;
	bool isDeterministic       = 5;
  repeated bytes outputValue = 6;
  bool failed                = 7;
}

message ConsumeEventProto {
  repeated bytes channelsHashes = 1;
  bytes hash                    = 2;
  bool persistent               = 3;
}

message CommEventProto {
  ConsumeEventProto consume           = 1 [(scalapb.field).no_box = true];
  repeated ProduceEventProto produces = 2;
  repeated PeekProto peeks            = 3;
}

message PeekProto {
  int32 channelIndex = 1;
}

message BondProto {
  bytes validator = 1;
  int64 stake     = 2;
}
// --------- End Core Protocol  --------

// --------- Last finalized state  --------

message StoreNodeKeyProto {
  bytes hash  = 1;
  int32 index = 2;
}

message StoreItemsMessageRequestProto {
  option (scalapb.message).extends = "CasperMessageProto";
  repeated StoreNodeKeyProto startPath = 1 [(scalapb.field).collection_type="collection.immutable.List"];
  int32 skip                           = 2;
  int32 take                           = 3;
}

message StoreItemProto {
  bytes key   = 1;
  bytes value = 2;
}

message StoreItemsMessageProto {
  option (scalapb.message).extends = "CasperMessageProto";
  repeated StoreNodeKeyProto startPath = 1 [(scalapb.field).collection_type="collection.immutable.List"];
  repeated StoreNodeKeyProto lastPath  = 2 [(scalapb.field).collection_type="collection.immutable.List"];
  repeated StoreItemProto historyItems = 3 [(scalapb.field).collection_type="collection.immutable.List"];
  repeated StoreItemProto dataItems    = 4 [(scalapb.field).collection_type="collection.immutable.List"];
}

// --------- End Last finalized state  --------

// --------- Mergeable channels store sync --------

message MergeableEntryRequestProto {
  option (scalapb.message).extends = "CasperMessageProto";
  bytes block_hash = 1;
}

message MergeableEntryResponseProto {
  option (scalapb.message).extends = "CasperMessageProto";
  bytes block_hash       = 1;
  // bincode of Vec<DeployMergeableData>. Empty bytes = peer has the block but
  // no entry for it.
  bytes serialized_entry = 2;
}
