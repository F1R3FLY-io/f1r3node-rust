    name: tps throughput (~4 h)
    if: inputs.suite == 'tps'
    runs-on: [self-hosted, linux, x64, testbed]
    timeout-minutes: 300
    steps:
      - name: Suite overview
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## TPS — Sustained Throughput Benchmark

          | | |
          |---|---|
          | **What** | Ramps deploy load using the calibrated BestMNTD cap to measure maximum sustained TPS |
          | **Metric** | max sustained TPS over a fixed measurement window at stable finalization |
          | **Topology** | 3 genesis validators, no bonding |
          | **Duration** | ~4 h |
          | **Pass criteria** | sustained TPS > 0 · finalization latency stays bounded under load |
          | **Note** | Run MNTD first when testing a new image or hardware, then pass the resulting cap via the \`mntd_cap\` input |
          | **Image** | \`${{ inputs.image }}\` |
          | **Testbed** | \`${{ inputs.testbed_repo }}@${{ inputs.testbed_ref }}\` |
          EOF

      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.testbed_repo }}
          ref: ${{ inputs.testbed_ref }}
          token: ${{ secrets.TESTBED_PAT }}
          path: testbed

      - name: Build testbed
        working-directory: testbed
        run: make build

      - name: Generate validator keys
