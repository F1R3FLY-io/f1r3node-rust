          path: ${{ env.LOG_HOST_PATH }}
          retention-days: 14

  # ───────────────────────────── heartbeat ───────────────────────────────────
  heartbeat:
    name: heartbeat (~2 h)
    if: inputs.suite == 'heartbeat'
    runs-on: [self-hosted, linux, x64, testbed]
    timeout-minutes: 180
    steps:
      - name: Suite overview
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Heartbeat — Parameter Sweep

          | | |
          |---|---|
          | **What** | Sweeps heartbeat interval parameters to find the optimal liveness/overhead tradeoff |
          | **Topology** | 3 genesis validators, no bonding |
          | **Duration** | ~2 h (BestHeartbeatMatrix only) |
          | **Pass criteria** | chain finalizes across all tested heartbeat intervals without stalls |
          | **Image** | \`${{ inputs.image }}\` |
          | **Testbed** | \`${{ inputs.testbed_repo }}@${{ inputs.testbed_ref }}\` |
          EOF

      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.testbed_repo }}
          ref: ${{ inputs.testbed_ref }}
          token: ${{ secrets.TESTBED_PAT }}
          path: testbed

      - name: Build testbed
        working-directory: testbed
        run: make build

      - name: Generate validator keys
