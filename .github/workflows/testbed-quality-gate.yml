        run: make job-setup

      - name: Run suite
        working-directory: testbed
        run: |
          source .env
          make job-run ENV=.env SUITE=heartbeat ONLY_BEST=1 \
            IMAGE="${{ inputs.image }}" \
            PROFILE=ci \
            OUTPUT_FORMAT=json \
            LOG_HOST_PATH=${{ env.LOG_HOST_PATH }}
          JOB=$(kubectl get jobs -l app=testbed --sort-by=.metadata.creationTimestamp \
