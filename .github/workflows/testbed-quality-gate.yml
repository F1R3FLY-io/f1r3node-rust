        run: ./testbed clean --prefixes exp-,test- || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testbed-sync-constraint-${{ github.run_id }}
          path: ${{ env.LOG_HOST_PATH }}
          retention-days: 14

  # ───────────────────────────── mntd ────────────────────────────────────────
  mntd:
    name: mntd calibration (~3 h)
    if: inputs.suite == 'mntd'
    runs-on: [self-hosted, linux, x64, testbed]
    timeout-minutes: 240
    steps:
      - name: Suite overview
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## MNTD — Max-Deploys-per-Block Calibration

          | | |
          |---|---|
          | **What** | Binary-searches for the largest deploy batch size the node can propose and finalize reliably |
          | **Output** | \`BestMNTD\` value to hardcode in the TPS suite for this hardware/image combination |
          | **Topology** | 3 genesis validators, no bonding |
          | **Duration** | ~3 h |
          | **Pass criteria** | produces a stable BestMNTD value with no chain halt at the chosen cap |
          | **Image** | \`${{ inputs.image }}\` |
          | **Testbed** | \`${{ inputs.testbed_repo }}@${{ inputs.testbed_ref }}\` |
          EOF

      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.testbed_repo }}
          ref: ${{ inputs.testbed_ref }}
          token: ${{ secrets.TESTBED_PAT }}
          path: testbed

      - name: Build testbed
        working-directory: testbed
        run: make build

      - name: Generate validator keys
        working-directory: testbed
        run: ./testbed gen --validators 20 --out .env

      - name: Import f1r3node image into k3s
        run: |
          docker pull "${{ inputs.image }}"
          k3s ctr images rm "${{ inputs.image }}" 2>/dev/null || true
