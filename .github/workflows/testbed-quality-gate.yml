      - name: Import testbed image into k3s
        working-directory: testbed
        run: make docker

      - name: Apply RBAC
        working-directory: testbed
        run: make job-setup

      - name: Run suite
        working-directory: testbed
        run: |
          source .env
          make job-run ENV=.env SUITE=ft-upfront-p1 \
            IMAGE="${{ inputs.image }}" \
            PROFILE=ci \
            OUTPUT_FORMAT=json \
            LOG_HOST_PATH=${{ env.LOG_HOST_PATH }}
          JOB=$(kubectl get jobs -l app=testbed --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1].metadata.name}')
          echo "JOB_NAME=${JOB}" >> "$GITHUB_ENV"

      - name: Wait for job
        working-directory: testbed
        run: make job-wait JOB=${{ env.JOB_NAME }}

      - name: Summarize results
        if: always()
        working-directory: testbed
        run: |
          make job-summarize LOG_HOST_PATH=${{ env.LOG_HOST_PATH }} >> "$GITHUB_STEP_SUMMARY" || \
            echo "No results.json found — see uploaded logs." >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always()
        working-directory: testbed
        run: ./testbed clean --prefixes exp-,test- || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testbed-ft-upfront-p1-${{ github.run_id }}
          path: ${{ env.LOG_HOST_PATH }}
          retention-days: 14

  # ───────────────────── ft-upfront phase 2 (ft 0.67 / 0.99) ────────────────
  ft-upfront-p2:
    name: ft-upfront phase 2 — ft0.67/0.99 (~1.5 h, 44 pods)
    needs: ft-upfront-p1
    if: contains(fromJSON('["ft-upfront","nightly"]'), inputs.suite)
    runs-on: [self-hosted, linux, x64, testbed]
    timeout-minutes: 150
    steps:
      - name: Suite overview
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Fault-Tolerance Sweep — Phase 2 (ft 0.67 / 0.99)

          | | |
          |---|---|
          | **What** | Verifies the network at near-maximum fault thresholds — only 1% of validators need to be honest |
          | **ft values** | 0.67 · 0.99 — high byzantine tolerance regime |
          | **Topology** | Up to 20 validators bonded upfront |
          | **Peak cluster** | ~44 pods · ~44 cores · ~44 GiB RAM · ~1.1 TiB PVC |
          | **Duration** | ~1.5 h (runs after phase 1 completes) |
          | **Pass criteria** | all validators bond · chain finalizes under extreme fault assumptions |
          | **Image** | \`${{ inputs.image }}\` |
          | **Testbed** | \`${{ inputs.testbed_repo }}@${{ inputs.testbed_ref }}\` |
          EOF

      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.testbed_repo }}
          ref: ${{ inputs.testbed_ref }}
          token: ${{ secrets.TESTBED_PAT }}
          path: testbed

      - name: Build testbed
        working-directory: testbed
        run: make build

      - name: Generate validator keys
        working-directory: testbed
        run: ./testbed gen --validators 20 --out .env

      - name: Import f1r3node image into k3s
        run: |
