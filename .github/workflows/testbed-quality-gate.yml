      - name: Import testbed image into k3s
        working-directory: testbed
        run: make docker

      - name: Apply RBAC
        working-directory: testbed
        run: make job-setup

      - name: Run suite
        working-directory: testbed
        run: |
          source .env
          make job-run ENV=.env SUITE=ft-upfront-p2 \
            IMAGE="${{ inputs.image }}" \
            PROFILE=ci \
            OUTPUT_FORMAT=json \
            LOG_HOST_PATH=${{ env.LOG_HOST_PATH }}
          JOB=$(kubectl get jobs -l app=testbed --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1].metadata.name}')
          echo "JOB_NAME=${JOB}" >> "$GITHUB_ENV"

      - name: Wait for job
        working-directory: testbed
        run: make job-wait JOB=${{ env.JOB_NAME }}

      - name: Summarize results
        if: always()
        working-directory: testbed
        run: |
          make job-summarize LOG_HOST_PATH=${{ env.LOG_HOST_PATH }} >> "$GITHUB_STEP_SUMMARY" || \
            echo "No results.json found — see uploaded logs." >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always()
        working-directory: testbed
        run: ./testbed clean --prefixes exp-,test- || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testbed-ft-upfront-p2-${{ github.run_id }}
          path: ${{ env.LOG_HOST_PATH }}
          retention-days: 14

  # ───────────────────────────── sync-constraint ─────────────────────────────
  sync-constraint:
    name: sync-constraint (~1.5 h)
    if: contains(fromJSON('["sync-constraint","nightly"]'), inputs.suite)
    runs-on: [self-hosted, linux, x64, testbed]
    timeout-minutes: 120
    steps:
      - name: Suite overview
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Sync-Constraint Sweep

          | | |
          |---|---|
          | **What** | Sweeps synchrony threshold values to find the boundary where Casper consensus degrades |
          | **Topology** | 3 genesis validators, no additional bonding |
          | **Duration** | ~1.5 h |
          | **Pass criteria** | chain continues to finalize across all tested sync values |
          | **Image** | \`${{ inputs.image }}\` |
          | **Testbed** | \`${{ inputs.testbed_repo }}@${{ inputs.testbed_ref }}\` |
          EOF

      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.testbed_repo }}
          ref: ${{ inputs.testbed_ref }}
          token: ${{ secrets.TESTBED_PAT }}
          path: testbed

      - name: Build testbed
        working-directory: testbed
