name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - master
      - staging
      - trying
    tags: "**"
  pull_request:
    branches:
      - dev
      - master
      - staging
      - trying
      - "feature/**"

# Workflow-wide serialization. Only one CI run executes at a time; subsequent
# triggers queue rather than running in parallel. Prevents OCI ephemeral-runner
# starvation when a single user action produces multiple events (e.g. dev merge
# fires both the merge-commit push and the release-tag push from release.yml,
# each kicking off an independent 20-VM matrix). At this team scale serializing
# is acceptable — adds at most one full pipeline (~30-45 min) of wait when two
# triggers land back-to-back, and no run gets cancelled mid-flight so release
# jobs always reach completion.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  # AES/SSE2 CPU features for gxhash (required by PathMap crate)
  RUSTFLAGS: "-C target-feature=+aes,+sse2"
  DOCKER_IMAGE_NAME: "f1r3flyindustries/f1r3fly-rust"

jobs:
  # Resolve version + branch env vars once for downstream jobs.
  # Skip release-bump commits on branch pushes — the tag push handles publish.
  build_base:
    name: Build Base
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      !startsWith(github.event.head_commit.message, 'chore(release)')
      || startsWith(github.ref, 'refs/tags/')
    outputs:
      VERSION: ${{ steps.env.outputs.VERSION }}
      BRANCH: ${{ steps.env.outputs.BRANCH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize Environment
        id: env
        shell: bash -exu -o pipefail {0}
        run: |
          git fetch origin --tags --force

          # Version from latest matching tag (falls back to short SHA if no tag yet)
          VERSION="$(git describe --tags --always)"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

          # Derive BRANCH for image tag suffix logic downstream
          if [[ "$GITHUB_REF" =~ ^refs/tags/ ]]; then
            # Tag push: treat as master release path
            BRANCH="master"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
          fi
          echo "BRANCH=$BRANCH" >> "$GITHUB_OUTPUT"

          echo "Version: $VERSION | Branch: $BRANCH"

  lint:
    name: Lint
    needs: build_base
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-09
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y $(cat .github/apt-dependencies.txt)

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        env:
          RUSTFLAGS: "-C target-feature=+aes,+sse2 -D warnings"
        run: cargo clippy --workspace

  deny:
    name: cargo-deny
    needs: build_base
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: cargo-deny check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  markdown_link_check:
    name: Markdown Link Check
    needs: build_base
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-loopback
            --max-retries 2
            --retry-wait-time 5
            --accept 200..=299,429
            './**/*.md'
          fail: true

  test:
    name: Test (${{ matrix.crate }})
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        crate:
          - casper
          - rspace_plus_plus
          - rholang
          - shared
          - node
          - models
          - crypto
          - block-storage
          - comm
          - graphz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-09

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.crate }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y $(cat .github/apt-dependencies.txt)

      - name: Run tests
        env:
          RUSTFLAGS: "-C target-feature=+aes,+sse2 -D warnings"
          RUST_BACKTRACE: "1"
          RUST_MIN_STACK: "8388608"
        run: |
          ulimit -n 65536
          mkdir -p /tmp/test-logs
          cargo test --release -p ${{ matrix.crate }} 2>&1 | tee /tmp/test-logs/${{ matrix.crate }}.txt
          exit ${PIPESTATUS[0]}

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.crate }}
          path: /tmp/test-logs/
          retention-days: 7

  # Build Docker image natively on each arch using Oracle Cloud self-hosted runners.
  build_docker_image:
    name: Build Docker Image (${{ matrix.arch }})
    needs: lint
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    # Queue instead of cancel for self-hosted runners (one runner per arch).
    concurrency:
      group: docker-build-${{ matrix.arch }}-${{ github.ref }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: [self-hosted, Linux, X64, f1r3fly-rust-ci]
            arch: amd64
          - platform: linux/arm64
            runner: [self-hosted, Linux, ARM64, f1r3fly-rust-ci]
            arch: arm64
    steps:
      - name: Clean self-hosted runner state
        shell: bash {0}
        run: |
          sudo rm -rf system-integration/integration-tests/data
          rm -rf ../artifacts /tmp/rust-node-docker.tar.gz

      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Enable Containerd Image Store
        shell: bash -ex {0}
        run: |
          sudo mkdir -p /etc/docker
          DESIRED='{"features": {"containerd-snapshotter": true}}'
          CURRENT=$(cat /etc/docker/daemon.json 2>/dev/null || echo '{}')
          if [ "$CURRENT" != "$DESIRED" ]; then
            echo "$DESIRED" | sudo tee /etc/docker/daemon.json | jq
            sudo systemctl restart docker
            echo "Docker daemon restarted (config changed)"
          else
            echo "Docker daemon config already up to date, skipping restart"
          fi

      - name: Build Docker Image
        shell: bash -ex {0}
        run: |
          docker context use default
          VERSION="$(git describe --tags --always)"
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --file node/Dockerfile \
            --build-arg VERSION="${VERSION}" \
            --tag ${{ env.DOCKER_IMAGE_NAME }}:${{ matrix.arch }} \
            --load \
            .

      - name: Export Docker Image
        shell: bash -ex {0}
        run: |
          docker image save ${{ env.DOCKER_IMAGE_NAME }}:${{ matrix.arch }} \
              | gzip > /tmp/rust-node-docker.tar.gz

      - name: Save Docker Image
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-docker-${{ matrix.arch }}
          path: /tmp/rust-node-docker.tar.gz

  # Launch ephemeral OCI VMs that will pick up the integration-tests matrix
  # jobs. Runs in parallel with build_docker_image so the ~1-minute launch
  # overhead overlaps with the ~7-minute Docker build. Each VM boots from a
  # baked image, registers as a GitHub Actions runner with
  # f1r3fly-rust-ci-ephemeral labels, picks up exactly one matrix job, then
  # self-terminates. Lifecycle: see F1R3FLY-io/system-integration ci/oci-runners/.
  launch_ephemeral_runners:
    name: Launch Ephemeral Runners
    needs: lint
    runs-on: ubuntu-latest
    # Gates on environment-scoped secrets (OCI_* + RELEASE_PAT). Required
    # reviewers on the `ephemeral-launch` environment unblock fork PRs whose
    # default permissions cannot see repo-level secrets. Internal pushes from
    # protected branches also pause for one approval click per run.
    environment: ephemeral-launch
    permissions:
      actions: write  # needed for gh api ... actions/runners/registration-token
    timeout-minutes: 10
    steps:
      - name: Clone system-integration
        uses: actions/checkout@v4
        with:
          repository: F1R3FLY-io/system-integration
          ref: fix/test-stability
          path: system-integration

      - name: Install OCI CLI
        shell: bash -ex {0}
        run: |
          bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- \
            --accept-all-defaults --install-dir /opt/oci-cli --exec-dir /usr/local/bin
          oci --version

      - name: Configure OCI auth from secrets
        shell: bash -ex {0}
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=$OCI_USER_OCID
          fingerprint=$OCI_FINGERPRINT
          tenancy=$OCI_TENANCY_OCID
          region=$OCI_REGION
          key_file=$HOME/.oci/oci_api_key.pem
          EOF
          chmod 600 ~/.oci/config
          oci iam region list >/dev/null && echo "OCI auth OK"

      - name: Launch 10 amd64 + 10 arm64 ephemeral runners
        shell: bash -ex {0}
        env:
          # The default GITHUB_TOKEN can't mint runner registration tokens even
          # with permissions: actions: write — that endpoint requires admin-on-
          # repo scope. RELEASE_PAT is already provisioned with the repo scope
          # (used by release.yml for tag creation) so reuse it here.
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          # Register ephemeral runners on the repo that queued this workflow.
          GH_REPO: ${{ github.repository }}
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          cd system-integration/ci/oci-runners
          # Launch in parallel; each script exits as soon as the OCI launch
          # API call returns (the VM continues booting in the background and
          # registers itself via cloud-init). 10 amd64 + 10 arm64 feeds the
          # 20-job dual-provider matrix (docker × {amd64,arm64} × 5 slots +
          # subprocess × {amd64,arm64} × 5 slots).
          for _ in $(seq 1 10); do ./launch-runner.sh amd64 & done
          for _ in $(seq 1 10); do ./launch-runner.sh arm64 & done
          wait
          echo "All 20 ephemeral runner VMs submitted."

  # Integration tests run on ephemeral OCI runners — one fresh VM per matrix
  # job, self-terminating after the job completes. The matrix runs the same
  # test suite against TWO node-spawn backends (docker provider, subprocess
  # provider) on each arch — 20 jobs total. Each arch's 10 jobs share its 10
  # ephemeral runners (provider is a pytest flag, not a runner concern).
  integration_tests:
    name: Integration Tests (${{ matrix.arch }}-${{ matrix.provider }}-${{ matrix.slot }})
    needs: [build_docker_image, launch_ephemeral_runners]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── amd64 × docker × 5 ───────────────────────────────────────────────
          - { arch: amd64, provider: docker,     slot: 1, runner: [self-hosted, linux, x64,   f1r3fly-rust-ci-ephemeral, oracle-cloud] }
          - { arch: amd64, provider: docker,     slot: 2, runner: [self-hosted, linux, x64,   f1r3fly-rust-ci-ephemeral, oracle-cloud] }
          - { arch: amd64, provider: docker,     slot: 3, runner: [self-hosted, linux, x64,   f1r3fly-rust-ci-ephemeral, oracle-cloud] }
          - { arch: amd64, provider: docker,     slot: 4, runner: [self-hosted, linux, x64,   f1r3fly-rust-ci-ephemeral, oracle-cloud] }
          - { arch: amd64, provider: docker,     slot: 5, runner: [self-hosted, linux, x64,   f1r3fly-rust-ci-ephemeral, oracle-cloud] }
          # ── amd64 × subprocess × 5 ───────────────────────────────────────────
          - { arch: amd64, provider: subprocess, slot: 1, runner: [self-hosted, linux, x64,   f1r3fly-rust-ci-ephemeral, oracle-cloud] }
          - { arch: amd64, provider: subprocess, slot: 2, runner: [self-hosted, linux, x64,   f1r3fly-rust-ci-ephemeral, oracle-cloud] }
          - { arch: amd64, provider: subprocess, slot: 3, runner: [self-hosted, linux, x64,   f1r3fly-rust-ci-ephemeral, oracle-cloud] }
          - { arch: amd64, provider: subprocess, slot: 4, runner: [self-hosted, linux, x64,   f1r3fly-rust-ci-ephemeral, oracle-cloud] }
          - { arch: amd64, provider: subprocess, slot: 5, runner: [self-hosted, linux, x64,   f1r3fly-rust-ci-ephemeral, oracle-cloud] }
          # ── arm64 × docker × 5 ───────────────────────────────────────────────
          - { arch: arm64, provider: docker,     slot: 1, runner: [self-hosted, linux, arm64, f1r3fly-rust-ci-ephemeral, oracle-cloud] }
          - { arch: arm64, provider: docker,     slot: 2, runner: [self-hosted, linux, arm64, f1r3fly-rust-ci-ephemeral, oracle-cloud] }
          - { arch: arm64, provider: docker,     slot: 3, runner: [self-hosted, linux, arm64, f1r3fly-rust-ci-ephemeral, oracle-cloud] }
          - { arch: arm64, provider: docker,     slot: 4, runner: [self-hosted, linux, arm64, f1r3fly-rust-ci-ephemeral, oracle-cloud] }
          - { arch: arm64, provider: docker,     slot: 5, runner: [self-hosted, linux, arm64, f1r3fly-rust-ci-ephemeral, oracle-cloud] }
          # ── arm64 × subprocess × 5 ───────────────────────────────────────────
          - { arch: arm64, provider: subprocess, slot: 1, runner: [self-hosted, linux, arm64, f1r3fly-rust-ci-ephemeral, oracle-cloud] }
          - { arch: arm64, provider: subprocess, slot: 2, runner: [self-hosted, linux, arm64, f1r3fly-rust-ci-ephemeral, oracle-cloud] }
          - { arch: arm64, provider: subprocess, slot: 3, runner: [self-hosted, linux, arm64, f1r3fly-rust-ci-ephemeral, oracle-cloud] }
          - { arch: arm64, provider: subprocess, slot: 4, runner: [self-hosted, linux, arm64, f1r3fly-rust-ci-ephemeral, oracle-cloud] }
          - { arch: arm64, provider: subprocess, slot: 5, runner: [self-hosted, linux, arm64, f1r3fly-rust-ci-ephemeral, oracle-cloud] }
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Clone system-integration
        uses: actions/checkout@v4
        with:
          repository: F1R3FLY-io/system-integration
          ref: fix/test-stability
          path: system-integration

      - name: Load Docker Image (from build_docker_image artifact)
        uses: actions/download-artifact@v4
        with:
          name: artifacts-docker-${{ matrix.arch }}
          path: /tmp

      - name: Import Docker Image
        shell: bash -ex {0}
        run: |
          zcat /tmp/rust-node-docker.tar.gz | docker image load
          docker tag ${{ env.DOCKER_IMAGE_NAME }}:${{ matrix.arch }} ${{ env.DOCKER_IMAGE_NAME }}:latest

      - name: Extract rnode binary from image (subprocess provider only)
        if: matrix.provider == 'subprocess'
        shell: bash -ex {0}
        run: |
          docker create --name extract-rnode ${{ env.DOCKER_IMAGE_NAME }}:latest
          docker cp extract-rnode:/opt/docker/bin/node /tmp/rnode
          chmod +x /tmp/rnode
          docker rm extract-rnode
          /tmp/rnode --version 2>/dev/null || true
          ldd /tmp/rnode

      - name: Install system-integration dependencies
        shell: bash -ex {0}
        run: |
          cd system-integration
          poetry lock --no-update
          poetry install --with integration

      - name: Run Integration Tests (${{ matrix.provider }} provider)
        shell: bash -ex {0}
        env:
          # Both env vars are set unconditionally — the framework's resolver
          # honors whichever matches `--provider`. Setting the other is harmless.
          F1R3FLY_NODE_IMAGE: ${{ env.DOCKER_IMAGE_NAME }}:latest
          F1R3FLY_NODE_BINARY: /tmp/rnode
          F1R3FLY_NODE_DEFAULTS_CONF: ${{ github.workspace }}/node/src/main/resources/defaults.conf
        run: |
          cd system-integration
          SCALE_FLAG=""
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            SCALE_FLAG="--timeout-scale=1.5"
          fi
          poetry run pytest \
            integration-tests/test/tests/shared/ \
            integration-tests/test/tests/custom/ \
            integration-tests/test/tests/standalone/ \
            --deselect integration-tests/test/tests/custom/test_load.py \
            --deselect integration-tests/test/tests/shared/test_convergence.py::test_network_converges_after_slow_deploy \
            --deselect integration-tests/test/tests/custom/test_asymmetric_bonds.py::test_finalization_asymmetric_bonds \
            --deselect integration-tests/test/tests/shared/test_convergence.py::test_ft_convergence \
            --deselect integration-tests/test/tests/shared/test_bonding_validators.py \
            --deselect integration-tests/test/tests/custom/test_joiner_self_proposes_at_epoch_boundary.py \
            --deselect integration-tests/test/tests/shared/test_observer_lfs_sync.py \
            --deselect integration-tests/test/tests/custom/test_shard_degradation.py \
            --deselect integration-tests/test/tests/shared/test_contract_lifecycle.py \
            --deselect integration-tests/test/tests/custom/test_consensus_safety.py::test_epoch_transition_under_heartbeat \
            --provider=${{ matrix.provider }} \
            -v --tb=short --instafail --maxfail=10 \
            -n auto --dist=loadgroup --timeout=1200 $SCALE_FLAG

      - name: Upload Integration Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs-${{ matrix.arch }}-${{ matrix.provider }}-slot${{ matrix.slot }}-run${{ github.run_id }}-attempt${{ github.run_attempt }}
          path: system-integration/integration-tests/
          retention-days: 7

  # Per-arch aggregators. The branch ruleset requires status checks named
  # exactly `Integration Tests (amd64)` and `Integration Tests (arm64)`, but
  # the matrix above emits 10 per-arch slot names (with provider+slot suffix).
  # Each aggregator queries the run's job list and fails if any slot for its
  # arch did not succeed — collapsing the 10-job matrix into one ruleset gate
  # per arch without needing to maintain 20 entries in the ruleset.
  integration_tests_amd64:
    name: Integration Tests (amd64)
    needs: integration_tests
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
    steps:
      - name: Check amd64 matrix slots
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash -e {0}
        run: |
          failures=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}/jobs" \
            --paginate \
            --jq '.jobs[] | select(.name | startswith("Integration Tests (amd64-")) | select(.conclusion != "success") | "\(.conclusion)\t\(.name)"')
          if [ -n "$failures" ]; then
            echo "amd64 integration test failures:"
            echo "$failures"
            exit 1
          fi
          echo "All amd64 integration test slots succeeded"

  integration_tests_arm64:
    name: Integration Tests (arm64)
    needs: integration_tests
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: read
    steps:
      - name: Check arm64 matrix slots
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash -e {0}
        run: |
          failures=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}/jobs" \
            --paginate \
            --jq '.jobs[] | select(.name | startswith("Integration Tests (arm64-")) | select(.conclusion != "success") | "\(.conclusion)\t\(.name)"')
          if [ -n "$failures" ]; then
            echo "arm64 integration test failures:"
            echo "$failures"
            exit 1
          fi
          echo "All arm64 integration test slots succeeded"

  # Smoke test: single-node docker-compose standalone deployment.
  # Verifies the image can start, reach Running state, expose HTTP API, and
  # finalize blocks. GitHub-hosted runner (amd64 only).
  smoke_docker_standalone:
    name: Smoke Test (Docker Standalone)
    needs: build_docker_image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Load Docker Image
        uses: actions/download-artifact@v4
        with:
          name: artifacts-docker-amd64
          path: /tmp

      - name: Import Docker Image
        shell: bash -ex {0}
        run: |
          zcat /tmp/rust-node-docker.tar.gz | docker image load
          docker tag ${{ env.DOCKER_IMAGE_NAME }}:amd64 ${{ env.DOCKER_IMAGE_NAME }}

      - name: Start standalone node
        shell: bash -ex {0}
        run: docker compose -f docker/standalone.yml up -d

      - name: Wait for Running state
        shell: bash -ex {0}
        run: |
          for i in $(seq 1 60); do
            if docker compose -f docker/standalone.yml logs 2>&1 | grep -q "Making a transition to Running state"; then
              echo "Node reached Running state"
              break
            fi
            echo "  [${i}] Waiting for Running state..."
            sleep 5
          done
          docker compose -f docker/standalone.yml logs 2>&1 | grep "Making a transition to Running state" || (echo "FAIL: Node did not reach Running state" && exit 1)

      - name: Verify HTTP API
        shell: bash -ex {0}
        run: curl -sf http://localhost:40403/api/status

      - name: Wait for 10 finalized blocks
        shell: bash -ex {0}
        run: |
          for i in $(seq 1 60); do
            LFB=$(curl -sf http://localhost:40403/api/last-finalized-block 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('blockInfo',{}).get('blockNumber',0))" 2>/dev/null || echo 0)
            echo "  [$((i*5))s] LFB: #$LFB"
            if [ "$LFB" -ge 10 ] 2>/dev/null; then
              echo "Reached LFB #$LFB"
              break
            fi
            sleep 5
          done
          [ "$LFB" -ge 10 ] 2>/dev/null || (echo "FAIL: LFB only at #$LFB after 300s" && exit 1)

      - name: Collect logs
        if: always()
        shell: bash {0}
        run: |
          mkdir -p /tmp/logs
          docker ps -a > /tmp/logs/containers.txt 2>&1 || true
          for c in $(docker ps -aq --filter "name=rnode" 2>/dev/null); do
            name=$(docker inspect --format '{{.Name}}' "$c" | sed 's|^/||')
            docker logs "$c" > "/tmp/logs/${name}.log" 2>&1 || true
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-logs-docker-standalone
          path: /tmp/logs/
          retention-days: 7

      - name: Cleanup
        if: always()
        shell: bash {0}
        run: docker compose -f docker/standalone.yml down -v

  # Smoke test: full docker-compose shard (bootstrap + validators + observer).
  smoke_docker_shard:
    name: Smoke Test (Docker Shard)
    needs: build_docker_image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Load Docker Image
        uses: actions/download-artifact@v4
        with:
          name: artifacts-docker-amd64
          path: /tmp

      - name: Import Docker Image
        shell: bash -ex {0}
        run: |
          zcat /tmp/rust-node-docker.tar.gz | docker image load
          docker tag ${{ env.DOCKER_IMAGE_NAME }}:amd64 ${{ env.DOCKER_IMAGE_NAME }}

      - name: Start shard
        shell: bash -ex {0}
        run: docker compose -f docker/shard.yml up -d

      - name: Wait for bootstrap Running state
        shell: bash -ex {0}
        run: |
          for i in $(seq 1 60); do
            if docker logs rnode.bootstrap 2>&1 | grep -q "Making a transition to Running state"; then
              echo "Bootstrap reached Running state"
              break
            fi
            echo "  [${i}] Waiting for bootstrap Running state..."
            sleep 5
          done
          docker logs rnode.bootstrap 2>&1 | grep "Making a transition to Running state" || (echo "FAIL: Bootstrap did not reach Running state" && exit 1)

      - name: Wait for 10 finalized blocks on bootstrap
        shell: bash -ex {0}
        run: |
          for i in $(seq 1 60); do
            LFB=$(curl -sf http://localhost:40403/api/last-finalized-block 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('blockInfo',{}).get('blockNumber',0))" 2>/dev/null || echo 0)
            echo "  [$((i*5))s] LFB: #$LFB"
            if [ "$LFB" -ge 10 ] 2>/dev/null; then
              echo "Reached LFB #$LFB"
              break
            fi
            sleep 5
          done
          [ "$LFB" -ge 10 ] 2>/dev/null || (echo "FAIL: LFB only at #$LFB after 300s" && exit 1)

      - name: Collect logs
        if: always()
        shell: bash {0}
        run: |
          mkdir -p /tmp/logs
          docker ps -a > /tmp/logs/containers.txt 2>&1 || true
          for c in $(docker ps -aq --filter "name=rnode" 2>/dev/null); do
            name=$(docker inspect --format '{{.Name}}' "$c" | sed 's|^/||')
            docker logs "$c" > "/tmp/logs/${name}.log" 2>&1 || true
          done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-logs-docker-shard
          path: /tmp/logs/
          retention-days: 7

      - name: Cleanup
        if: always()
        shell: bash {0}
        run: docker compose -f docker/shard.yml down -v

  # Smoke test: extract binary from docker image, run locally without docker.
  smoke_local_standalone:
    name: Smoke Test (Local Standalone)
    needs: build_docker_image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Install just
        shell: bash -ex {0}
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Load Docker Image
        uses: actions/download-artifact@v4
        with:
          name: artifacts-docker-amd64
          path: /tmp

      - name: Extract node binary from Docker image
        shell: bash -ex {0}
        run: |
          zcat /tmp/rust-node-docker.tar.gz | docker image load
          CONTAINER_ID=$(docker create ${{ env.DOCKER_IMAGE_NAME }}:amd64)
          mkdir -p target/release
          docker cp "$CONTAINER_ID:/opt/docker/bin/node" ./target/release/node
          docker rm "$CONTAINER_ID"
          chmod +x ./target/release/node

      - name: Setup standalone data
        shell: bash -ex {0}
        run: just setup-standalone

      - name: Start standalone node
        shell: bash -ex {0}
        run: |
          ./target/release/node run -s \
            --config-file=run-local/conf/standalone.conf \
            --validator-private-key=5f668a7ee96d944a4494cc947e4005e172d7ab3461ee5538f1f2a45a835e9657 \
            --host=localhost \
            --no-upnp \
            > /tmp/node-stdout.log 2>&1 &
          echo $! > /tmp/node.pid
          echo "Node started with PID $(cat /tmp/node.pid)"

      - name: Wait for Running state
        shell: bash -ex {0}
        run: |
          for i in $(seq 1 60); do
            if grep -q "Making a transition to Running state" /tmp/node-stdout.log 2>/dev/null; then
              echo "Node reached Running state"
              break
            fi
            echo "  [${i}] Waiting for Running state..."
            sleep 5
          done
          grep -q "Making a transition to Running state" /tmp/node-stdout.log || (echo "FAIL: Node did not reach Running state" && cat /tmp/node-stdout.log && exit 1)

      - name: Verify HTTP API
        shell: bash -ex {0}
        run: curl -sf http://localhost:40403/api/status

      - name: Wait for 10 finalized blocks
        shell: bash -ex {0}
        run: |
          for i in $(seq 1 60); do
            LFB=$(curl -sf http://localhost:40403/api/last-finalized-block 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('blockInfo',{}).get('blockNumber',0))" 2>/dev/null || echo 0)
            echo "  [$((i*5))s] LFB: #$LFB"
            if [ "$LFB" -ge 10 ] 2>/dev/null; then
              echo "Reached LFB #$LFB"
              break
            fi
            sleep 5
          done
          [ "$LFB" -ge 10 ] 2>/dev/null || (echo "FAIL: LFB only at #$LFB after 300s" && exit 1)

      - name: Collect logs
        if: always()
        shell: bash {0}
        run: |
          mkdir -p /tmp/logs
          cp /tmp/node-stdout.log /tmp/logs/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-logs-local-standalone
          path: /tmp/logs/
          retention-days: 7

      - name: Cleanup
        if: always()
        shell: bash {0}
        run: |
          PID=$(cat /tmp/node.pid 2>/dev/null || echo "")
          [ -n "$PID" ] && kill "$PID" 2>/dev/null || true

  # Publish Docker image to Docker Hub + OCIR.
  # Runs on tag pushes and on push to dev/master/staging/trying (with suffix).
  release_docker_image:
    name: Release Docker Image
    timeout-minutes: 15
    needs:
      - build_base
      - lint
      - deny
      - markdown_link_check
      - test
      - integration_tests
      - smoke_docker_standalone
      - smoke_docker_shard
      - smoke_local_standalone
      - build_docker_image
    if: >-
      github.event_name == 'push' && (
        startsWith(github.ref, 'refs/tags/') ||
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/dev' ||
        github.ref == 'refs/heads/staging' ||
        github.ref == 'refs/heads/trying'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for version)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load AMD64 Docker Image
        uses: actions/download-artifact@v4
        with:
          name: artifacts-docker-amd64
          path: /tmp/amd64

      - name: Import AMD64 Docker Image
        shell: bash -ex {0}
        run: zcat /tmp/amd64/rust-node-docker.tar.gz | docker image load

      - name: Load ARM64 Docker Image
        uses: actions/download-artifact@v4
        with:
          name: artifacts-docker-arm64
          path: /tmp/arm64

      - name: Import ARM64 Docker Image
        shell: bash -ex {0}
        run: zcat /tmp/arm64/rust-node-docker.tar.gz | docker image load

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish Docker Image
        env:
          VERSION: ${{ needs.build_base.outputs.VERSION }}
          BRANCH: ${{ needs.build_base.outputs.BRANCH }}
        shell: bash -exu -o pipefail {0}
        run: |
          SOURCE_AMD64="${DOCKER_IMAGE_NAME}:amd64"
          SOURCE_ARM64="${DOCKER_IMAGE_NAME}:arm64"

          SUFFIX=""
          CI_RUN=""
          TAG_PREFIX=""
          IS_TAG_PUSH="false"

          if [[ "$GITHUB_REF" =~ ^refs/tags/ ]]; then
            IS_TAG_PUSH="true"
          fi

          # Branch-based tagging:
          #   trying  → separate image stream `${IMAGE}-trying`, per-CI-run tags
          #   dev     → version tag prefixed `dev-${VERSION}`, channel pointer :dev
          #   staging → version tag prefixed `staging-${VERSION}`, channel pointer :staging
          #   master  → plain :${VERSION}, channel pointer :latest only on tag push
          if [[ "$BRANCH" == "trying" ]]; then
            SUFFIX="-trying"
            CI_RUN="-ci-${GITHUB_RUN_NUMBER}"
          elif [[ "$BRANCH" == "dev" && "$IS_TAG_PUSH" == "false" ]]; then
            TAG_PREFIX="dev-"
          elif [[ "$BRANCH" == "staging" ]]; then
            TAG_PREFIX="staging-"
          fi

          IMAGE_NAME="${DOCKER_IMAGE_NAME}${SUFFIX}"
          IMG_VERSION_RAW="${IMAGE_NAME}:${TAG_PREFIX}${VERSION}${CI_RUN}"
          IMG_VERSION="${IMG_VERSION_RAW//[+]/__}"

          # Channel pointer ("latest of this channel")
          if [[ "$BRANCH" == "dev" && "$IS_TAG_PUSH" == "false" ]]; then
            IMG_LATEST="${IMAGE_NAME}:dev"
          elif [[ "$BRANCH" == "staging" ]]; then
            IMG_LATEST="${IMAGE_NAME}:staging"
          else
            IMG_LATEST="${IMAGE_NAME}:latest"
          fi

          # Tag and push arch-specific images
          docker tag "$SOURCE_AMD64" "${IMG_VERSION}-amd64"
          docker tag "$SOURCE_ARM64" "${IMG_VERSION}-arm64"
          docker push "${IMG_VERSION}-amd64"
          docker push "${IMG_VERSION}-arm64"

          docker tag "$SOURCE_AMD64" "${IMG_LATEST}-amd64"
          docker tag "$SOURCE_ARM64" "${IMG_LATEST}-arm64"
          docker push "${IMG_LATEST}-amd64"
          docker push "${IMG_LATEST}-arm64"

          # Multi-arch manifests
          docker manifest create "${IMG_VERSION}" --amend "${IMG_VERSION}-amd64" "${IMG_VERSION}-arm64"
          docker manifest push "${IMG_VERSION}"
          docker manifest create "${IMG_LATEST}" --amend "${IMG_LATEST}-amd64" "${IMG_LATEST}-arm64"
          docker manifest push "${IMG_LATEST}"

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCIR_REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      - name: Publish to OCIR
        env:
          VERSION: ${{ needs.build_base.outputs.VERSION }}
          BRANCH: ${{ needs.build_base.outputs.BRANCH }}
        shell: bash -exu -o pipefail {0}
        run: |
          OCIR_BASE="${{ secrets.OCIR_REGISTRY }}/${{ secrets.OCIR_NAMESPACE }}/${{ secrets.OCIR_REPO }}"
          SOURCE_AMD64="${DOCKER_IMAGE_NAME}:amd64"
          SOURCE_ARM64="${DOCKER_IMAGE_NAME}:arm64"

          SUFFIX=""
          CI_RUN=""
          TAG_PREFIX=""
          IS_TAG_PUSH="false"

          if [[ "$GITHUB_REF" =~ ^refs/tags/ ]]; then
            IS_TAG_PUSH="true"
          fi

          if [[ "$BRANCH" == "trying" ]]; then
            SUFFIX="-trying"
            CI_RUN="-ci-${GITHUB_RUN_NUMBER}"
          elif [[ "$BRANCH" == "dev" && "$IS_TAG_PUSH" == "false" ]]; then
            TAG_PREFIX="dev-"
          elif [[ "$BRANCH" == "staging" ]]; then
            TAG_PREFIX="staging-"
          fi

          OCIR_IMAGE="${OCIR_BASE}${SUFFIX}"
          IMG_VERSION_RAW="${OCIR_IMAGE}:${TAG_PREFIX}${VERSION}${CI_RUN}"
          IMG_VERSION="${IMG_VERSION_RAW//[+]/__}"

          if [[ "$BRANCH" == "dev" && "$IS_TAG_PUSH" == "false" ]]; then
            IMG_LATEST="${OCIR_IMAGE}:dev"
          elif [[ "$BRANCH" == "staging" ]]; then
            IMG_LATEST="${OCIR_IMAGE}:staging"
          else
            IMG_LATEST="${OCIR_IMAGE}:latest"
          fi

          docker tag "$SOURCE_AMD64" "${IMG_VERSION}-amd64"
          docker tag "$SOURCE_ARM64" "${IMG_VERSION}-arm64"
          docker push "${IMG_VERSION}-amd64"
          docker push "${IMG_VERSION}-arm64"

          docker tag "$SOURCE_AMD64" "${IMG_LATEST}-amd64"
          docker tag "$SOURCE_ARM64" "${IMG_LATEST}-arm64"
          docker push "${IMG_LATEST}-amd64"
          docker push "${IMG_LATEST}-arm64"

          docker manifest create "${IMG_VERSION}" --amend "${IMG_VERSION}-amd64" "${IMG_VERSION}-arm64"
          docker manifest push "${IMG_VERSION}"
          docker manifest create "${IMG_LATEST}" --amend "${IMG_LATEST}-amd64" "${IMG_LATEST}-arm64"
          docker manifest push "${IMG_LATEST}"

  # GitHub release with multi-arch binaries attached (tag pushes only).
  release_packages:
    name: Release Packages
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    needs:
      - lint
      - deny
      - markdown_link_check
      - test
      - integration_tests
      - smoke_docker_standalone
      - smoke_docker_shard
      - smoke_local_standalone
      - build_docker_image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (for CHANGELOG.md)
        uses: actions/checkout@v4

      - name: Load Docker artifact (amd64)
        uses: actions/download-artifact@v4
        with:
          name: artifacts-docker-amd64
          path: /tmp/amd64

      - name: Load Docker artifact (arm64)
        uses: actions/download-artifact@v4
        with:
          name: artifacts-docker-arm64
          path: /tmp/arm64

      - name: Extract amd64 binary from Docker image
        shell: bash -ex {0}
        run: |
          mkdir -p /tmp/artifacts
          zcat /tmp/amd64/rust-node-docker.tar.gz | docker image load
          CONTAINER_ID=$(docker create ${{ env.DOCKER_IMAGE_NAME }}:amd64)
          docker cp "$CONTAINER_ID:/opt/docker/bin/node" /tmp/artifacts/f1r3node-linux-amd64
          docker rm "$CONTAINER_ID"
          test -f /tmp/artifacts/f1r3node-linux-amd64 || { echo 'amd64 binary extraction failed'; exit 1; }

      - name: Extract arm64 binary from Docker image
        shell: bash -ex {0}
        run: |
          zcat /tmp/arm64/rust-node-docker.tar.gz | docker image load
          CONTAINER_ID=$(docker create --platform linux/arm64 ${{ env.DOCKER_IMAGE_NAME }}:arm64)
          docker cp "$CONTAINER_ID:/opt/docker/bin/node" /tmp/artifacts/f1r3node-linux-arm64
          docker rm "$CONTAINER_ID"
          test -f /tmp/artifacts/f1r3node-linux-arm64 || { echo 'arm64 binary extraction failed'; exit 1; }

      - name: Determine release type
        id: release_type
        shell: bash -ex {0}
        run: |
          # Tag format: refs/tags/v{MAJOR}.{MINOR}.{PATCH}
          # PATCH == 0 → stable (prerelease=false); PATCH > 0 → prerelease=true
          TAG="${GITHUB_REF#refs/tags/v}"
          PATCH=$(echo "$TAG" | cut -d. -f3)
          if [ "$PATCH" = "0" ]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes for this version
        shell: bash -ex {0}
        run: |
          # Extract the latest version section from CHANGELOG.md
          awk '/^## \[/{if(found) exit; found=1} found' CHANGELOG.md > RELEASE_NOTES.md

      - name: Update release and release artifacts
        uses: ncipollo/release-action@v1
        with:
          artifacts: /tmp/artifacts/f1r3node-linux-amd64,/tmp/artifacts/f1r3node-linux-arm64
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          draft: false
          allowUpdates: true
          omitBodyDuringUpdate: true
          bodyFile: RELEASE_NOTES.md
          token: ${{ secrets.GITHUB_TOKEN }}
