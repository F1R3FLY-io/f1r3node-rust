# Auto-bump patch version on merge to master.
#
# - master: bumps patch (0.4.0 → 0.4.1)
#
# Minor and major bumps are NOT automated. To cut a minor/major release,
# manually create and push a tag:
#
#     git tag -a v0.5.0 origin/master -m "Release v0.5.0"
#     git push origin v0.5.0
#
# The tag push triggers ci.yml's release_docker_image + release_packages jobs.
# node/Cargo.toml + node/Dockerfile LABEL will stay at the previous patch-bumped
# value (e.g. 0.4.17) until the next master merge auto-patch-bumps from the
# new tag (which would then compute 0.5.1 from latest tag v0.5.0).
#
# Determines the next version from the latest `v*` tag, bumps
# node/Cargo.toml + node/Dockerfile LABEL, regenerates Cargo.lock, generates
# CHANGELOG.md via git-cliff, commits, pushes the commit, then creates an
# annotated tag via the GitHub API.
#
# Commit push uses GITHUB_TOKEN (no workflow triggers).
# Tag creation uses RELEASE_PAT (triggers on:push:tags workflows for CI publish).

name: Release

on:
  push:
    branches:
      - master

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Bump Version & Tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      !startsWith(github.event.head_commit.message, 'chore(release)')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Force-refresh tags
        run: git fetch origin --tags --force

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-09

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y $(cat .github/apt-dependencies.txt)

      - name: Install git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          args: --version

      - name: Determine next version
        id: version
        shell: bash -exu -o pipefail {0}
        run: |
          source scripts/version.sh
          bump_version patch
          echo "NEXT_VERSION=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "BRANCH=master" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT_VERSION (tag: $TAG_NAME)"

      - name: Update node/Cargo.toml version
        run: |
          sed -i "0,/^version = \".*\"/s//version = \"${{ steps.version.outputs.NEXT_VERSION }}\"/" node/Cargo.toml

      - name: Update Dockerfile LABEL
        run: |
          sed -i 's/^LABEL version=".*"/LABEL version="${{ steps.version.outputs.NEXT_VERSION }}"/' node/Dockerfile

      - name: Update Cargo.lock
        run: cargo generate-lockfile

      - name: Generate CHANGELOG
        uses: orhun/git-cliff-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config: cliff.toml
          args: --tag ${{ steps.version.outputs.TAG_NAME }} -o CHANGELOG.md

      - name: Commit release
        run: |
          git add node/Cargo.toml node/Dockerfile Cargo.lock CHANGELOG.md
          git commit -m "chore(release): ${{ steps.version.outputs.TAG_NAME }}"

      - name: Push commit (GITHUB_TOKEN — no workflow triggers)
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin ${{ steps.version.outputs.BRANCH }}

      - name: Create tag via API (PAT — triggers downstream CI)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.RELEASE_PAT }}
          script: |
            const tagName = '${{ steps.version.outputs.TAG_NAME }}';

            // Get the SHA of the release commit (HEAD after our commits)
            const { execSync } = require('child_process');
            const commitSha = execSync('git rev-parse HEAD').toString().trim();

            // Create annotated tag object
            const tagObject = await github.rest.git.createTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tagName,
              message: `Release ${tagName}`,
              object: commitSha,
              type: 'commit'
            });

            // Create tag reference
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tagName}`,
              sha: tagObject.data.sha
            });

            console.log(`Created tag ${tagName} -> ${commitSha}`);
