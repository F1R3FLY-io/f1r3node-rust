# =================================================================
# F1R3FLY RUST NODE - MONITORING STACK
# =================================================================
# Prometheus + Grafana, joining the f1r3fly-shard network as external.
# Opt-in: bring it up alongside shard.yml when you want dashboards.
#
# Usage:
#   docker compose -f shard.yml      up -d
#   docker compose -f monitoring.yml up -d    # optional
#
# Ports:
#   Prometheus: http://localhost:9090
#   Grafana:    http://localhost:3000 (admin/admin)
#
# Prerequisites:
#   - shard.yml must be running (monitoring.yml joins its network)

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    networks:
      - f1r3fly-shard
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-rules.yml:/etc/prometheus/rules/prometheus-rules.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - f1r3fly-shard
    ports:
      - "3000:3000"
    environment:
      - GF_USERS_DEFAULT_THEME=light
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro

networks:
  f1r3fly-shard:
    external: true
    name: f1r3fly-shard
