# =================================================================
# F1R3FLY RUST NODE - SHARD DOCKER COMPOSE
# =================================================================
# Runs a multi-node shard: bootstrap + 3 validators + observer.
#
# Usage:
#   docker compose -f shard.yml up -d
#   docker compose -f shard.yml logs -f
#   docker compose -f shard.yml down        # stop, keep data
#   docker compose -f shard.yml down -v     # stop and wipe all data
#
# Port Mapping:
#   Bootstrap:   40400-40405
#   Validator1:  40410-40415
#   Validator2:  40420-40425
#   Validator3:  40430-40435
#   Observer:    40450-40455
#   Prometheus:  9090
#   Grafana:     3000 (admin/admin)

x-rnode: &default-rnode
  image: ${F1R3FLY_RUST_IMAGE:-f1r3flyindustries/f1r3fly-rust-node:latest}
  user: root
  restart: always
  networks:
    - f1r3fly
  environment:
    - OPENAI_ENABLED=${OPENAI_ENABLED:-false}
    # Limit glibc arena proliferation and return freed heap pages faster.
    - MALLOC_ARENA_MAX=2
    - MALLOC_TRIM_THRESHOLD_=131072
    - MALLOC_MMAP_THRESHOLD_=131072

services:
  # =================================================================
  # BOOTSTRAP NODE (Ceremony Master)
  # =================================================================
  # Coordinates genesis ceremony but is NOT a validator (not in bonds.txt).
  boot:
    <<: *default-rnode
    container_name: ${BOOTSTRAP_HOST:-rnode.bootstrap}
    command:
      - run
      - --host=${BOOTSTRAP_HOST:-rnode.bootstrap}
      - --bootstrap=rnode://${BOOTSTRAP_NODE_ID:-1e780e5dfbe0a3d9470a2b414f502d59402e09c2}@${BOOTSTRAP_HOST:-rnode.bootstrap}?protocol=40400&discovery=40404
      - --allow-private-addresses
      - --validator-private-key=${BOOTSTRAP_PRIVATE_KEY:-5f668a7ee96d944a4494cc947e4005e172d7ab3461ee5538f1f2a45a835e9657}
      - --required-signatures
      - "2"
      - --ceremony-master-mode
      - --heartbeat-disabled
      - --native-token-name=${BOOTSTRAP_NATIVE_TOKEN_NAME:-${NATIVE_TOKEN_NAME:-F1R3CAP}}
      - --native-token-symbol=${BOOTSTRAP_NATIVE_TOKEN_SYMBOL:-${NATIVE_TOKEN_SYMBOL:-F1R3}}
      - --native-token-decimals=${BOOTSTRAP_NATIVE_TOKEN_DECIMALS:-${NATIVE_TOKEN_DECIMALS:-8}}
    ports:
      - "40400:40400"
      - "40401:40401"
      - "40402:40402"
      - "40403:40403"
      - "40404:40404"
      - "40405:40405"
    volumes:
      - boot-data:/var/lib/rnode/
      - ./conf/default.conf:/var/lib/rnode/rnode.conf
      - ./genesis/wallets.txt:/var/lib/rnode/genesis/wallets.txt
      - ./genesis/bonds.txt:/var/lib/rnode/genesis/bonds.txt
      - ./certs/bootstrap/node.certificate.pem:/var/lib/rnode/node.certificate.pem:ro
      - ./certs/bootstrap/node.key.pem:/var/lib/rnode/node.key.pem:ro

  chroma-db:
    profiles: ["chromadb"]
    image: chromadb/chroma
    networks: [f1r3fly]
    restart: unless-stopped
    volumes:
      - ./chroma_data:/data
    ports:
      - "8000:8000"

  # =================================================================
  # VALIDATOR 1
  # =================================================================
  validator1:
    <<: *default-rnode
    container_name: ${VALIDATOR1_HOST:-rnode.validator1}
    command:
      - run
      - --host=${VALIDATOR1_HOST:-rnode.validator1}
      - --allow-private-addresses
      - --bootstrap=rnode://${BOOTSTRAP_NODE_ID:-1e780e5dfbe0a3d9470a2b414f502d59402e09c2}@${BOOTSTRAP_HOST:-rnode.bootstrap}?protocol=40400&discovery=40404
      - --validator-public-key=${VALIDATOR1_PUBLIC_KEY:-04fa70d7be5eb750e0915c0f6d19e7085d18bb1c22d030feb2a877ca2cd226d04438aa819359c56c720142fbc66e9da03a5ab960a3d8b75363a226b7c800f60420}
      - --validator-private-key=${VALIDATOR1_PRIVATE_KEY:-357cdc4201a5650830e0bc5a03299a30038d9934ba4c7ab73ec164ad82471ff9}
      - --genesis-validator
      - --native-token-name=${VALIDATOR1_NATIVE_TOKEN_NAME:-${NATIVE_TOKEN_NAME:-F1R3CAP}}
      - --native-token-symbol=${VALIDATOR1_NATIVE_TOKEN_SYMBOL:-${NATIVE_TOKEN_SYMBOL:-F1R3}}
      - --native-token-decimals=${VALIDATOR1_NATIVE_TOKEN_DECIMALS:-${NATIVE_TOKEN_DECIMALS:-8}}
    ports:
      - "40410:40400"
      - "40411:40401"
      - "40412:40402"
      - "40413:40403"
      - "40414:40404"
      - "40415:40405"
    volumes:
      - validator1-data:/var/lib/rnode/
      - ./conf/default.conf:/var/lib/rnode/rnode.conf
      - ./genesis/wallets.txt:/var/lib/rnode/genesis/wallets.txt
      - ./genesis/bonds.txt:/var/lib/rnode/genesis/bonds.txt
      - ./certs/validator1/node.certificate.pem:/var/lib/rnode/node.certificate.pem:ro
      - ./certs/validator1/node.key.pem:/var/lib/rnode/node.key.pem:ro

  # =================================================================
  # VALIDATOR 2
  # =================================================================
  validator2:
    <<: *default-rnode
    container_name: ${VALIDATOR2_HOST:-rnode.validator2}
    command:
      - run
      - --host=${VALIDATOR2_HOST:-rnode.validator2}
      - --allow-private-addresses
      - --bootstrap=rnode://${BOOTSTRAP_NODE_ID:-1e780e5dfbe0a3d9470a2b414f502d59402e09c2}@${BOOTSTRAP_HOST:-rnode.bootstrap}?protocol=40400&discovery=40404
      - --validator-public-key=${VALIDATOR2_PUBLIC_KEY:-04837a4cff833e3157e3135d7b40b8e1f33c6e6b5a4342b9fc784230ca4c4f9d356f258debef56ad4984726d6ab3e7709e1632ef079b4bcd653db00b68b2df065f}
      - --validator-private-key=${VALIDATOR2_PRIVATE_KEY:-2c02138097d019d263c1d5383fcaddb1ba6416a0f4e64e3a617fe3af45b7851d}
      - --genesis-validator
      - --native-token-name=${VALIDATOR2_NATIVE_TOKEN_NAME:-${NATIVE_TOKEN_NAME:-F1R3CAP}}
      - --native-token-symbol=${VALIDATOR2_NATIVE_TOKEN_SYMBOL:-${NATIVE_TOKEN_SYMBOL:-F1R3}}
      - --native-token-decimals=${VALIDATOR2_NATIVE_TOKEN_DECIMALS:-${NATIVE_TOKEN_DECIMALS:-8}}
    ports:
      - "40420:40400"
      - "40421:40401"
      - "40422:40402"
      - "40423:40403"
      - "40424:40404"
      - "40425:40405"
    volumes:
      - validator2-data:/var/lib/rnode/
      - ./conf/default.conf:/var/lib/rnode/rnode.conf
      - ./genesis/wallets.txt:/var/lib/rnode/genesis/wallets.txt
      - ./genesis/bonds.txt:/var/lib/rnode/genesis/bonds.txt
      - ./certs/validator2/node.certificate.pem:/var/lib/rnode/node.certificate.pem:ro
      - ./certs/validator2/node.key.pem:/var/lib/rnode/node.key.pem:ro

  # =================================================================
  # VALIDATOR 3
  # =================================================================
  validator3:
    <<: *default-rnode
    container_name: ${VALIDATOR3_HOST:-rnode.validator3}
    command:
      - run
      - --host=${VALIDATOR3_HOST:-rnode.validator3}
      - --allow-private-addresses
      - --bootstrap=rnode://${BOOTSTRAP_NODE_ID:-1e780e5dfbe0a3d9470a2b414f502d59402e09c2}@${BOOTSTRAP_HOST:-rnode.bootstrap}?protocol=40400&discovery=40404
      - --validator-public-key=${VALIDATOR3_PUBLIC_KEY:-0457febafcc25dd34ca5e5c025cd445f60e5ea6918931a54eb8c3a204f51760248090b0c757c2bdad7b8c4dca757e109f8ef64737d90712724c8216c94b4ae661c}
      - --validator-private-key=${VALIDATOR3_PRIVATE_KEY:-b67533f1f99c0ecaedb7d829e430b1c0e605bda10f339f65d5567cb5bd77cbcb}
      - --genesis-validator
      - --native-token-name=${VALIDATOR3_NATIVE_TOKEN_NAME:-${NATIVE_TOKEN_NAME:-F1R3CAP}}
      - --native-token-symbol=${VALIDATOR3_NATIVE_TOKEN_SYMBOL:-${NATIVE_TOKEN_SYMBOL:-F1R3}}
      - --native-token-decimals=${VALIDATOR3_NATIVE_TOKEN_DECIMALS:-${NATIVE_TOKEN_DECIMALS:-8}}
    ports:
      - "40430:40400"
      - "40431:40401"
      - "40432:40402"
      - "40433:40403"
      - "40434:40404"
      - "40435:40405"
    volumes:
      - validator3-data:/var/lib/rnode/
      - ./conf/default.conf:/var/lib/rnode/rnode.conf
      - ./genesis/wallets.txt:/var/lib/rnode/genesis/wallets.txt
      - ./genesis/bonds.txt:/var/lib/rnode/genesis/bonds.txt
      - ./certs/validator3/node.certificate.pem:/var/lib/rnode/node.certificate.pem:ro
      - ./certs/validator3/node.key.pem:/var/lib/rnode/node.key.pem:ro

  # =================================================================
  # OBSERVER (Read-Only Node)
  # =================================================================
  # Syncs state from validators but does not participate in consensus.
  readonly:
    <<: *default-rnode
    container_name: ${READONLY_HOST:-rnode.readonly}
    command:
      - run
      - --host=${READONLY_HOST:-rnode.readonly}
      - --bootstrap=rnode://${BOOTSTRAP_NODE_ID:-1e780e5dfbe0a3d9470a2b414f502d59402e09c2}@${BOOTSTRAP_HOST:-rnode.bootstrap}?protocol=40400&discovery=40404
      - --no-upnp
      - --allow-private-addresses
      - --heartbeat-disabled
      - --native-token-name=${READONLY_NATIVE_TOKEN_NAME:-${NATIVE_TOKEN_NAME:-F1R3CAP}}
      - --native-token-symbol=${READONLY_NATIVE_TOKEN_SYMBOL:-${NATIVE_TOKEN_SYMBOL:-F1R3}}
      - --native-token-decimals=${READONLY_NATIVE_TOKEN_DECIMALS:-${NATIVE_TOKEN_DECIMALS:-8}}
    ports:
      - "40450:40400"
      - "40451:40401"
      - "40452:40402"
      - "40453:40403"
      - "40454:40404"
      - "40455:40405"
    volumes:
      - readonly-data:/var/lib/rnode/
      - ./conf/default.conf:/var/lib/rnode/rnode.conf
      - ./genesis/bonds.txt:/var/lib/rnode/genesis/bonds.txt
      - ./genesis/wallets.txt:/var/lib/rnode/genesis/wallets.txt

  # =================================================================
  # PROMETHEUS
  # =================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    networks:
      - f1r3fly
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-rules.yml:/etc/prometheus/rules/prometheus-rules.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml

  # =================================================================
  # GRAFANA
  # =================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - f1r3fly
    ports:
      - "3000:3000"
    environment:
      - GF_USERS_DEFAULT_THEME=light
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro

volumes:
  boot-data:
  validator1-data:
  validator2-data:
  validator3-data:
  readonly-data:

networks:
  f1r3fly:
    name: f1r3fly
    driver: bridge
