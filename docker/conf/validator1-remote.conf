# =================================================================
# VALIDATOR 1 - DISTRIBUTED TESTBED (VPS-2) CONFIGURATION
# =================================================================
# Port-shifted overrides so multiple nodes can share VPS-2's single
# public IP without port collisions. Protocol/discovery/API ports each
# live in their own tens-band; the base config stays identical.

include "default.conf"

protocol-server.port = 40410
peers-discovery.port = 40414
api-server.port-grpc-external = 40411
api-server.port-grpc-internal = 40412
api-server.port-http = 40413
api-server.port-admin-http = 40415
