# =================================================================
# F1R3FLY RUST NODE - STANDALONE DEVELOPMENT CONFIGURATION
# =================================================================
# Single-node mode for local development and testing.
# No network peers required - node creates and approves its own genesis.
#
# Key differences from default.conf (shard mode):
#   standalone = true         (no network, self-contained)
#   fault-tolerance-threshold = 0.0  (instant finalization)
#   synchrony-constraint-threshold = 0.0  (no BFT constraint)
#   ceremony-master-mode = true  (creates own genesis)
#   required-signatures = 0  (no other validators to wait for)
#   dev-mode = true  (enables development features)
#
# Config layering: defaults.conf (built-in) -> this file -> CLI args
#
# NOTE: ceremony-master-mode and enable-mergeable-channel-gc have no
# CLI flags - must be set in config file.

standalone = true

protocol-server {
  # Network ID - nodes only accept messages with matching network-id.
  # Standalone uses a separate ID to avoid accidental cross-talk.
  network-id = "standalone-dev"

  # Allow non-public addresses (required for Docker private networks).
  allow-private-addresses = true

  use-random-ports = false
  dynamic-ip = false

  # Disable UPnP (cannot work through Docker networking layer).
  no-upnp = true

  # Protocol server port
  port = 40400

  # Max inbound message size
  grpc-max-recv-message-size = 256K

  # Max inbound stream message size (effectively max block size)
  grpc-max-recv-stream-message-size = 256M

  # Concurrent protocol message consumers. Must be >= {nodes} * {synchrony}.
  # High value ensures block processing doesn't starve other messages.
  max-message-consumers = 400

  # Allow exporting state to joining nodes
  disable-state-exporter = false
}

protocol-client {
  network-id = ${protocol-server.network-id}

  # Enable Last Finalized State sync for nodes joining a live network.
  # false = sync from LFS (fast), true = replay from genesis (slow).
  disable-lfs = false

  # Peers picked randomly for broadcast/streaming
  batch-max-connections = 20

  # Default timeout for network operations
  network-timeout = 5 seconds

  grpc-max-recv-message-size = ${protocol-server.grpc-max-recv-message-size}

  # Chunk size for outbound streamed messages
  grpc-stream-chunk-size = 256K
}

peers-discovery {
  # Kademlia discovery port
  port = 40404

  # Peer table refresh interval
  lookup-interval = 20 seconds

  # Stale connection cleanup interval
  cleanup-interval = 10 seconds

  # Connections checked per heartbeat cycle
  heartbeat-batch-size = 100

  # Wait between initial connection attempts
  init-wait-loop-interval = 1 seconds
}

api-server {
  # External gRPC API (public endpoints: deploy, data-at-name, etc.)
  port-grpc-external = 40401

  # Internal gRPC API (propose, bonding, admin operations)
  port-grpc-internal = 40402

  # Max deploy size
  grpc-max-recv-message-size = 16M

  # HTTP API (status, blocks, exploratory-deploy)
  port-http = 40403

  # Admin HTTP API
  port-admin-http = 40405

  # Max blocks returned per API call (prevents OOM on large queries)
  max-blocks-limit = 50

  enable-reporting = true

  keep-alive-time = 2 hours
  keep-alive-timeout = 20 seconds
  permit-keep-alive-time = 5 minutes
  max-connection-idle = 1 hours
  max-connection-age = 1 hours
  max-connection-age-grace = 1 hours
}

storage {
  data-dir = ${default-data-dir}
}

tls {
  certificate-path = ${storage.data-dir}/node.certificate.pem
  key-path = ${storage.data-dir}/node.key.pem
  secure-random-non-blocking = false
  custom-certificate-location = false
  custom-key-location = false
}

casper {
  # =================================================================
  # CONSENSUS PARAMETERS (Development)
  # =================================================================

  # Byzantine fault tolerance threshold for block finalization.
  # 0.0 = finalize immediately (single validator, no consensus needed).
  fault-tolerance-threshold = 0.0

  # Fraction of total validator stake that must have recent blocks
  # before this node can propose.
  # 0.0 = no constraint (single validator, always allowed to propose).
  synchrony-constraint-threshold = 0.0

  # Max height gap between last finalized block and tip before
  # blocking proposals. Experimental safety valve.
  height-constraint-threshold = 1000

  # Finalization check runs every N blocks
  finalization-rate = 1

  # Include all blocks in merged state regardless of observation time.
  # Prevents deploy loss during network partitions.
  disable-late-block-filtering = true

  # =================================================================
  # TIMING (Development: fast intervals for quick iteration)
  # =================================================================

  # How often the node checks for missing blocks and processes state.
  casper-loop-interval = 5 seconds

  # Timeout before re-requesting a missing block dependency.
  requested-blocks-timeout = 60 seconds

  # Request fork choice tips when local tip is older than this
  fork-choice-stale-threshold = 30 seconds

  # How often to check if fork choice tip is stale
  fork-choice-check-if-stale-interval = 1 minutes

  # =================================================================
  # HEARTBEAT
  # =================================================================
  # Proposes empty blocks to keep finalization moving when there
  # are no user deploys.
  heartbeat {
    enabled = true
    check-interval = 5 seconds
    max-lfb-age = 10 seconds
  }

  # =================================================================
  # DAG STRUCTURE
  # =================================================================

  # Maximum number of parent blocks per new block.
  max-number-of-parents = 100

  # Maximum depth of secondary parents relative to main parent.
  max-parent-depth = 2147483647

  # =================================================================
  # MERGEABLE CHANNEL GC
  # =================================================================
  # Background garbage collection for mergeable channel data.
  # Uses safe reachability-based GC (required for multi-parent mode).
  # NOTE: This setting has no CLI flag - must be set in config file.
  enable-mergeable-channel-gc = true

  # How often GC scans for unreachable mergeable data
  mergeable-channels-gc-interval = 5 minutes

  # Safety margin (in blocks) beyond max-parent-depth before deleting
  mergeable-channels-gc-depth-buffer = 10

  # =================================================================
  # SHARD IDENTITY
  # =================================================================
  shard-name = root
  parent-shard-id = /

  # Minimum gas price for deploys
  min-phlo-price = 1

  # =================================================================
  # GENESIS BLOCK DATA (Standalone: single validator)
  # =================================================================
  genesis-block-data {
    genesis-data-dir = ${storage.data-dir}/genesis
    bonds-file = ${casper.genesis-block-data.genesis-data-dir}/bonds.txt
    wallets-file = ${casper.genesis-block-data.genesis-data-dir}/wallets.txt

    bond-minimum = 1
    bond-maximum = 9223372036854775807
    epoch-length = 10
    quarantine-length = 10

    # Single active validator for standalone mode
    number-of-active-validators = 1
    genesis-block-number = 0

    # PoS multi-sig public key (bootstrap/standalone wallet only)
    pos-multi-sig-public-keys = [
      04ffc016579a68050d655d55df4e09f04605164543e257c8e6df10361e6068a5336588e9b355ea859c5ab4285a5ef0efdf62bc28b80320ce99e26bb1607b3ad93d
    ]
    pos-multi-sig-quorum = 1
  }

  # =================================================================
  # GENESIS CEREMONY (Standalone: instant self-approval)
  # =================================================================
  genesis-ceremony {
    # No signatures needed - standalone node approves its own genesis.
    required-signatures = 0

    # Fast ceremony intervals for instant startup
    approve-interval = 1 seconds
    approve-duration = 1 seconds

    # Single validator identity
    autogen-shard-size = 1

    # Standalone node is ceremony master, not genesis validator.
    genesis-validator-mode = false

    # This node creates and approves its own genesis block.
    # NOTE: ceremony-master-mode has no CLI flag.
    ceremony-master-mode = true
  }

  # Disabled - block consumption constraints not currently active
  round-robin-dispatcher {
    max-peer-queue-size = 100
    give-up-after-skipped = 0
    drop-peer-after-retries = 0
  }
}

metrics {
  prometheus = true
  influxdb = false
  influxdb-udp = false
  zipkin = false
  sigar = false
}

# Development mode enables additional debug features
dev-mode = true

dev {
  # deployer-private-key =
}

openai {
  validate-api-key = true
  validation-timeout-sec = 15
}
