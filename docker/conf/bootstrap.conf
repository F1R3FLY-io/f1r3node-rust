# =================================================================
# F1R3FLY RUST NODE - BOOTSTRAP (CEREMONY MASTER) CONFIGURATION
# =================================================================
# Inherits all settings from default.conf and overrides only
# ceremony-master-mode, which has no CLI flag.
#
# The bootstrap node coordinates the genesis ceremony:
#   - Waits for validator signatures
#   - Creates and approves the genesis block
#   - Provides the network entry point for all other nodes
#
# The bootstrap node is NOT a validator (not in bonds.txt).
# Heartbeat is harmless since non-bonded nodes cannot propose.

include "default.conf"

casper.genesis-ceremony.ceremony-master-mode = true
