# =================================================================
# F1R3FLY RUST NODE - OBSERVER (READ-ONLY)
# =================================================================
# Joins an existing shard to provide read-only API access.
# Does not participate in consensus or produce blocks.
#
# Usage:
#   docker compose -f observer.yml up -d
#
# Prerequisites:
#   - A running shard network (docker compose -f shard.yml up -d)

services:
  readonly:
    image: ${F1R3FLY_RUST_IMAGE:-f1r3flyindustries/f1r3fly-rust-node:latest}
    user: root
    restart: always
    networks:
      - f1r3fly
    container_name: $READONLY_HOST
    command:
      - run
      - --host=$READONLY_HOST
      - --bootstrap=rnode://$BOOTSTRAP_NODE_ID@$BOOTSTRAP_HOST?protocol=40400&discovery=40404
      - --no-upnp
      - --allow-private-addresses
    ports:
      - "40450:40400"
      - "40451:40401"
      - "40452:40402"
      - "40453:40403"
      - "40454:40404"
      - "40455:40405"
    volumes:
      - readonly-data:/var/lib/rnode/
      - ./conf/default.conf:/var/lib/rnode/rnode.conf
      - ./genesis/bonds.txt:/var/lib/rnode/genesis/bonds.txt
      - ./genesis/wallets.txt:/var/lib/rnode/genesis/wallets.txt

volumes:
  readonly-data:

networks:
  f1r3fly:
    external: true
    name: f1r3fly
